<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRAN CRUZ VIP</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <style>
        :root{--o:#d4af37;--n:#050505;--g:linear-gradient(135deg,#d4af37,#f9e498)}
        body{background:var(--n);color:#fff;font-family:'Segoe UI',sans-serif;margin:0;display:flex;flex-direction:column;align-items:center;user-select:none;overflow-x:hidden}
        header{padding:30px 10px;width:100%;max-width:400px;text-align:center;box-sizing:border-box}
        .l{color:var(--o);font-size:2.1rem;font-weight:900;letter-spacing:6px;text-transform:uppercase;display:block;width:100%}
        .b{display:flex;justify-content:center;gap:10px;margin:20px 0}
        .b img{width:24px;border-radius:2px;cursor:pointer}
        .p{display:none;width:100%;max-width:390px;flex-direction:column;align-items:center;padding:0 20px 30px;box-sizing:border-box}
        .a{display:flex}
        .box{width:100%;background:rgba(255,255,255,0.03);border:1px solid #222;border-radius:12px;padding:20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;box-sizing:border-box}
        .s{border-color:var(--o);background:rgba(212,175,55,0.05)}
        .bg{width:100%;background:var(--g);color:#000;border:none;padding:20px;border-radius:12px;font-weight:900;text-transform:uppercase;letter-spacing:1px;cursor:pointer;margin-top:10px}
        
        /* GALERÍA VIP */
        #galeriaVip img{width:100%;border-radius:10px;margin-bottom:15px;border:1px solid #333}
        .inp-admin{width:100%;padding:15px;background:#111;border:1px solid #444;border-radius:10px;color:#fff;text-align:center;margin-bottom:10px;box-sizing:border-box;font-weight:bold;text-transform:uppercase}
        .pago-header{width:100%;padding:15px;background:rgba(255,255,255,0.05);border:1px solid #333;border-radius:10px;margin-top:8px;cursor:pointer;text-align:center;color:var(--o);font-size:.8rem;font-weight:bold;box-sizing:border-box}
        .pago-content{display:none;width:100%;background:rgba(0,0,0,0.5);border:1px solid var(--o);padding:15px;border-radius:0 0 10px 10px;box-sizing:border-box;text-align:center}
    </style>
</head>
<body>

<header onclick="tAdmin()">
    <div class="l">FRAN CRUZ VIP</div>
    <div class="b" id="bc"></div>
</header>

<div id="u" class="p a">
    <button class="bg" style="margin-bottom:30px" onclick="vP('u','accesoClave')">INGRESAR A SALA VIP</button>
    
    <div class="box" onclick="sel(1,this)"><span>Acceso Hoy</span><b id="v1">--</b></div>
    <div class="box" onclick="sel(7,this)"><span>7 Días Silver</span><b id="v7">--</b></div>
    <div class="box s" onclick="sel(15,this)"><span>30 Días Gold</span><b id="v15">--</b></div>

    <div style="width:100%;margin:15px 0">
        <div class="pago-header" onclick="tP('s1')">1. SINPE MÓVIL</div>
        <div id="s1" class="pago-content" onclick="copy('70835833')"><p>70835833</p></div>
        <div class="pago-header" onclick="tP('s2')">2. TRANSFERENCIA IBAN</div>
        <div id="s2" class="pago-content" onclick="copy('CR80080315001000035641')"><p>CR80080315001000035641</p></div>
        <div class="pago-header" onclick="tP('s3')">3. PAYPAL</div>
        <div id="s3" class="pago-content" onclick="copy('randallesc061376@gmail.com')"><p>randallesc061376@gmail.com</p></div>
    </div>
    <button class="bg" onclick="wa()">SOLICITAR MI CLAVE ACCESO</button>
</div>

<div id="accesoClave" class="p">
    <h3 style="color:var(--o);text-align:center">INGRESE SU CLAVE DINÁMICA</h3>
    <input type="text" id="claveCliente" class="inp-admin" placeholder="EJ: 6XV11" maxlength="5">
    <button class="bg" onclick="validarAcceso()">VER CONTENIDO VIP</button>
    <button class="bg" style="background:none;color:#555" onclick="vP('accesoClave','u')">VOLVER</button>
</div>

<div id="salaVip" class="p">
    <h3 style="color:var(--o);margin-bottom:20px">BIENVENIDO A LA SALA VIP</h3>
    <div id="galeriaVip"></div>
    <button class="bg" style="background:none;color:#555" onclick="location.reload()">SALIR</button>
</div>

<div id="l" class="p">
    <input type="password" id="pk" class="inp-admin" placeholder="PASSKEY">
    <button class="bg" onclick="vPk()">ENTRAR</button>
</div>

<div id="ad" class="p">
    <input type="file" id="fi" accept="image/*" style="display:none">
    <button class="bg" onclick="document.getElementById('fi').click()">ELEGIR LÁMINA</button>
    <button class="bg" onclick="sub()">PUBLICAR LÁMINA</button>
    <button class="bg" style="background:none;color:#555" onclick="location.reload()">CERRAR SESIÓN</button>
</div>

<script>
const cfg={apiKey:"AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE",authDomain:"fran-cruz-sala-vip.firebaseapp.com",projectId:"fran-cruz-sala-vip",storageBucket:"fran-cruz-sala-vip.firebasestorage.app",messagingSenderId:"1022733043010",appId:"1:1022733043010:web:379db18e37bbfde2cf34db"};
firebase.initializeApp(cfg);const db=firebase.firestore(),st=firebase.storage();
let pS=15,ps="CR",cl=0;
const T={"CR":{m:"₡",f:550,c:"cr"},"NI":{m:"C$",f:36.8,c:"ni"},"PA":{m:"$",f:1,c:"pa"},"HN":{m:"L",f:24.7,c:"hn"},"SV":{m:"$",f:1,c:"sv"},"GT":{m:"Q",f:7.8,c:"gt"},"BZ":{m:"BZ$",f:2,c:"bz"}};

function init(){
    const h=document.getElementById('bc');
    Object.keys(T).forEach(k=>{
        const i=document.createElement('img');i.src=`https://flagcdn.com/${T[k].c}.svg`;
        i.onclick=()=>{ps=k;updP();};h.appendChild(i);
    });updP();
}
function updP(){
    const t=T[ps];
    document.getElementById('v1').innerText=t.m+(1*t.f).toLocaleString();
    document.getElementById('v7').innerText=t.m+(7*t.f).toLocaleString();
    document.getElementById('v15').innerText=t.m+(15*t.f).toLocaleString();
}
function tP(id){document.querySelectorAll('.pago-content').forEach(x=>x.style.display='none');document.getElementById(id).style.display='block'}
function sel(v,e){pS=v;document.querySelectorAll('.box').forEach(x=>x.classList.remove('s'));e.classList.add('s')}
function tAdmin(){cl++;if(cl>=5){vP('u','l');cl=0}setTimeout(()=>cl=0,3000)}
function vP(o,n){document.getElementById(o).classList.remove('a');document.getElementById(n).classList.add('a')}
function vPk(){if(document.getElementById('pk').value==="ADMIN123")vP('l','ad');else location.reload()}

// LÓGICA DE CLIENTE: VALIDAR CLAVE DINÁMICA
function validarAcceso(){
    const input=document.getElementById('claveCliente').value.toUpperCase();
    const hoy=new Date().getDate().toString().padStart(2,'0');
    // Verifica que termine en el día actual (seguridad básica)
    if(input.endsWith(hoy) && input.length >= 4){
        cargarGaleria();
        vP('accesoClave','salaVip');
    } else {
        alert("CLAVE INVÁLIDA O VENCIDA");
    }
}

async function cargarGaleria(){
    const q=await db.collection("galeria").orderBy("fecha","desc").get();
    const g=document.getElementById('galeriaVip');g.innerHTML="";
    q.forEach(d=>{g.innerHTML+=`<img src="${d.data().url}">`});
}

function wa(){
    const t=T[ps],m=(pS*t.f).toLocaleString(),hoy=new Date().getDate().toString().padStart(2,'0');
    const id=Math.random().toString(36).substring(2,4).toUpperCase()+hoy;
    const msg=`Buen día. Adjunto comprobante del Plan ${pS} días (${t.m}${m}).\n\nGestión ID: ${id}`;
    window.location.href=`https://wa.me/50664535475?text=${encodeURIComponent(msg)}`;
}

async function sub(){
    const f=document.getElementById('fi').files[0];if(!f)return;
    const r=st.ref('galeria/'+Date.now());await r.put(f);
    const u=await r.getDownloadURL();await db.collection("galeria").add({url:u,fecha:firebase.firestore.FieldValue.serverTimestamp()});
    alert("PUBLICADA");location.reload();
}
init();
</script>
</body>
</html>
