<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRAN CRUZ VIP • PLATINUM</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --o: #d4af37; --n: #050505; --g: linear-gradient(180deg, #f9e498, #d4af37); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: var(--n); color: #fff; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        header { padding: 15px; text-align: center; cursor: pointer; flex-shrink: 0; }
        .logo { color: var(--o); font-size: 1.8rem; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; }
        
        .view { display: flex; width: 100%; max-width: 450px; margin: auto; height: 100%; flex-direction: column; padding: 10px 20px; animation: fadeIn 0.3s; overflow-y: auto; }

        /* MENÚ DE 4 BANDERAS REQUERIDO */
        .geo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; padding: 10px; background: #0f0f0f; border-radius: 12px; }
        .flag { width: 100%; height: 32px; opacity: 0.3; border-radius: 4px; cursor: pointer; object-fit: cover; border: 1px solid #333; transition: 0.3s; }
        .flag.active { opacity: 1; border-color: var(--o); box-shadow: 0 0 12px var(--o); }
        
        .card { background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 12px; padding: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .card.sel { border: 1px solid var(--o); background: rgba(212,175,55,0.1); }
        .card b { color: var(--o); font-size: 1.3rem; }

        .btn-gold { width: 100%; background: var(--g); color: #000 !important; border: none; padding: 22px; border-radius: 15px; font-weight: 900; margin: 15px 0; cursor: pointer; text-transform: uppercase; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn-sec { width: 100%; background: #111; color: #666; border: 1px solid #222; padding: 18px; border-radius: 12px; font-weight: 800; margin-bottom: 15px; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header onclick="adminAccess()">
    <div class="logo">FRAN CRUZ VIP</div>
    <div id="tagline" style="font-size: 0.75rem; color: #555; letter-spacing: 2px; margin-top: 5px;">SALA PRIVADA • COSTA RICA</div>
</header>

<div class="view">
    <div class="geo-grid">
        <img src="https://flagcdn.com/cr.svg" class="flag active" onclick="setLoc('COSTA RICA', '₡', 540)">
        <img src="https://flagcdn.com/ni.svg" class="flag" onclick="setLoc('NICARAGUA', 'C$', 37)">
        <img src="https://flagcdn.com/pa.svg" class="flag" onclick="setLoc('PANAMÁ', '$', 1)">
        <img src="https://flagcdn.com/un.svg" class="flag" onclick="setLoc('RESTO DEL MUNDO', '$', 1)">
    </div>
    
    <div class="card" onclick="selP(this, 'HOY')">
        <span>ACCESO HOY</span>
        <b id="p1">₡540</b>
    </div>
    
    <div class="card sel" onclick="selP(this, '30 DÍAS')">
        <span>30 DÍAS GOLD</span>
        <b id="p2">₡10,800</b>
    </div>
    
    <button type="button" class="btn-gold" onclick="requestAccess()">ENVIAR COMPROBANTE</button>
    
    <button type="button" class="btn-sec" onclick="enterWithKey()">YA TENGO MI CLAVE</button>
</div>

<script>
    // Configuración Base de Datos
    const firebaseConfig = { 
        apiKey: "AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE", 
        projectId: "fran-cruz-sala-vip",
        databaseURL: "https://fran-cruz-sala-vip-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myID = localStorage.getItem('fc_id') || 'VIP' + Math.floor(Math.random()*9000+1000);
    localStorage.setItem('fc_id', myID);
    
    let rates = { CR: 540, NI: 37 };
    let curSim = "₡", curTasa = 540, curP = "30 DÍAS", clicks = 0;

    // Escucha de Tasas en Tiempo Real
    db.ref('settings/rates').on('value', ss => {
        if(ss.exists()){
            rates = ss.val();
            updatePrices();
        }
    });

    function updatePrices() {
        document.getElementById('p1').innerText = curSim + Math.round(1 * curTasa).toLocaleString();
        document.getElementById('p2').innerText = curSim + Math.round(20 * curTasa).toLocaleString();
    }

    function setLoc(n, s, t) {
        curSim = s; 
        curTasa = (n === 'NICARAGUA') ? rates.NI : (n === 'COSTA RICA') ? rates.CR : t;
        document.getElementById('tagline').innerText = `SALA PRIVADA • ${n}`;
        document.querySelectorAll('.flag').forEach(f => f.classList.remove('active'));
        event.target.classList.add('active');
        updatePrices();
    }

    function requestAccess() {
        db.ref('users/' + myID).set({ id: myID, status: 'wait', plan: curP, time: Date.now() }).then(() => {
            window.location.href = `https://wa.me/50664535475?text=Pago VIP. ID: ${myID} - Plan: ${curP}`;
        });
    }

    function enterWithKey() {
        const k = prompt("INGRESA TU CLAVE:");
        if(!k) return;
        db.ref('users/'+k).once('value', ss => {
            if(ss.exists() && ss.val().status === 'active') {
                alert("Acceso concedido.");
                // Aquí se cargará la vista de galería en el siguiente paso
            } else {
                alert("Clave no activa.");
            }
        });
    }

    function adminAccess() {
        clicks++;
        if(clicks >= 5) {
            const p = prompt("ACCESO ADMINISTRADOR:");
            if(p === "1376") { 
                alert("Entrando al Panel...");
                // Aquí se activará el panel en el siguiente paso
            }
            clicks = 0;
        }
        setTimeout(() => clicks = 0, 2000);
    }

    function selP(el, p) { 
        curP = p; 
        document.querySelectorAll('.card').forEach(c => c.classList.remove('sel')); 
        el.classList.add('sel'); 
    }
</script>
</body>
</html>
