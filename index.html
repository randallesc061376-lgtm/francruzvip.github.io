<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRAN CRUZ VIP • CENTRAL OPERATIVA</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <style>
        :root { --o: #d4af37; --n: #050505; --g: linear-gradient(180deg, #f9e498, #d4af37); --r: #e74c3c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: var(--n); color: #fff; margin: 0; min-height: 100vh; }
        
        header { padding: 30px 20px; text-align: center; cursor: pointer; border-bottom: 1px solid #111; }
        .logo { color: var(--o); font-size: 2rem; font-weight: 900; letter-spacing: 4px; }
        
        .view { display: none; width: 100%; max-width: 420px; margin: auto; flex-direction: column; padding-bottom: 50px; animation: fadeIn 0.3s; }
        .view.active { display: flex; }

        /* INTERFAZ CLIENTE */
        .geo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px; padding: 10px; background: #0f0f0f; border-radius: 15px; }
        .flag { width: 100%; height: 25px; opacity: 0.4; border-radius: 4px; cursor: pointer; object-fit: cover; }
        .flag.active { opacity: 1; border: 1px solid var(--o); box-shadow: 0 0 10px var(--o); }
        .card { background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 12px; padding: 18px; margin: 0 20px 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .card.sel { border: 1px solid var(--o); background: rgba(212,175,55,0.08); }
        .card b { color: var(--o); font-size: 1.2rem; }
        .btn-gold { width: calc(100% - 40px); background: var(--g); color: #000; border: none; padding: 20px; border-radius: 14px; font-weight: 900; margin: 15px 20px; cursor: pointer; text-transform: uppercase; }

        /* PANEL ADMINISTRADOR PRO */
        .adm-sect { margin: 20px; background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 15px; padding: 15px; }
        .adm-label { font-size: 0.7rem; color: var(--o); font-weight: 800; text-transform: uppercase; display: block; margin-bottom: 10px; letter-spacing: 1px; }
        
        /* Lista Espera y Usuarios */
        .user-row { background: #000; border: 1px solid #222; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .user-info b { font-size: 0.9rem; color: #fff; }
        .user-info span { font-size: 0.65rem; color: #666; display: block; }
        .badge { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
        .badge.wait { background: var(--o); color: #000; }
        .badge.active { background: #2ecc71; color: #fff; }
        .badge.banned { background: var(--r); color: #fff; }

        /* Galería */
        .gal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .gal-item { position: relative; aspect-ratio: 1; border: 1px solid #222; border-radius: 5px; overflow: hidden; }
        .gal-item img { width: 100%; height: 100%; object-fit: cover; }
        .gal-del { position: absolute; top: 2px; right: 2px; background: var(--r); border: none; color: #fff; border-radius: 50%; width: 20px; height: 20px; font-size: 10px; cursor: pointer; }

        /* Tipos de Cambio */
        .tasa-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #111; }
        .tasa-row input { background: #111; border: 1px solid #333; color: var(--o); width: 80px; text-align: center; border-radius: 5px; padding: 5px; font-weight: bold; }

        .btn-adm { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 8px; font-size: 0.7rem; font-weight: bold; cursor: pointer; }
        .btn-approve { background: #2ecc71; color: #fff; border: none; }
        .btn-ban { background: var(--r); color: #fff; border: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body oncontextmenu="return false;">

<header onclick="adminAccess()">
    <div class="logo">FRAN CRUZ VIP</div>
    <div id="tagline" style="font-size: 0.7rem; color: #555; letter-spacing: 2px;">SALA PRIVADA • COSTA RICA</div>
</header>

<div id="v-client" class="view active">
    <div class="geo-grid">
        <img src="https://flagcdn.com/cr.svg" class="flag active" onclick="setLoc('COSTA RICA', '₡', 'cr')">
        <img src="https://flagcdn.com/ni.svg" class="flag" onclick="setLoc('NICARAGUA', 'C$', 'ni')">
        <img src="https://flagcdn.com/hn.svg" class="flag" onclick="setLoc('HONDURAS', 'L', 'hn')">
        <img src="https://flagcdn.com/gt.svg" class="flag" onclick="setLoc('GUATEMALA', 'Q', 'gt')">
        <img src="https://flagcdn.com/pa.svg" class="flag" onclick="setLoc('PANAMÁ', '$', 'usd')">
        <img src="https://flagcdn.com/un.svg" class="flag" onclick="setLoc('WORLDWIDE', '$', 'usd')">
    </div>
    <div id="pricing-area"></div>
    <button class="btn-gold" onclick="requestAccess()">ENVIAR COMPROBANTE DE PAGO</button>
</div>

<div id="v-admin" class="view">
    <div class="adm-sect">
        <span class="adm-label">Torre de Control de Usuarios</span>
        <div id="adm-user-list">Cargando...</div>
    </div>

    <div class="adm-sect">
        <span class="adm-label">Tipos de Cambio (vs USD)</span>
        <div id="adm-tasas-list"></div>
    </div>

    <div class="adm-sect">
        <span class="adm-label">Galería de Láminas</span>
        <input type="file" id="img-upload" style="display:none" onchange="uploadImg(this)">
        <button class="btn-adm" style="width:100%; margin-bottom:10px" onclick="document.getElementById('img-upload').click()">+ AGREGAR IMAGEN</button>
        <div id="adm-galery" class="gal-grid"></div>
    </div>

    <button class="btn-gold" style="background:#222; color:#fff" onclick="location.reload()">CERRAR PANEL</button>
</div>

<script>
    // CONFIGURACIÓN FIREBASE BLINDADA
    const firebaseConfig = { 
        apiKey: "AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE", 
        projectId: "fran-cruz-sala-vip",
        databaseURL: "https://fran-cruz-sala-vip-default-rtdb.firebaseio.com",
        storageBucket: "fran-cruz-sala-vip.appspot.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const st = firebase.storage();

    let curID = localStorage.getItem('fc_id') || 'UID-' + Math.random().toString(36).substr(2, 6).toUpperCase();
    localStorage.setItem('fc_id', curID);
    
    let tasas = { cr: 540, ni: 37, hn: 24.6, gt: 7.7, usd: 1 };
    let curCountry = 'cr', curSim = '₡', curPlan = '30 DÍAS', clicks = 0;

    // INICIO: CARGAR DATOS EN TIEMPO REAL
    function init() {
        db.ref('settings/tasas').on('value', ss => { if(ss.val()) { tasas = ss.val(); updateUI(); renderTasasAdm(); } });
        db.ref('gallery').on('value', ss => renderGalery(ss.val()));
        db.ref('users').on('value', ss => renderUsersAdm(ss.val()));
    }

    // GESTIÓN DE ADMINISTRACIÓN
    function adminAccess() {
        clicks++;
        if(clicks >= 5) {
            if(prompt("PASS TORRE:") === "1376") {
                document.getElementById('v-client').classList.remove('active');
                document.getElementById('v-admin').classList.add('active');
            }
            clicks = 0;
        }
        setTimeout(() => clicks = 0, 2000);
    }

    function renderUsersAdm(data) {
        const list = document.getElementById('adm-user-list'); list.innerHTML = "";
        if(!data) return list.innerHTML = "Sin solicitudes";
        Object.values(data).forEach(u => {
            list.innerHTML += `
                <div class="user-row">
                    <div class="user-info">
                        <b>${u.id}</b> <span class="badge ${u.status}">${u.status}</span>
                        <span>Plan: ${u.plan} | Clave: ${u.key || 'N/A'}</span>
                    </div>
                    <div>
                        ${u.status === 'wait' ? `<button class="btn-adm btn-approve" onclick="upStatus('${u.id}', 'active')">✓</button>` : ''}
                        <button class="btn-adm ${u.status==='banned'?'btn-approve':'btn-ban'}" onclick="upStatus('${u.id}', '${u.status==='banned'?'wait':'banned'}')">
                            ${u.status==='banned'?'UNBAN':'BAN'}
                        </button>
                    </div>
                </div>`;
        });
    }

    function renderTasasAdm() {
        const list = document.getElementById('adm-tasas-list'); list.innerHTML = "";
        Object.entries(tasas).forEach(([k, v]) => {
            if(k === 'usd') return;
            list.innerHTML += `<div class="tasa-row"><span>${k.toUpperCase()}</span><input type="number" value="${v}" onchange="upTasa('${k}', this.value)"></div>`;
        });
    }

    function renderGalery(data) {
        const grid = document.getElementById('adm-galery'); grid.innerHTML = "";
        if(!data) return;
        Object.entries(data).forEach(([id, url]) => {
            grid.innerHTML += `<div class="gal-item"><img src="${url}"><button class="gal-del" onclick="delImg('${id}')">X</button></div>`;
        });
    }

    // ACCIONES TÉCNICAS
    function upStatus(id, s) { db.ref('users/' + id).update({ status: s }); }
    function upTasa(k, v) { db.ref('settings/tasas/' + k).set(parseFloat(v)); }
    function delImg(id) { if(confirm("¿Borrar lámina?")) db.ref('gallery/' + id).remove(); }
    
    function uploadImg(input) {
        const file = input.files[0]; if(!file) return;
        const ref = st.ref('gallery/' + Date.now());
        ref.put(file).then(ss => ss.ref.getDownloadURL()).then(url => {
            db.ref('gallery').push(url);
            alert("Lámina agregada");
        });
    }

    // LÓGICA DE CLIENTE
    function setLoc(name, sim, key) { 
        curCountry = key; curSim = sim; 
        document.getElementById('tagline').innerText = `SALA PRIVADA • ${name}`;
        document.querySelectorAll('.flag').forEach(f => f.classList.remove('active'));
        event.target.classList.add('active');
        updateUI();
    }

    function updateUI() {
        const container = document.getElementById('pricing-area');
        const vals = [1, 5, 20];
        const labels = ['ACCESO HOY', '7 DÍAS SILVER', '30 DÍAS GOLD'];
        container.innerHTML = "";
        vals.forEach((v, i) => {
            const price = Math.round(v * tasas[curCountry]).toLocaleString();
            container.innerHTML += `
                <div class="card ${curPlan === labels[i] ? 'sel' : ''}" onclick="selP('${labels[i]}')">
                    <span>${labels[i]}</span><b>${curSim}${price}</b>
                </div>`;
        });
    }

    function selP(p) { curPlan = p; updateUI(); }

    function requestAccess() {
        const day = new Date().getDate().toString().padStart(2, '0');
        const dKey = `${curID.charAt(0)}${curID.charAt(1)}${day}`; // Lógica de clave dinámica
        db.ref('users/' + curID).set({ id: curID, status: 'wait', plan: curPlan, key: dKey, time: Date.now() });
        const msg = `Hola!\nPlan ${curPlan}\nID: ${curID}\n\nEsta es su clave: \`${dKey}\` (Toque para copiar)\nNuestro equipo válida su autorización\n\n⚠️Advertencia! Adjunte comprobante de pago`;
        window.location.href = `https://wa.me/50664535475?text=${encodeURIComponent(msg)}`;
    }

    init();
</script>
</body>
</html>
