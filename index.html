<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRAN CRUZ VIP</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <style>
        :root { --o: #d4af37; --n: #050505; --g: linear-gradient(180deg, #f9e498, #d4af37); --r: #8b0000; --v: #006400; }
        body { background: var(--n); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; user-select: none; }
        header { padding: 40px 20px 10px; text-align: center; width: 100%; box-sizing: border-box; cursor: pointer; }
        .logo { color: var(--o); font-size: 2.2rem; font-weight: 900; letter-spacing: 6px; text-transform: uppercase; }
        .tagline { color: #555; font-size: .7rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 5px; font-weight: bold; }
        .geo-bar { display: flex; justify-content: center; gap: 10px; margin: 20px 0; background: #0a0a0a; padding: 12px 18px; border-radius: 50px; border: 1px solid #111; }
        .flag { width: 28px; height: 19px; opacity: 0.3; transition: 0.3s; cursor: pointer; border: 1px solid transparent; }
        .flag.active { opacity: 1; border-color: var(--o); transform: scale(1.15); }
        .p { display: none; width: 100%; max-width: 400px; flex-direction: column; padding: 0 20px 40px; box-sizing: border-box; }
        .a { display: flex; }
        .plan-box { width: 100%; background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 12px; padding: 22px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; cursor: pointer; }
        .plan-box.sel { border-color: var(--o); background: rgba(212,175,55,0.03); }
        .plan-box b { color: var(--o); font-size: 1.2rem; }
        .method { width: 100%; background: #080808; border: 1px solid #151515; border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
        .method-h { padding: 18px; text-align: center; font-size: 0.85rem; font-weight: 900; color: #444; cursor: pointer; text-transform: uppercase; }
        .method-c { display: none; padding: 20px; text-align: center; border-top: 1px solid #151515; background: #050505; }
        .method.open .method-c { display: block; }
        .method.open .method-h { color: var(--o); background: #0c0c0c; }
        .btn-gold { width: 100%; background: var(--g); color: #000; border: none; padding: 20px; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 15px; }
        .admin-sec { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 15px; padding: 20px; margin-top: 20px; width: 100%; box-sizing: border-box; }
        .inp-admin { width: 100%; background: #000; border: 1px solid #222; padding: 12px; color: #fff; border-radius: 8px; margin-bottom: 8px; text-align: center; box-sizing: border-box; }
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .gallery-item { position: relative; aspect-ratio: 1; border-radius: 5px; overflow: hidden; border: 1px solid #222; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .del-btn { position: absolute; top: 2px; right: 2px; background: var(--r); color: #fff; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header id="adminTrigger">
    <div class="logo">FRAN CRUZ VIP</div>
    <div id="region-tag" class="tagline">SALA PRIVADA • COSTA RICA</div>
</header>

<div class="geo-bar">
    <img src="https://flagcdn.com/cr.svg" class="flag active" onclick="setRegion('COSTA RICA', '₡', 'cr', this)">
    <img src="https://flagcdn.com/ni.svg" class="flag" onclick="setRegion('NICARAGUA', 'C$', 'ni', this)">
    <img src="https://flagcdn.com/pa.svg" class="flag" onclick="setRegion('PANAMÁ', '$', 'usd', this)">
    <img src="https://flagcdn.com/hn.svg" class="flag" onclick="setRegion('HONDURAS', 'L', 'hn', this)">
    <img src="https://flagcdn.com/sv.svg" class="flag" onclick="setRegion('EL SALVADOR', '$', 'usd', this)">
    <img src="https://flagcdn.com/gt.svg" class="flag" onclick="setRegion('GUATEMALA', 'Q', 'gt', this)">
    <img src="https://flagcdn.com/bz.svg" class="flag" onclick="setRegion('BELICE', '$', 'usd', this)">
</div>

<div id="view-client" class="p a">
    <div id="planes-container"></div>
    <div style="color:var(--o); font-size:0.7rem; font-weight:900; margin:30px 0 15px; text-align:center; letter-spacing:2px;">MÉTODOS DE PAGO</div>
    
    <div class="method" onclick="tglM(this)">
        <div class="method-h">1. SINPE MÓVIL</div>
        <div class="method-c">
            <div id="txt-sinpe" style="font-size:1.3rem; font-weight:bold; margin-bottom:5px; color:var(--o);">Cargando...</div>
            <span id="txt-titular">Cargando...</span>
        </div>
    </div>
    <div class="method" onclick="tglM(this)">
        <div class="method-h">2. TRANSFERENCIA IBAN</div>
        <div class="method-c"><span id="txt-iban" style="font-size:0.8rem; word-break:break-all;">Cargando...</span></div>
    </div>
    <div class="method" onclick="tglM(this)">
        <div class="method-h">3. PAYPAL / CORREO</div>
        <div class="method-c"><span id="txt-paypal">Cargando...</span></div>
    </div>

    <button class="btn-gold" onclick="sendWA()">ENVIAR COMPROBANTE DE PAGO</button>
</div>

<div id="view-admin" class="p">
    <div style="color:var(--o); text-align:center; font-weight:900; letter-spacing:3px; margin-bottom:20px;">SISTEMA DE GESTIÓN</div>

    <div class="admin-sec">
        <span style="color:var(--o); font-size:0.7rem; font-weight:bold; letter-spacing:1px;">SUBIR LÁMINAS DEL DÍA</span>
        <input type="file" id="file" onchange="subirLamina(this)" style="margin-top:10px; width:100%; color:#555;">
        <div class="gallery-grid" id="admin-gallery"></div>
    </div>

    <div class="admin-sec">
        <span style="color:var(--o); font-size:0.7rem; font-weight:bold; letter-spacing:1px;">MIS DATOS DE ACTIVACIÓN</span>
        <input type="text" id="inp-wa" class="inp-admin" placeholder="WhatsApp (Ej: 50664535475)">
        <input type="text" id="inp-titular" class="inp-admin" placeholder="Nombre de Titular">
        <input type="text" id="inp-sinpe" class="inp-admin" placeholder="Número SINPE">
        <input type="text" id="inp-iban" class="inp-admin" placeholder="Cuenta IBAN">
        <input type="text" id="inp-mail" class="inp-admin" placeholder="Correo PayPal">
    </div>

    <div class="admin-sec">
        <span style="color:var(--o); font-size:0.7rem; font-weight:bold; letter-spacing:1px;">TIPOS DE CAMBIO</span>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
            <input type="number" id="inp-cr" class="inp-admin" placeholder="CR ₡">
            <input type="number" id="inp-ni" class="inp-admin" placeholder="NI C$">
            <input type="number" id="inp-hn" class="inp-admin" placeholder="HN L">
            <input type="number" id="inp-gt" class="inp-admin" placeholder="GT Q">
        </div>
        <button class="btn-gold" onclick="guardarTodo()">APLICAR CAMBIOS PERMANENTES</button>
    </div>

    <button class="btn-gold" style="background:#222; color:#fff;" onclick="location.reload()">VOLVER AL INICIO</button>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE",
      authDomain: "fran-cruz-sala-vip.firebaseapp.com",
      projectId: "fran-cruz-sala-vip",
      storageBucket: "fran-cruz-sala-vip.firebasestorage.app",
      messagingSenderId: "1022733043010",
      appId: "1:1022733043010:web:379db18e37bbfde2cf34db"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    let symbol = "₡", rate = 540, pSel = "30 DÍAS GOLD", uSel = 15;
    let currentRates = { cr: 540, ni: 36.5, pa: 1, hn: 24.7, sv: 1, gt: 7.8, bz: 1, usd: 1 };
    let settings = { wa: "50664535475", titular: "Randall Sánchez C.", sinpe: "6453 5475", iban: "CR80080315001000035641", mail: "randallesc061376@gmail.com" };

    // Fecha de hoy para el borrado automático (Formato: YYYY-MM-DD)
    const hoy = new Date().toISOString().split('T')[0];

    // Cargar y limpiar datos al iniciar
    db.ref('config').on('value', (snap) => {
        const data = snap.val();
        if(data) {
            if(data.rates) currentRates = {...currentRates, ...data.rates};
            if(data.settings) {
                settings = data.settings;
                document.getElementById('txt-sinpe').innerText = settings.sinpe;
                document.getElementById('txt-titular').innerText = settings.titular;
                document.getElementById('txt-iban').innerText = settings.iban;
                document.getElementById('txt-paypal').innerText = settings.mail;
            }
        }
        renderPlanes();
    });

    // SISTEMA DE BORRADO AUTOMÁTICO A MEDIANOCHE
    db.ref('gallery').on('value', snap => {
        snap.forEach(child => {
            const item = child.val();
            // Si la fecha de la lámina es distinta a la de hoy, se borra automáticamente
            if(item.fecha !== hoy) {
                db.ref('gallery/' + child.key).remove();
            }
        });
        loadGalleryUI(); // Recargar la vista del admin
    });

    function setRegion(name, sym, key, el) {
        symbol = sym; rate = currentRates[key] || 1;
        document.getElementById('region-tag').innerText = `SALA PRIVADA • ${name}`;
        document.querySelectorAll('.flag').forEach(f => f.classList.remove('active'));
        el.classList.add('active');
        renderPlanes();
    }

    function renderPlanes() {
        const cont = document.getElementById('planes-container'); cont.innerHTML = '';
        [{n:"HOY",u:1.5},{n:"7 DÍAS SILVER",u:5},{n:"30 DÍAS GOLD",u:15}].forEach(p => {
            const val = Math.round(p.u * rate).toLocaleString();
            cont.innerHTML += `<div class="plan-box ${p.n===pSel?'sel':''}" onclick="pSel='${p.n}';uSel=${p.u};renderPlanes()"><span>${p.n}</span><b>${symbol}${val}</b></div>`;
        });
    }

    function guardarTodo() {
        const newRates = {
            cr: document.getElementById('inp-cr').value || currentRates.cr,
            ni: document.getElementById('inp-ni').value || currentRates.ni,
            hn: document.getElementById('inp-hn').value || currentRates.hn,
            gt: document.getElementById('inp-gt').value || currentRates.gt
        };
        const newSettings = {
            wa: document.getElementById('inp-wa').value || settings.wa,
            titular: document.getElementById('inp-titular').value || settings.titular,
            sinpe: document.getElementById('inp-sinpe').value || settings.sinpe,
            iban: document.getElementById('inp-iban').value || settings.iban,
            mail: document.getElementById('inp-mail').value || settings.mail
        };
        db.ref('config').update({ rates: newRates, settings: newSettings }).then(() => alert("¡Datos actualizados!"));
    }

    function subirLamina(e) {
        const file = e.files[0];
        if(!file) return;
        const ref = storage.ref('laminas/' + Date.now() + "_" + file.name);
        ref.put(file).then(snap => snap.ref.getDownloadURL().then(url => {
            // Guardamos la lámina con la fecha de hoy
            db.ref('gallery').push({url: url, fecha: hoy});
            alert("Lámina cargada con éxito.");
        }));
    }

    function loadGalleryUI() {
        const grid = document.getElementById('admin-gallery');
        if(!grid) return;
        db.ref('gallery').once('value', snap => {
            grid.innerHTML = '';
            snap.forEach(child => {
                grid.innerHTML += `<div class="gallery-item"><img src="${child.val().url}"><button class="del-btn" onclick="borrarLamina('${child.key}')">✕</button></div>`;
            });
        });
    }

    function borrarLamina(key) {
        if(confirm("¿Eliminar lámina manualmente?")) db.ref('gallery/' + key).remove().then(() => loadGalleryUI());
    }

    function sendWA() {
        const val = Math.round(uSel * rate).toLocaleString();
        const msg = `Hola! He seleccionado el Plan de *${pSel}* por un valor de *${symbol}${val}*.\n\nAdjunto envío mi comprobante para la activación.`;
        window.location.href = `https://wa.me/${settings.wa}?text=${encodeURIComponent(msg)}`;
    }

    function tglM(e) { e.classList.toggle('open'); }

    // Acceso Admin (5 toques logo)
    let clicks = 0;
    document.getElementById('adminTrigger').onclick = () => {
        clicks++;
        if(clicks >= 5) {
            const p = prompt("PASSKEY:");
            if(p === "2026") {
                document.getElementById('view-client').classList.remove('a');
                document.getElementById('view-admin').classList.add('a');
                loadGalleryUI();
            }
            clicks = 0;
        }
        setTimeout(() => clicks = 0, 3000);
    };
</script>
</body>
</html>
