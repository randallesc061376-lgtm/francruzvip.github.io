<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>FRAN CRUZ VIP • SINPE OK V7</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <style>
        :root { --o: #d4af37; --n: #050505; --g: linear-gradient(180deg, #f9e498, #d4af37); --r: #ff4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: var(--n); color: #fff; margin: 0; min-height: 100vh; overflow-x: hidden; }
        header { padding: 12px 10px; text-align: center; cursor: pointer; border-bottom: 1px solid #111; }
        .logo { color: var(--o); font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; }
        .view { display: none; width: 100%; max-width: 420px; margin: auto; flex-direction: column; padding: 5px; animation: fadeIn 0.3s; }
        .view.active { display: flex; }

        .geo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin: 5px 8px; padding: 6px; background: #0f0f0f; border-radius: 8px; }
        .flag { width: 100%; height: 18px; opacity: 0.35; border-radius: 2px; cursor: pointer; object-fit: cover; }
        .flag.active { opacity: 1; border: 1px solid var(--o); box-shadow: 0 0 5px var(--o); }
        
        .card { background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 6px; padding: 8px 12px; margin: 0 8px 4px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; height: 38px; }
        .card.sel { border: 1px solid var(--o); background: rgba(212,175,55,0.1); }
        .card b { color: var(--o); font-size: 0.85rem; }

        .acc-item { border: 1px solid #1a1a1a; border-radius: 6px; margin: 0 8px 3px; overflow: hidden; }
        .acc-head { background: #111; padding: 6px 10px; font-size: 0.65rem; font-weight: bold; color: #555; cursor: pointer; display: flex; justify-content: space-between; }
        .acc-body { display: none; background: #080808; padding: 8px; border-top: 1px solid #1a1a1a; text-align: center; }
        .acc-body.active { display: block; }
        
        .titular { font-size: 0.7rem; color: var(--o); font-weight: 800; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; border-bottom: 1px solid #1a1a1a; padding-bottom: 5px; }
        .info-label { font-size: 0.6rem; color: #d4af37; text-transform: uppercase; margin-top: 6px; font-weight: 900; display: block; letter-spacing: 1px; }
        .copy-box { background: #111; padding: 8px; border-radius: 4px; margin: 2px 0; font-family: monospace; color: #fff; cursor: pointer; border: 1px dashed var(--o); font-size: 0.75rem; font-weight: bold; }
        
        .btn-gold { width: calc(100% - 16px); background: var(--g); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 900; margin: 6px 8px; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        .btn-outline { width: calc(100% - 16px); background: transparent; color: var(--o); border: 1px solid #222; padding: 8px; border-radius: 6px; font-weight: 700; margin: 0 8px 8px; cursor: pointer; font-size: 0.6rem; letter-spacing: 1px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

</body>
</html>
