<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fran Cruz VIP | Luxury Access</title>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<style>
:root{--oro:#d4af37;--negro:#050505;--cristal:rgba(255,255,255,0.04);--rojo:#ff4444}
body{background:var(--negro);color:#fff;font-family:'Segoe UI',sans-serif;margin:0;padding:0;text-align:center;user-select:none;overflow-x:hidden;width:100vw}
header{padding:35px 10px;background:linear-gradient(to bottom, #151515, #050505);border-bottom:1px solid #1a1a1a}
.logo{color:var(--oro);font-size:2.2rem;font-weight:900;letter-spacing:7px;text-transform:uppercase;text-shadow:0 0 15px rgba(212,175,55,0.3)}
.sub-logo{color:#666;font-size:0.6rem;letter-spacing:5px;margin-top:8px}
.banderas-centro{display:flex;justify-content:center;gap:12px;margin:20px 0;font-size:1.3rem}
.pantalla{display:none;min-height:100vh;width:100%;flex-direction:column;align-items:center;padding:15px;box-sizing:border-box}
.activa{display:flex}
.card-precio{background:var(--cristal);border:1px solid rgba(255,255,255,0.1);border-radius:20px;margin:10px auto;padding:22px;width:92%;max-width:390px;text-align:left;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:0.4s;box-sizing:border-box}
.card-precio span{display:block;color:#888;font-size:0.75rem;letter-spacing:2px;margin-bottom:6px}
.card-precio b{color:var(--oro);font-size:1.4rem;text-shadow:0 0 10px rgba(212,175,55,0.2)}
.card-oro{border:1px solid var(--oro);box-shadow:inset 0 0 15px rgba(212,175,55,0.1)}
.area-pago{background:rgba(10,10,10,0.9);border-radius:30px;padding:25px;width:92%;max-width:420px;margin-top:20px;border:1px solid rgba(212,175,55,0.2);box-sizing:border-box}
.tabs-pago{display:flex;justify-content:space-between;margin-bottom:25px;color:#555;font-size:0.8rem;font-weight:bold}
.tab-activa{color:var(--oro);border-bottom:2px solid var(--oro);padding-bottom:5px}
.info-detalle{color:#fff;font-size:1rem;margin:15px 0;font-weight:bold;word-break:break-all;letter-spacing:1px;min-height:1.5em}
.btn-accion{background:linear-gradient(135deg, var(--oro), #f9e498);color:#000;border:none;padding:20px;border-radius:15px;width:100%;font-weight:900;cursor:pointer;margin-top:10px;text-transform:uppercase;font-size:1rem;letter-spacing:1px;box-shadow:0 8px 15px rgba(0,0,0,0.3)}
.btn-negro{background:transparent;color:var(--oro);border:1px solid var(--oro);margin-top:15px}
#timer{font-size:5rem;color:var(--oro);margin:25px;font-weight:bold;text-shadow:0 0 25px var(--oro)}
.galeria-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;width:100%;padding:10px;box-sizing:border-box}
.contenedor-foto{position:relative;border-radius:12px;overflow:hidden;background:#111;aspect-ratio:1/1;border:1px solid #222}
.foto-vip{width:100%;height:100%;object-fit:cover}
.escudo{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10}
.admin-input{width:100%;padding:18px;margin:10px 0;background:#1a1a1a;border:1px solid var(--oro);color:#fff;border-radius:12px;box-sizing:border-box;font-size:1rem}
</style>
</head>
<body oncontextmenu="return false">
<header onclick="trucoAdmin()">
    <div class="logo">FRAN CRUZ</div>
    <div class="sub-logo">EXCLUSIVITY & PRIVACY</div>
    <div class="banderas-centro"><span>🇨🇷</span><span>🇵🇦</span><span>🇳🇮</span><span>🇬🇹</span><span>🇭🇳</span><span>🇸🇻</span><span>🇧🇿</span></div>
</header>

<div id="pantalla-inicio" class="pantalla activa">
    <div class="card-precio card-oro" onclick="selectPlan('HOY', 1)">
        <span>ACCESO HOY</span><b id="txt-p1">$1.00 (₡525)</b>
    </div>
    <div class="card-precio" onclick="selectPlan('7 DÍAS', 5)">
        <span>ACCESO 7 DÍAS</span><b id="txt-p7">$5.00 (₡2,625)</b>
    </div>
    <div class="card-precio" onclick="selectPlan('30 DÍAS', 15)">
        <span>ACCESO 30 DÍAS</span><b id="txt-p30">$15.00 (₡7,875)</b>
    </div>
    <div class="area-pago">
        <div class="tabs-pago">
            <span id="t-sinpe" class="tab-activa" onclick="setTab('SINPE')">SINPE</span>
            <span id="t-iban" onclick="setTab('IBAN')">IBAN</span>
            <span id="t-paypal" onclick="setTab('PAYPAL')">PAYPAL</span>
        </div>
        <div id="detalle-pago" class="info-detalle">70835833</div>
        <button class="btn-accion" onclick="sendWA()">ADQUIRIR MEMBRESÍA</button>
        <button class="btn-accion btn-negro" onclick="irAPaso('pantalla-pago')">YA TENGO MI CLAVE</button>
    </div>
</div>

<div id="pantalla-seguridad" class="pantalla">
    <h2 style="letter-spacing:5px; color:var(--oro)">VERIFICACIÓN DIAMANTE</h2>
    <div id="timer">15</div>
    <div id="status-ia" style="color:#666; font-size:0.8rem; letter-spacing:2px">VALIDANDO INTEGRIDAD DE LA SESIÓN...</div>
</div>

<div id="pantalla-pago" class="pantalla">
    <h3 style="letter-spacing:3px">ACCESO RESTRINGIDO</h3>
    <div class="area-pago" style="border-color:var(--oro)">
        <p style="font-size:0.75rem; color:#888; margin-bottom:15px">INGRESE SU CLAVE DINÁMICA</p>
        <input type="text" id="clave-cliente" class="admin-input" style="text-align:center; font-size:1.8rem; letter-spacing:10px; color:var(--oro)" placeholder="0000" maxlength="4">
        <button class="btn-accion" onclick="validarAcceso()">INGRESAR A LA SALA</button>
    </div>
    <button class="btn-accion btn-negro" onclick="irAPaso('pantalla-inicio')">CANCELAR</button>
</div>

<div id="pantalla-sala" class="pantalla">
    <h2 style="color:var(--oro); letter-spacing:4px; margin-bottom:25px">SALA VIP FRAN CRUZ</h2>
    <div id="lista-fotos" class="galeria-grid"></div>
    <button class="btn-accion btn-negro" onclick="location.reload()" style="margin:40px 0; width:85%">CERRAR SESIÓN</button>
</div>

<script>
const firebaseConfig={apiKey:"AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE",authDomain:"fran-cruz-sala-vip.firebaseapp.com",projectId:"fran-cruz-sala-vip",storageBucket:"fran-cruz-sala-vip.firebasestorage.app",messagingSenderId:"1022733043010",appId:"1:1022733043010:web:379db18e37bbfde2cf34db"};
firebase.initializeApp(firebaseConfig);const db=firebase.firestore();

let planActivo = "HOY"; let costoActivo = "$1.00";
let uidCliente = "UID-" + Math.random().toString(36).substr(2, 6).toUpperCase();

async function setupDivisas(){
    try {
        const res = await fetch('https://ipapi.co/json/'); const data = await res.json(); const c = data.country_code;
        const rates = {'CR':{n:'₡',v:525},'GT':{n:'Q',v:7.62},'HN':{n:'L',v:26.50},'NI':{n:'C$',v:36.70},'BZ':{n:'BZ$',v:2.01}};
        if(rates[c]){
            const r = rates[c];
            document.getElementById('txt-p1').innerText = `$1.00 (${r.n}${(1*r.v).toFixed(0)})`;
            document.getElementById('txt-p7').innerText = `$5.00 (${r.n}${(5*r.v).toFixed(0)})`;
            document.getElementById('txt-p30').innerText = `$15.00 (${r.n}${(15*r.v).toFixed(0)})`;
        }
    } catch(e) {}
}
setupDivisas();

function irAPaso(p){
    document.querySelectorAll('.pantalla').forEach(d=>d.classList.remove('activa'));
    document.getElementById(p).classList.add('activa');
}

function selectPlan(nom, usd){ 
    planActivo = nom; 
    costoActivo = `$${usd}.00`; 
    document.querySelectorAll('.card-precio').forEach(c=>c.classList.remove('card-oro')); 
    event.currentTarget.classList.add('card-oro'); 
}

function setTab(t){
    const d = document.getElementById('detalle-pago');
    document.querySelectorAll('.tabs-pago span').forEach(s=>s.classList.remove('tab-activa')); 
    event.target.classList.add('tab-activa');
    if(t==='SINPE') d.innerText = "70835833";
    else if(t==='IBAN') d.innerText = "CR80080315001000035641";
    else d.innerText = "randallesc061376@gmail.com";
}

function sendWA(){
    const hoy = new Date().getDate().toString().padStart(2,'0');
    // Clave dinámica: 2 dígitos azar + 2 dígitos del día
    const azar = Math.floor(10 + Math.random() * 89);
    const clave = azar + hoy;
    const txt = `*SOLICITUD VIP FRAN CRUZ*\nPlan: ${planActivo}\nID: ${uidCliente}\nClave: *${clave}*\n\n⚠️ *IMPORTANTE:* Debe adjuntar el comprobante de pago ahora para activar su acceso.`;
    window.open(`https://wa.me/50664535475?text=${encodeURIComponent(txt)}`, '_blank');
}

async function validarAcceso(){
    const v = document.getElementById('clave-cliente').value;
    const dia = new Date().getDate().toString().padStart(2,'0');
    
    const banCheck = await db.collection("baneos").doc(uidCliente).get();
    if(banCheck.exists && banCheck.data().baneado){
        alert("ACCESO DENEGADO: Su ID ha sido suspendido por el administrador.");
        return;
    }

    if(v.endsWith(dia) && v.length === 4){ iniciarSeguridad(); }
    else { alert("CLAVE INCORRECTA O EXPIRADA."); }
}

function iniciarSeguridad(){
    irAPaso('pantalla-seguridad');
    let s=15; const t=document.getElementById('timer'), st=document.getElementById('status-ia');
    const i=setInterval(()=>{
        s--; t.innerText=s;
        if(s==12) st.innerText = "CRUZANDO DATOS BANCARIOS...";
        if(s==8) st.innerText = "SINCRONIZANDO BASE DE DATOS...";
        if(s==4) st.innerText = "ESTABLECIENDO CONEXIÓN SEGURA...";
        if(s<=0){ clearInterval(i); irAPaso('pantalla-sala'); cargarFotos(false); }
    },1000);
}

function cargarFotos(a){
    const c=a?document.getElementById('lista-admin'):document.getElementById('lista-fotos');
    db.collection("galeria").orderBy("fecha","desc").onSnapshot(s=>{
        c.innerHTML='';
        s.forEach(doc=>{
            const x=doc.data(), v=document.createElement('div');
            v.className='contenedor-foto';
            v.innerHTML=`<div class="escudo"></div><img src="${x.url}" class="foto-vip">`;
            c.appendChild(v);
        });
    });
}
</script>
</body>
</html>
