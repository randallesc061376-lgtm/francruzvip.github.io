<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRAN CRUZ VIP • PANEL OFICIAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <style>
        :root { 
            --o: #d4af37; --n: #050505; --v: #2ecc71; --neon: #39FF14;
            --g: linear-gradient(180deg, #f9e498, #d4af37); 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--n); color: #fff; margin: 0; min-height: 100vh; user-select: none; }
        
        header { padding: 35px 20px; text-align: center; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .logo { color: var(--o); font-size: 2.4rem; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; text-shadow: 0 0 15px rgba(212,175,55,0.3); }

        .view { display: none; width: 100%; max-width: 450px; margin: auto; padding-bottom: 60px; animation: fadeIn 0.4s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* MÉTODOS DE PAGO CON BORDE NEÓN ACTIVO */
        .payment-card { 
            background: #0f0f0f; 
            padding: 18px; 
            border-radius: 14px; 
            margin: 15px 20px; 
            border: 2px solid var(--neon); 
            box-shadow: 0 0 12px rgba(57, 255, 20, 0.3);
            transition: 0.2s;
            cursor: pointer;
        }
        .payment-card:active { transform: scale(0.97); box-shadow: 0 0 20px var(--neon); }
        .payment-card small { color: #888; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
        .payment-card b { color: var(--o); font-size: 1.1rem; display: block; margin-top: 4px; word-break: break-all; }

        /* SELECCIÓN DE PLANES */
        .plan-item { 
            background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 12px; 
            padding: 22px 20px; margin: 0 20px 12px; 
            display: flex; justify-content: space-between; align-items: center; cursor: pointer; 
        }
        .plan-item.selected { border: 1px solid var(--o); background: rgba(212,175,55,0.1); }
        .plan-item span { font-weight: 600; font-size: 1rem; }
        .plan-item b { color: var(--o); font-size: 1.3rem; }

        /* ADMIN Y GALERÍA */
        .admin-section { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 15px; margin: 20px; padding: 20px; }
        .admin-section h3 { margin: 0 0 15px 0; font-size: 0.9rem; color: var(--o); text-transform: uppercase; }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .img-container { position: relative; aspect-ratio: 1/1; border-radius: 8px; overflow: hidden; border: 1px solid #222; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .del-btn { position: absolute; top: 2px; right: 2px; background: var(--r); color: #fff; border: none; border-radius: 4px; padding: 2px 6px; font-size: 10px; cursor: pointer; }

        .btn-main { width: calc(100% - 40px); background: var(--g); color: #000; border: none; padding: 22px; border-radius: 16px; font-weight: 900; margin: 10px 20px; cursor: pointer; text-transform: uppercase; font-size: 1rem; }
        .btn-sec { width: calc(100% - 40px); background: #111; color: #fff; border: 1px solid #333; padding: 16px; border-radius: 12px; margin: 5px 20px; cursor: pointer; font-weight: 700; }
        
        .flag-bar { display: flex; justify-content: space-around; padding: 20px; margin: 10px 20px; background: #0f0f0f; border-radius: 50px; }
        .flag-icon { width: 35px; height: 25px; border-radius: 4px; opacity: 0.3; transition: 0.3s; cursor: pointer; object-fit: cover; }
        .flag-icon.active { opacity: 1; transform: scale(1.2); box-shadow: 0 0 10px var(--o); }

        .progress-container { width: calc(100% - 40px); height: 8px; background: #222; margin: 10px 20px; border-radius: 10px; overflow: hidden; display: none; }
        .progress-bar { width: 0%; height: 100%; background: var(--v); transition: width 0.3s; }
    </style>
</head>
<body>

<header onclick="handleAdmin()">
    <div class="logo">FRAN CRUZ VIP</div>
</header>

<div id="v-main" class="view active">
    <div class="flag-bar">
        <img src="https://flagcdn.com/cr.svg" class="flag-icon" id="f-cr" onclick="changeCountry('cr')">
        <img src="https://flagcdn.com/ni.svg" class="flag-icon" id="f-ni" onclick="changeCountry('ni')">
        <img src="https://flagcdn.com/pa.svg" class="flag-icon" id="f-pa" onclick="changeCountry('pa')">
        <img src="https://flagcdn.com/us.svg" class="flag-icon" id="f-us" onclick="changeCountry('us')">
    </div>

    <div id="planes-container"></div>

    <div id="payment-methods">
        <div class="payment-card" onclick="copyText('randallesc061376@gmail.com')">
            <small>PAYPAL (Mundial)</small>
            <b>randallesc061376@gmail.com</b>
        </div>
        <div class="payment-card" onclick="copyText('70835833')">
            <small>SINPE MÓVIL (Costa Rica)</small>
            <b>70835833</b>
        </div>
        <div class="payment-card" onclick="copyText('CR80080315001000035641')">
            <small>IBAN MUTUAL (Transferencia)</small>
            <b>CR80080315001000035641</b>
        </div>
    </div>

    <button class="btn-main" onclick="openWhatsApp()">ENVIAR COMPROBANTE</button>
    <button class="btn-sec" onclick="checkAccess()">INGRESAR A MI SALA</button>
</div>

<div id="v-vip" class="view">
    <div style="padding: 20px; text-align: center;">
        <h2 style="color:var(--o); letter-spacing: 2px;">SALA VIP ACTIVA</h2>
        <p style="font-size: 0.8rem; color: #666;">Contenido actualizado diariamente</p>
    </div>
    <div id="vip-gallery-flow" style="padding: 0 10px;"></div>
    <button class="btn-sec" onclick="location.reload()">CERRAR SESIÓN</button>
</div>

<div id="v-admin" class="view">
    <div class="admin-section">
        <h3>1. CARGAR IMÁGENES (COMPRESIÓN ACTIVA)</h3>
        <div class="progress-container" id="p-cont"><div class="progress-bar" id="p-bar"></div></div>
        <input type="file" id="file-in" multiple accept="image/*" style="display:none" onchange="uploadLaminas(this)">
        <button class="btn-main" id="btn-up" onclick="document.getElementById('file-in').click()">+ CARGAR LÁMINA</button>
        <div id="admin-gallery-grid" class="gallery-grid"></div>
    </div>
    
    <div class="admin-section">
        <h3>2. CONFIGURACIÓN DE TASAS</h3>
        <div id="rates-list"></div>
        <button class="btn-main" style="padding:15px; font-size:0.8rem;" onclick="saveNewRates()">GUARDAR CAMBIOS GLOBAL</button>
    </div>

    <div class="admin-section">
        <h3>3. CLIENTES / CONTROL</h3>
        <div id="users-admin-list"></div>
    </div>
    <button class="btn-sec" onclick="location.reload()">SALIR DEL PANEL</button>
</div>

<script>
    // CONFIGURACIÓN OFICIAL
    const firebaseConfig = {
        apiKey: "AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE",
        projectId: "fran-cruz-sala-vip",
        databaseURL: "https://fran-cruz-sala-vip-default-rtdb.firebaseio.com",
        storageBucket: "fran-cruz-sala-vip.appspot.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database(), st = firebase.storage();

    let userCountry = 'cr', selectedPlan = '30 DÍAS GOLD', adminStep = 0;
    let localRates = { cr: 515, ni: 36.8, pa: 1, us: 1 };
    const myID = localStorage.getItem('fc_user_id') || 'USER-' + Math.random().toString(36).substr(2, 5).toUpperCase();
    localStorage.setItem('fc_user_id', myID);

    function init() {
        db.ref('rates').on('value', s => { if(s.val()) { localRates = s.val(); renderPlanes(); renderAdminRates(); } });
        db.ref('users/' + myID).on('value', s => { if(s.val()?.status === 'active') showView('v-vip'); });
        loadGallery();
        loadUsersAdmin();
        changeCountry('cr');
    }

    // GESTIÓN DE GALERÍA (RESTAURADA Y TRABAJABLE)
    async function uploadLaminas(el) {
        const files = Array.from(el.files);
        const btn = document.getElementById('btn-up');
        const pCont = document.getElementById('p-cont');
        const pBar = document.getElementById('p-bar');

        pCont.style.display = 'block';
        for(let i=0; i<files.length; i++) {
            const perc = Math.round(((i) / files.length) * 100);
            btn.innerText = `SUBIENDO ${i+1}/${files.length} (${perc}%)`;
            pBar.style.width = perc + '%';

            const name = Date.now() + "_" + i;
            const ref = st.ref('laminas/' + name);
            await ref.put(files[i]);
            const url = await ref.getDownloadURL();
            await db.ref('laminas').push({ url, name, date: Date.now() });
        }
        btn.innerText = "+ CARGAR LÁMINA";
        pBar.style.width = '100%';
        setTimeout(() => pCont.style.display = 'none', 2000);
    }

    function loadGallery() {
        db.ref('laminas').on('value', s => {
            const flow = document.getElementById('vip-gallery-flow');
            const grid = document.getElementById('admin-gallery-grid');
            flow.innerHTML = ''; grid.innerHTML = '';
            
            const data = [];
            s.forEach(child => { data.unshift({key: child.key, ...child.val()}); });

            data.forEach(item => {
                flow.innerHTML += `<img src="${item.url}" style="width:100%; border-radius:15px; margin-bottom:15px; border:1px solid #1a1a1a;">`;
                grid.innerHTML += `
                    <div class="img-container">
                        <button class="del-btn" onclick="deleteImg('${item.key}', '${item.name}')">ELIMINAR</button>
                        <img src="${item.url}">
                    </div>`;
            });
        });
    }

    function deleteImg(key, name) {
        if(confirm("¿Eliminar imagen?")) {
            st.ref('laminas/' + name).delete();
            db.ref('laminas/' + key).remove();
        }
    }

    // LÓGICA DE PRECIOS Y PLANES (ACTUALIZADO A $20)
    function renderPlanes() {
        const cont = document.getElementById('planes-container');
        cont.innerHTML = '';
        const symbol = userCountry === 'cr' ? '₡' : (userCountry === 'ni' ? 'C$' : '$');
        
        // Definición de precios base en USD
        const planes = [
            { id: 'HOY', n: 'ACCESO HOY', usd: 2 },
            { id: 'SILVER', n: '7 DÍAS SILVER', usd: 7 },
            { id: 'GOLD', n: '30 DÍAS GOLD', usd: 20 } // PRECIO ACTUALIZADO
        ];

        planes.forEach(p => {
            const price = Math.round(p.usd * localRates[userCountry]);
            cont.innerHTML += `
                <div class="plan-item ${selectedPlan === p.n ? 'selected' : ''}" onclick="selectPlan('${p.n}')">
                    <span>${p.n}</span>
                    <b>${symbol}${price.toLocaleString()}</b>
                </div>`;
        });
    }

    function selectPlan(n) { selectedPlan = n; renderPlanes(); }
    
    function changeCountry(c) {
        userCountry = c;
        document.querySelectorAll('.flag-icon').forEach(f => f.classList.remove('active'));
        document.getElementById('f-'+c).classList.add('active');
        renderPlanes();
    }

    // UTILIDADES
    function copyText(t) {
        navigator.clipboard.writeText(t);
        alert("Copiado al portapapeles");
    }

    function openWhatsApp() {
        const msg = encodeURIComponent(`Hola Fran Cruz, quiero activar mi plan:\n📍 Plan: ${selectedPlan}\n🆔 Mi ID: ${myID}\n\nAdjunto mi comprobante.`);
        window.location.href = `https://wa.me/50664535475?text=${msg}`;
    }

    function checkAccess() {
        db.ref('users/' + myID).once('value', s => {
            if(s.val()?.status === 'active') showView('v-vip');
            else alert("Tu acceso está en proceso de validación. Envía el comprobante por WhatsApp.");
        });
    }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    // ADMIN FUNCTIONS
    function handleAdmin() {
        adminStep++;
        if(adminStep >= 5) {
            const pass = prompt("ACCESO ADMINISTRADOR:");
            if(pass === "1376") showView('v-admin');
            adminStep = 0;
        }
    }

    function renderAdminRates() {
        const cont = document.getElementById('rates-list');
        cont.innerHTML = '';
        Object.keys(localRates).forEach(k => {
            cont.innerHTML += `
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <span style="text-transform:uppercase;">${k}:</span>
                    <input type="number" id="inp-${k}" value="${localRates[k]}" style="width:100px; background:#000; color:var(--o); border:1px solid var(--o); text-align:center;">
                </div>`;
        });
    }

    function saveNewRates() {
        const updates = {};
        Object.keys(localRates).forEach(k => {
            updates[k] = parseFloat(document.getElementById('inp-'+k).value);
        });
        db.ref('rates').set(updates).then(() => alert("Tasas actualizadas con éxito."));
    }

    function loadUsersAdmin() {
        db.ref('users').on('value', s => {
            const cont = document.getElementById('users-admin-list');
            cont.innerHTML = '';
            s.forEach(u => {
                cont.innerHTML += `
                    <div style="padding:10px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center;">
                        <small>${u.key}</small>
                        <button style="background:var(--v); color:#000; border:none; padding:5px 10px; border-radius:5px; font-weight:bold;" onclick="activateUser('${u.key}')">ACTIVAR</button>
                    </div>`;
            });
        });
    }

    function activateUser(id) { db.ref('users/' + id).update({ status: 'active' }); }

    init();
</script>

</body>
</html>
