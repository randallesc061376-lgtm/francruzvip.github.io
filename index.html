    <style>

<body oncontextmenu="return false">

<script>

async function sub(){

    });

async function bn(s){const i=document.getElementById('ub').value;if(i){await db.collection("baneos").doc(i).set({baneado:!!s});alert("OK");}}
function prot(){
    document.getElementById('mo').style.display='flex';let t=15;
