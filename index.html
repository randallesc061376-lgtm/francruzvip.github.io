<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRAN CRUZ VIP • OFICIAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --o: #d4af37; --n: #050505; --g: linear-gradient(180deg, #f9e498, #d4af37); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--n); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        header { padding: 35px 20px; text-align: center; width: 100%; z-index: 100; cursor: pointer; }
        .logo { color: var(--o); font-size: 2.2rem; font-weight: 900; letter-spacing: 4px; pointer-events: none; }
        .sub-logo { color: #666; font-size: 0.7rem; letter-spacing: 3px; margin-top: 8px; text-transform: uppercase; pointer-events: none; }

        .geo-bar { display: flex; justify-content: center; gap: 12px; margin-bottom: 25px; background: rgba(255,255,255,0.03); padding: 12px 20px; border-radius: 50px; border: 1px solid #111; z-index: 110; }
        .flag { width: 28px; height: 18px; opacity: 0.3; transition: 0.3s; cursor: pointer; border-radius: 2px; object-fit: cover; }
        .flag.active { opacity: 1; transform: scale(1.25); box-shadow: 0 0 15px var(--o); border: 1px solid #fff; }

        .view { display: none; width: 100%; max-width: 400px; flex-direction: column; align-items: center; padding: 0 20px 40px; animation: fadeIn 0.4s ease; }
        .view.active { display: flex; }

        .plan-box { width: 100%; background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 12px; padding: 18px 22px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; cursor: pointer; }
        .plan-box.sel { border-color: var(--o); background: rgba(212,175,55,0.05); }
        .plan-box b { color: var(--o); font-size: 1.3rem; pointer-events: none; }
        .plan-box span { pointer-events: none; }

        .method { width: 100%; background: #080808; border: 1px solid #151515; border-radius: 10px; margin-bottom: 10px; cursor: pointer; }
        .method-h { padding: 15px; font-size: 0.85rem; font-weight: 700; color: #555; text-align: center; pointer-events: none; }
        .method.open .method-h { color: var(--o); }
        .method-c { display: none; padding: 15px; text-align: center; border-top: 1px solid #111; color: #aaa; background: #020202; }
        .method.open .method-c { display: block; }

        .btn-gold { width: 100%; background: var(--g); color: #000; border: none; padding: 20px; border-radius: 14px; font-weight: 900; text-transform: uppercase; margin-top: 15px; cursor: pointer; letter-spacing: 1px; }
        .btn-gold:active { transform: scale(0.97); }

        /* Admin & Overlay */
        .admin-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 12px; padding: 15px; width: 100%; margin-bottom: 15px; }
        .inp-admin { width: 100%; background: #000; border: 1px solid #222; padding: 12px; color: #fff; border-radius: 8px; margin-top: 8px; text-align: center; }
        
        #toast { display: none; position: fixed; bottom: 30px; background: var(--g); color: #000; padding: 12px 25px; border-radius: 30px; font-weight: bold; z-index: 1000; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="toast"></div>

<header onclick="handleAdmin()">
    <div class="logo">FRAN CRUZ VIP</div>
    <div id="region-tag" class="sub-logo">SALA PRIVADA • COSTA RICA</div>
</header>

<div class="geo-bar">
    <img src="https://flagcdn.com/cr.svg" class="flag active" onclick="setLoc('COSTA RICA', '₡', 540, '70835833')">
    <img src="https://flagcdn.com/ni.svg" class="flag" onclick="setLoc('NICARAGUA', 'C$', 37, '50664535475')">
    <img src="https://flagcdn.com/un.svg" class="flag" onclick="setLoc('MUNDO', '$', 1, '70835833')">
</div>

<div id="v-client" class="view active">
    <div class="plan-box" onclick="selP(this, 'HOY')"><span>ACCESO HOY</span><b class="p-txt">₡540</b></div>
    <div class="plan-box" onclick="selP(this, '7 DÍAS')"><span>7 DÍAS SILVER</span><b class="p-txt">₡2,700</b></div>
    <div class="plan-box sel" onclick="selP(this, '30 DÍAS')"><span>30 DÍAS GOLD</span><b class="p-txt">₡8,100</b></div>

    <div style="margin: 20px 0 10px; font-size: 0.7rem; color: var(--o); font-weight: bold; letter-spacing: 2px;">MÉTODOS DE PAGO</div>
    
    <div class="method" onclick="this.classList.toggle('open')">
        <div class="method-h">1. SINPE MÓVIL (CR)</div>
        <div class="method-c"><span id="txt-sinpe">70835833</span><br><small>Randall Sánchez C.</small></div>
    </div>
    
    <div class="method" onclick="this.classList.toggle('open')">
        <div class="method-h">2. TRANSFERENCIA IBAN</div>
        <div class="method-c" style="font-size:0.75rem">CR80080315001000035641</div>
    </div>

    <button class="btn-gold" onclick="sendWasp()">SOLICITAR ACCESO VIP</button>
    <button style="background:none; border:none; color:#555; margin-top:25px; font-weight:700; cursor:pointer;" onclick="notify('REDIRIGIENDO A VALIDACIÓN...')">YA TENGO MI CLAVE</button>
</div>

<div id="v-admin" class="view">
    <div class="admin-card">
        <span style="color:var(--o); font-size:0.7rem; font-weight:bold;">CONFIGURACIÓN WHATSAPP</span>
        <input type="text" id="adm-phone" class="inp-admin" placeholder="Número Destino" value="50670835833">
    </div>
    <button class="btn-gold" onclick="saveAdmin()">GUARDAR CAMBIOS</button>
    <button onclick="location.reload()" style="background:none; border:none; color:#555; margin-top:15px; font-weight:bold;">SALIR</button>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE", authDomain: "fran-cruz-sala-vip.firebaseapp.com", projectId: "fran-cruz-sala-vip", storageBucket: "fran-cruz-sala-vip.firebasestorage.app", databaseURL: "https://fran-cruz-sala-vip-default-rtdb.firebaseio.com", appId: "1:1022733043010:web:379db18e37bbfde2cf34db" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let curTasa = 540;
    let curSim = "₡";
    let curPlan = "30 DÍAS";
    let curPais = "COSTA RICA";

    function setLoc(pais, sim, tasa, num) {
        curTasa = tasa; curSim = sim; curPais = pais;
        document.getElementById('region-tag').innerText = `SALA PRIVADA • ${pais}`;
        document.getElementById('txt-sinpe').innerText = num;
        document.querySelectorAll('.flag').forEach(f => f.classList.remove('active'));
        event.target.classList.add('active');
        
        const prices = [1, 5, 15];
        document.querySelectorAll('.p-txt').forEach((el, i) => {
            el.innerText = curSim + Math.round(prices[i] * curTasa).toLocaleString();
        });
    }

    function selP(el, p) {
        curPlan = p;
        document.querySelectorAll('.plan-box').forEach(b => b.classList.remove('sel'));
        el.classList.add('sel');
    }

    function sendWasp() {
        const phone = "50670835833"; // Tu número master
        const msg = encodeURIComponent(`Hola Fran Cruz VIP. Solicito activar el plan ${curPlan} desde ${curPais}. Adjunto mi comprobante.`);
        notify("ABRIENDO WHATSAPP...");
        setTimeout(() => {
            window.location.href = `https://wa.me/${phone}?text=${msg}`;
        }, 1000);
    }

    function notify(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    let clk = 0;
    function handleAdmin() {
        clk++;
        if(clk >= 5) {
            document.getElementById('v-client').classList.remove('active');
            document.getElementById('v-admin').classList.add('active');
            clk = 0;
        }
        setTimeout(() => clk = 0, 2000);
    }

    function saveAdmin() {
        db.ref('config/phone').set(document.getElementById('adm-phone').value).then(() => {
            notify("✅ WHATSAPP ACTUALIZADO");
            setTimeout(() => location.reload(), 1500);
        });
    }
</script>
</body>
</html>
