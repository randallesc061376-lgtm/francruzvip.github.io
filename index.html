<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala VIP Fran Cruz</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --oro: #d4af37;
            --negro-vip: #0a0a0a;
            --blanco-suave: #f4f4f4;
        }

        body {
            background-color: var(--negro-vip);
            color: var(--blanco-suave);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--oro);
            background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
        }

        h1 {
            color: var(--oro);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0;
            font-size: 1.5rem;
        }

        #galeria-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
            width: 90%;
            max-width: 1200px;
        }

        .foto-card {
            background: #151515;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .foto-card:hover {
            transform: scale(1.02);
            border-color: var(--oro);
        }

        .foto-card img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            display: block;
        }

        .foto-info {
            padding: 10px;
            font-size: 0.8rem;
            text-align: center;
            color: #888;
        }

        .no-fotos {
            text-align: center;
            padding: 50px;
            color: #555;
        }
    </style>
</head>
<body>

    <header>
        <h1>Sala VIP Fran Cruz</h1>
    </header>

    <div id="galeria-container">
        <div class="no-fotos">Conectando con la base de datos...</div>
    </div>    <script>
        // Configuración de tu proyecto (Llave de conexión)
        const firebaseConfig = {
            apiKey: "AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE",
            authDomain: "fran-cruz-sala-vip.firebaseapp.com",
            projectId: "fran-cruz-sala-vip",
            storageBucket: "fran-cruz-sala-vip.firebasestorage.app",
            messagingSenderId: "1022733043010",
            appId: "1:1022733043010:web:379db18e37bbfde2cf34db"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Referencia al contenedor de la galería
        const galeriaContainer = document.getElementById('galeria-container');

        // Función para escuchar cambios en Firestore en tiempo real
        db.collection("galeria").orderBy("fecha", "desc")
            .onSnapshot((querySnapshot) => {
                // Limpiar contenedor antes de cargar
                galeriaContainer.innerHTML = '';

                if (querySnapshot.empty) {
                    galeriaContainer.innerHTML = '<div class="no-fotos">Aún no hay fotos en la Sala VIP.</div>';
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const datos = doc.data();
                    
                    // Solo crear la tarjeta si hay una URL válida
                    if (datos.url) {
                        const card = document.createElement('div');
                        card.className = 'foto-card';

                        // Estructura de la foto
                        card.innerHTML = `
                            <img src="${datos.url}" alt="Foto VIP" onerror="this.src='https://via.placeholder.com/400x500?text=Error+al+cargar+imagen'">
                            <div class="foto-info">Publicado: ${datos.fecha ? datos.fecha.toDate().toLocaleDateString() : 'Reciente'}</div>
                        `;

                        galeriaContainer.appendChild(card);
                    }
                });
            }, (error) => {
                console.error("Error al conectar con Firestore: ", error);
                galeriaContainer.innerHTML = '<div class="no-fotos">Error de conexión. Verifica las reglas de seguridad.</div>';
            });
    </script>
</body>
</html>
