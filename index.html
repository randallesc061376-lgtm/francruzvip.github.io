<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRAN CRUZ VIP • GESTIÓN TOTAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <style>
        :root { --o: #d4af37; --n: #050505; --g: linear-gradient(180deg, #f9e498, #d4af37); --r: #ff4444; --v: #00c851; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--n); color: #fff; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        header { padding: 10px; text-align: center; cursor: pointer; flex-shrink: 0; }
        .logo { color: var(--o); font-size: 1.8rem; font-weight: 900; letter-spacing: 3px; }
        
        .view { display: none; width: 100%; max-width: 450px; margin: auto; height: 100%; flex-direction: column; padding: 10px; animation: fadeIn 0.3s; overflow-y: auto; }
        .view.active { display: flex; }

        .geo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 10px 0; }
        .flag { width: 100%; height: 28px; opacity: 0.3; border-radius: 4px; cursor: pointer; object-fit: cover; border: 1px solid #333; }
        .flag.active { opacity: 1; border-color: var(--o); box-shadow: 0 0 10px var(--o); }
        
        .card { background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 12px; padding: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .card.sel { border: 1px solid var(--o); background: rgba(212,175,55,0.1); }
        .card b { color: var(--o); font-size: 1.2rem; }

        .btn-gold { width: 100%; background: var(--g); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: 900; margin: 10px 0; cursor: pointer; text-transform: uppercase; font-size: 1rem; }
        .btn-sec { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 5px; }

        /* --- ESTILOS ADMIN MEJORADOS --- */
        .adm-card { background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 15px; padding: 15px; margin-bottom: 12px; }
        .adm-label { color: var(--o); font-size: 0.8rem; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; display: block; border-left: 4px solid var(--o); padding-left: 10px; }
        .user-row { background: #000; border: 1px solid #222; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
        .adm-input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 14px; border-radius: 10px; margin-bottom: 10px; font-size: 1rem; }
        
        .prog-bar { width: 100%; height: 6px; background: #111; border-radius: 10px; margin: 10px 0; display: none; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--v); width: 0%; transition: 0.3s; }
        .preview-img { width: 100%; max-height: 200px; object-fit: contain; border-radius: 10px; margin-bottom: 10px; display: none; border: 1px solid #333; }

        .btn-act { color: var(--v); font-weight: 800; background: none; border: none; cursor: pointer; }
        .btn-ban { color: var(--r); font-weight: 800; background: none; border: none; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header onclick="adminAccess()">
    <div class="logo">FRAN CRUZ VIP</div>
    <div id="tagline" style="font-size: 0.7rem; color: #666; letter-spacing: 2px;">SALA PRIVADA • COSTA RICA</div>
</header>

<div id="v-client" class="view active">
    <div class="geo-grid">
        <img src="https://flagcdn.com/cr.svg" class="flag active" onclick="setLoc('COSTA RICA', '₡', 540)">
        <img src="https://flagcdn.com/ni.svg" class="flag" onclick="setLoc('NICARAGUA', 'C$', 37)">
        <img src="https://flagcdn.com/pa.svg" class="flag" onclick="setLoc('PANAMÁ', '$', 1)">
        <img src="https://flagcdn.com/un.svg" class="flag" onclick="setLoc('RESTO DEL MUNDO', '$', 1)">
    </div>
    
    <div class="card" onclick="selP(this, 'HOY')"><span>ACCESO HOY</span><b id="p1">₡540</b></div>
    <div class="card sel" onclick="selP(this, '30 DÍAS')"><span>30 DÍAS GOLD</span><b id="p2">₡10,800</b></div>
    
    <button type="button" class="btn-gold" style="z-index:99" onclick="requestAccess()">ENVIAR COMPROBANTE</button>
    <button type="button" class="btn-sec" onclick="enterWithKey()">YA TENGO MI CLAVE</button>
</div>

<div id="v-admin" class="view">
    <div class="adm-card">
        <span class="adm-label">Control de Usuarios</span>
        <input type="text" id="adm-search" class="adm-input" placeholder="Buscar por ID...">
        <div id="admin-user-list" style="max-height: 200px; overflow-y: auto;"></div>
    </div>

    <div class="adm-card">
        <span class="adm-label">Publicar en Galería</span>
        <img id="img-prev" class="preview-img">
        <input type="file" id="f-upload" class="adm-input" accept="image/*" onchange="preview(this)">
        <div class="prog-bar" id="p-bar"><div class="prog-fill" id="p-fill"></div></div>
        <button class="btn-gold" style="margin:0" id="btn-up" onclick="uploadImg()">SUBIR AHORA</button>
    </div>

    <div class="adm-card">
        <span class="adm-label">Tasas ($1 USD)</span>
        <div style="display:flex; gap:10px">
            <input type="number" id="t-cr" class="adm-input" placeholder="CRC ₡">
            <input type="number" id="t-ni" class="adm-input" placeholder="NIO C$">
        </div>
        <button class="btn-gold" style="background:#222; color:#fff" onclick="saveRates()">ACTUALIZAR TASAS</button>
    </div>
    <button class="btn-sec" onclick="location.reload()">CERRAR PANEL</button>
</div>

<div id="v-gallery" class="view">
    <div id="vip-grid" style="display:grid; grid-template-columns: repeat(2, 1fr); gap:10px; padding-bottom:30px;"></div>
    <button class="btn-sec" onclick="location.reload()">SALIR DE SALA</button>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE", 
        projectId: "fran-cruz-sala-vip",
        databaseURL: "https://fran-cruz-sala-vip-default-rtdb.firebaseio.com",
        storageBucket: "fran-cruz-sala-vip.firebasestorage.app" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const st = firebase.storage();

    let myID = localStorage.getItem('fc_id') || 'VIP' + Math.floor(Math.random()*9000+1000);
    localStorage.setItem('fc_id', myID);
    
    let rates = { CR: 540, NI: 37 };
    let curSim = "₡", curTasa = 540, curP = "30 DÍAS", clicks = 0;

    // Sincronización de Tasas en tiempo real
    db.ref('settings/rates').on('value', ss => {
        if(ss.exists()){
            rates = ss.val();
            document.getElementById('t-cr').value = rates.CR;
            document.getElementById('t-ni').value = rates.NI;
            updatePrices();
        }
    });

    function updatePrices() {
        document.getElementById('p1').innerText = curSim + Math.round(1 * curTasa).toLocaleString();
        document.getElementById('p2').innerText = curSim + Math.round(20 * curTasa).toLocaleString();
    }

    function setLoc(n, s, t) {
        curSim = s; 
        curTasa = (n === 'NICARAGUA') ? rates.NI : (n === 'COSTA RICA') ? rates.CR : t;
        document.getElementById('tagline').innerText = `SALA PRIVADA • ${n}`;
        document.querySelectorAll('.flag').forEach(f => f.classList.remove('active'));
        event.target.classList.add('active');
        updatePrices();
    }

    function saveRates(){
        const CR = document.getElementById('t-cr').value;
        const NI = document.getElementById('t-ni').value;
        db.ref('settings/rates').set({ CR, NI }).then(() => alert("✅ Tasas actualizadas en el sistema"));
    }

    function preview(input) {
        const file = input.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = e => { 
                const p = document.getElementById('img-prev');
                p.src = e.target.result; p.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    }

    function uploadImg() {
        const file = document.getElementById('f-upload').files[0];
        if(!file) return alert("Selecciona una imagen");
        
        const btn = document.getElementById('btn-up');
        const bar = document.getElementById('p-bar');
        const fill = document.getElementById('p-fill');
        
        btn.disabled = true; bar.style.display = 'block';
        
        const ref = st.ref('laminas/' + Date.now());
        const task = ref.put(file);

        task.on('state_changed', 
            s => { fill.style.width = (s.bytesTransferred / s.totalBytes * 100) + '%'; },
            e => alert(e.message),
            () => {
                task.snapshot.ref.getDownloadURL().then(url => {
                    // Guardamos con timestamp invertido para que la última sea la primera
                    db.ref('gallery').push({ url, time: -Date.now() });
                    alert("✅ Publicado con éxito");
                    location.reload();
                });
            }
        );
    }

    function loadAdminUsers() {
        db.ref('users').on('value', ss => {
            const list = document.getElementById('admin-user-list'); list.innerHTML = "";
            ss.forEach(u => {
                const user = u.val();
                list.innerHTML += `<div class="user-row">
                    <span><b>${user.id}</b> <small>(${user.status})</small></span>
                    <div>
                        <button class="btn-act" onclick="updateUser('${user.id}', 'active')">OK</button>
                        <button class="btn-ban" onclick="updateUser('${user.id}', 'banned')">BAN</button>
                    </div>
                </div>`;
            });
        });
    }

    function updateUser(id, stat) { db.ref('users/'+id).update({status: stat}); }

    function requestAccess() {
        db.ref('users/' + myID).set({ id: myID, status: 'wait', plan: curP, time: Date.now() }).then(() => {
            window.location.href = `https://wa.me/50664535475?text=Pago VIP. ID: ${myID} - Plan: ${curP}`;
        });
    }

    function enterWithKey() {
        const k = prompt("TU ID O CLAVE:");
        if(!k) return;
        db.ref('users/'+k).once('value', ss => {
            if(ss.exists() && ss.val().status === 'active') { showGallery(); }
            else if(ss.val()?.status === 'banned') { alert("❌ Acceso denegado (Baneado)"); }
            else { alert("Pendiente de activación o ID incorrecto."); }
        });
    }

    function showGallery() {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('v-gallery').classList.add('active');
        db.ref('gallery').orderByChild('time').on('value', ss => {
            const grid = document.getElementById('vip-grid'); grid.innerHTML = "";
            ss.forEach(img => { 
                grid.innerHTML += `<div style="border-radius:12px; overflow:hidden; border:1px solid #222">
                    <img src="${img.val().url}" style="width:100%; display:block">
                </div>`;
            });
        });
    }

    function adminAccess() {
        clicks++;
        if(clicks >= 5) {
            if(prompt("PASS:") === "1376") {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.getElementById('v-admin').classList.add('active');
                loadAdminUsers();
            }
            clicks = 0;
        }
        setTimeout(() => clicks = 0, 2000);
    }

    function selP(el, p) { curP = p; document.querySelectorAll('.card').forEach(c => c.classList.remove('sel')); el.classList.add('sel'); }
</script>
</body>
</html>
