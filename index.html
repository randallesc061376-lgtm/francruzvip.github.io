<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fran Cruz | Elite VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap');
        :root { --gold: #d4af37; --dark-bg: #000; --card-bg: #0a0a0a; }
        body { font-family: 'Poppins', sans-serif; background: #000; color: white; margin: 0; padding: 15px; text-align: center; -webkit-tap-highlight-color: transparent; }
        .font-luxury { font-family: 'Cinzel', serif; }
        .gold-text { background: linear-gradient(to bottom, #f9e2af 0%, #d4af37 50%, #a67c00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Estilos Consola Reparada */
        .admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #050505; border: 1px solid var(--gold); padding: 25px; border-radius: 35px; z-index: 9999; width: 94%; max-width: 450px; max-height: 85vh; overflow-y: auto; box-shadow: 0 0 50px rgba(0,0,0,0.9); }
        .admin-input { background: #111; border: 1px solid #222; color: white; padding: 12px 15px; border-radius: 15px; width: 100%; margin-bottom: 12px; font-size: 13px; outline: none; }
        .admin-input:focus { border-color: var(--gold); }
        .admin-label { display: block; text-align: left; font-[6px] uppercase tracking-widest opacity-40 mb-1 ml-2 font-bold; }

        .plan-card { background: var(--card-bg); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid #1a1a1a; transition: 0.3s; }
        .plan-card.active { border-color: var(--gold); background: #120f05; }
        
        .loader-ring { width: 60px; height: 60px; border: 3px solid #111; border-top: 3px solid var(--gold); border-radius: 50%; animation: spin 1s infinite linear; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #ia-fill { width: 0%; height: 100%; background: var(--gold); transition: width 45s linear; }
        .method-tab { cursor: pointer; opacity: 0.4; padding: 12px; border-bottom: 2px solid transparent; flex: 1; font-size: 10px; font-weight: bold; }
        .method-tab.active-tab { opacity: 1; color: var(--gold); border-bottom-color: var(--gold); }

        .hidden { display: none !important; }
        .preview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .receipt-thumb { width: 100%; height: 60px; object-fit: cover; border-radius: 10px; border: 1px solid #222; }
    </style>
</head>
<body>

    <header class="mt-6 mb-8" onclick="handleAdminClicks()">
        <h1 class="font-luxury text-4xl gold-text tracking-[0.2em] uppercase">Fran Cruz</h1>
        <p class="text-[9px] tracking-[0.5em] uppercase opacity-40 mt-2 font-bold">El Personaje del Azar</p>
    </header>

    <div id="main-interface">
        <div class="flex gap-4 mb-8 justify-center flex-wrap px-2">
            <span onclick="setCountry('CR')" id="f-CR" class="text-3xl opacity-30 active">🇨🇷</span>
            <span onclick="setCountry('NI')" id="f-NI" class="text-3xl opacity-30">🇳🇮</span>
            <span onclick="setCountry('PA')" id="f-PA" class="text-3xl opacity-30">🇵🇦</span>
            <span onclick="setCountry('HN')" id="f-HN" class="text-3xl opacity-30">🇭🇳</span>
            <span onclick="setCountry('SV')" id="f-SV" class="text-3xl opacity-30">🇸🇻</span>
            <span onclick="setCountry('GT')" id="f-GT" class="text-3xl opacity-30">🇬🇹</span>
            <span onclick="setCountry('US')" id="f-US" class="text-3xl opacity-30">🇺🇸</span>
        </div>

        <div class="max-w-sm mx-auto px-4 mb-8">
            <div onclick="setPlan(1)" id="p-1" class="plan-card"><p class="text-[8px] uppercase opacity-40 mb-1">Diario</p><h3 class="text-lg font-bold">Membresía Hoy <span class="gold-text">$1</span></h3></div>
            <div onclick="setPlan(5)" id="p-5" class="plan-card active"><p class="text-[8px] uppercase opacity-40 mb-1">7 Días</p><h3 class="text-lg font-bold">Senda Ganadora <span class="gold-text">$5</span></h3></div>
            <div onclick="setPlan(15)" id="p-15" class="plan-card"><p class="text-[8px] uppercase opacity-40 mb-1">Mensual</p><h3 class="text-lg font-bold">VIP Mensual <span class="gold-text">$15</span></h3></div>
        </div>

        <div class="max-w-sm mx-auto bg-[#050505] rounded-[35px] p-6 border border-white/5">
            <div class="flex border-b border-white/5 mb-6">
                <div onclick="setMethod('sinpe')" id="m-sinpe" class="method-tab active-tab uppercase">SINPE</div>
                <div onclick="setMethod('transfer')" id="m-transfer" class="method-tab uppercase">IBAN</div>
                <div onclick="setMethod('paypal')" id="m-paypal" class="method-tab uppercase">PAYPAL</div>
            </div>
            <div class="mb-6 h-14 flex flex-col justify-center">
                <p id="pay-data" class="text-xl font-bold gold-text uppercase">---</p>
                <p id="pay-titular" class="text-[8px] opacity-40 uppercase font-bold mt-1">---</p>
            </div>
            <p id="final-price" class="text-5xl font-bold text-yellow-500 tracking-tighter mb-6">---</p>
            <input type="file" id="receipt-upload" accept="image/*" class="hidden" onchange="startValidation(this)">
            <button onclick="document.getElementById('receipt-upload').click()" class="w-full bg-white text-black font-bold py-5 rounded-2xl uppercase text-[10px] tracking-widest active:scale-95 transition-all">Validar Comprobante con IA</button>
        </div>
    </div>

    <div id="ia-screen" class="hidden max-w-sm mx-auto pt-10 px-6">
        <h2 class="font-luxury text-2xl gold-text mb-2 uppercase tracking-widest italic">Verificando</h2>
        <div class="loader-ring"></div>
        <div class="bg-[#0a0a0a] p-8 rounded-[35px] border border-white/5">
            <p id="ia-status" class="text-[9px] italic gold-text mb-4 h-10 flex items-center justify-center">Iniciando protocolo...</p>
            <div class="w-full h-1 bg-black rounded-full overflow-hidden"><div id="ia-fill"></div></div>
        </div>
        <div id="success-box" class="mt-8 hidden">
            <i class="fas fa-check-circle text-4xl text-yellow-500 mb-4"></i>
            <button onclick="enterVIP()" class="w-full bg-yellow-600 text-white py-6 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-2xl">Obtener mis Láminas</button>
        </div>
    </div>

    <div id="vip-interface" class="hidden max-w-md mx-auto pt-4 px-4 text-left">
        <div class="flex justify-between items-center mb-8 border-b border-white/5 pb-4">
            <h2 class="font-luxury text-2xl gold-text">Círculo VIP</h2>
            <button onclick="location.reload()" class="text-[9px] uppercase opacity-50">Cerrar</button>
        </div>
        <div id="vip-gallery" class="grid grid-cols-2 gap-4"></div>
    </div>

    <div id="admin-modal" class="admin-panel">
        <h3 class="gold-text font-bold text-sm mb-6 uppercase tracking-[0.2em] font-luxury">Consola Administrativa</h3>
        
        <label class="admin-label">Titular de Cuenta</label>
        <input type="text" id="adm-titular" class="admin-input" placeholder="Nombre completo">
        
        <label class="admin-label">Número SINPE</label>
        <input type="text" id="adm-sinpe" class="admin-input" placeholder="Ej: 6453...">
        
        <label class="admin-label">Cuenta IBAN</label>
        <input type="text" id="adm-iban" class="admin-input" placeholder="CR80...">
        
        <label class="admin-label">Tasas de Cambio</label>
        <div class="grid grid-cols-4 gap-2 mb-4">
            <input type="number" id="rate-CR" class="admin-input text-center mb-0" placeholder="CR">
            <input type="number" id="rate-NI" class="admin-input text-center mb-0" placeholder="NI">
            <input type="number" id="rate-GT" class="admin-input text-center mb-0" placeholder="GT">
            <input type="number" id="rate-HN" class="admin-input text-center mb-0" placeholder="HN">
        </div>

        <label class="admin-label">Láminas del Día</label>
        <input type="file" id="vault-input" multiple accept="image/*" class="hidden" onchange="handleVaultUpload(this)">
        <button onclick="document.getElementById('vault-input').click()" class="w-full bg-white/5 border border-white/10 text-white py-3 rounded-xl text-[10px] font-bold uppercase mb-4">Abrir Galería</button>
        <div id="vault-preview" class="preview-grid mb-4"></div>

        <label class="admin-label">Bodega de Comprobantes</label>
        <div id="receipt-vault" class="preview-grid mb-6 p-2 bg-white/5 rounded-xl min-h-[50px]"></div>

        <button onclick="saveAdminData()" class="w-full bg-yellow-600 text-white py-4 rounded-xl font-bold uppercase text-[10px] tracking-widest shadow-lg">Sincronizar Todo</button>
        <button onclick="document.getElementById('admin-modal').style.display='none'" class="w-full text-gray-600 text-[8px] mt-4 uppercase font-bold">Cerrar Consola</button>
    </div>

    <script>
        let adminTimer = 0;
        let currentPlan = 5;
        let currentCountry = 'CR';
        let currentMethod = 'sinpe';

        const storage = JSON.parse(localStorage.getItem('fc_master_final')) || {
            titular: "Randall Esteban Sánchez",
            sinpe: "64535475",
            iban: "CR80080315001000035641",
            paypal: "pagos@francruz.com",
            rates: { CR: 525, NI: 36.5, GT: 7.8, HN: 24.5, USD: 1 },
            vault: [],
            receipt_vault: [],
            date: new Date().toDateString()
        };

        function setCountry(c) {
            currentCountry = c;
            document.querySelectorAll('#main-interface span').forEach(b => b.style.opacity = '0.3');
            document.getElementById('f-'+c).style.opacity = '1';
            refreshPricing();
        }

        function setPlan(p) {
            currentPlan = p;
            document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('active'));
            document.getElementById('p-'+p).classList.add('active');
            refreshPricing();
        }

        function setMethod(m) {
            currentMethod = m;
            document.querySelectorAll('.method-tab').forEach(t => t.classList.remove('active-tab'));
            document.getElementById('m-'+m).classList.add('active-tab');
            refreshPricing();
        }

        function refreshPricing() {
            const sym = { CR: '₡', NI: 'C$', GT: 'Q', HN: 'L', PA: '$', SV: '$', US: '$' };
            const rk = (['PA','SV','US'].includes(currentCountry)) ? 'USD' : currentCountry;
            const price = Math.round(currentPlan * storage.rates[rk]);
            document.getElementById('final-price').innerText = `${sym[currentCountry]}${price.toLocaleString()}`;
            
            const d = document.getElementById('pay-data'), t = document.getElementById('pay-titular');
            if(currentMethod === 'sinpe') { d.innerText = storage.sinpe; t.innerText = storage.titular; }
            else if(currentMethod === 'paypal') { d.innerText = storage.paypal; t.innerText = "AUTOMÁTICO"; }
            else { d.innerText = storage.iban; t.innerText = storage.titular; }
        }

        function startValidation(input) {
            if(!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = (e) => { 
                storage.receipt_vault.unshift({ img: e.target.result, date: new Date().getTime() });
                localStorage.setItem('fc_master_final', JSON.stringify(storage));
            };
            reader.readAsDataURL(input.files[0]);

            document.getElementById('main-interface').classList.add('hidden');
            document.getElementById('ia-screen').classList.remove('hidden');
            setTimeout(() => { document.getElementById('ia-fill').style.width = '100%'; }, 100);

            const status = document.getElementById('ia-status');
            const msgs = ["Extrayendo metadata...","Escaneando sellos digitales...","Cruzando transacciones...","Validando autenticidad...","Confirmando depósito...","Sincronizando acceso..."];
            let i = 0;
            const interval = setInterval(() => {
                if(i < msgs.length) status.innerText = msgs[i++];
                else {
                    clearInterval(interval);
                    document.getElementById('success-box').classList.remove('hidden');
                    status.classList.add('hidden');
                    document.querySelector('.loader-ring').classList.add('hidden');
                }
            }, 7500);
        }

        function enterVIP() {
            document.getElementById('ia-screen').classList.add('hidden');
            document.getElementById('vip-interface').classList.remove('hidden');
            document.getElementById('vip-gallery').innerHTML = storage.vault.map(img => `
                <div class="rounded-xl overflow-hidden border border-white/10">
                    <img src="${img}" class="w-full">
                </div>
            `).join('');
            window.scrollTo(0,0);
        }

        function handleAdminClicks() {
            adminTimer++;
            if(adminTimer >= 5) { document.getElementById('admin-modal').style.display = 'block'; loadAdminData(); adminTimer = 0; }
            setTimeout(() => adminTimer = 0, 3000);
        }

        function loadAdminData() {
            document.getElementById('adm-titular').value = storage.titular;
            document.getElementById('adm-sinpe').value = storage.sinpe;
            document.getElementById('adm-iban').value = storage.iban;
            document.getElementById('rate-CR').value = storage.rates.CR;
            document.getElementById('rate-NI').value = storage.rates.NI;
            document.getElementById('rate-GT').value = storage.rates.GT;
            document.getElementById('rate-HN').value = storage.rates.HN;
            renderPreview();
            document.getElementById('receipt-vault').innerHTML = storage.receipt_vault.map(v => `<img src="${v.img}" class="receipt-thumb">`).join('');
        }

        function handleVaultUpload(input) {
            Array.from(input.files).forEach(f => {
                const r = new FileReader();
                r.onload = (e) => { storage.vault.push(e.target.result); renderPreview(); };
                r.readAsDataURL(f);
            });
        }

        function renderPreview() {
            document.getElementById('vault-preview').innerHTML = storage.vault.map((s,i) => `
                <div class="relative h-12 border border-white/10 rounded-lg overflow-hidden">
                    <img src="${s}" class="w-full h-full object-cover">
                    <span onclick="storage.vault.splice(${i},1); renderPreview();" class="absolute top-0 right-0 bg-red-600 text-[8px] px-1">×</span>
                </div>
            `).join('');
        }

        function saveAdminData() {
            storage.titular = document.getElementById('adm-titular').value;
            storage.sinpe = document.getElementById('adm-sinpe').value;
            storage.iban = document.getElementById('adm-iban').value;
            storage.rates.CR = parseFloat(document.getElementById('rate-CR').value);
            storage.rates.NI = parseFloat(document.getElementById('rate-NI').value);
            storage.rates.GT = parseFloat(document.getElementById('rate-GT').value);
            storage.rates.HN = parseFloat(document.getElementById('rate-HN').value);
            localStorage.setItem('fc_master_final', JSON.stringify(storage));
            location.reload();
        }

        refreshPricing();
    </script>
</body>
                    </html>
