<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fran Cruz | VIP Mastermind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap');
        :root { --gold: #d4af37; }
        body { font-family: 'Poppins', sans-serif; background: #000; color: white; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .font-luxury { font-family: 'Cinzel', serif; }
        .gold-text { background: linear-gradient(to bottom, #f9e2af 0%, #d4af37 50%, #a67c00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .plan-card { transition: 0.3s; border: 1px solid #1a1a1a; background: #0a0a0a; cursor: pointer; }
        .plan-card.active { border-color: var(--gold); background: #120f05; transform: scale(1.02); }
        .method-tab { font-size: 10px; text-transform: uppercase; padding: 12px; opacity: 0.3; cursor: pointer; border-bottom: 2px solid transparent; }
        .method-tab.active { opacity: 1; color: var(--gold); border-bottom: 2px solid var(--gold); }
        #ia-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .loader-ring { width: 90px; height: 90px; border: 4px solid #111; border-top: 4px solid var(--gold); border-radius: 50%; animation: spin 1s infinite linear; margin-bottom: 25px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #ia-fill { width: 0%; height: 3px; background: var(--gold); transition: width 45s linear; }
        .admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #080808; border: 1px solid var(--gold); padding: 20px; border-radius: 25px; z-index: 10000; width: 92%; max-width: 450px; max-height: 85vh; overflow-y: auto; box-shadow: 0 0 40px rgba(0,0,0,1); }
        .flag-btn { font-size: 26px; cursor: pointer; opacity: 0.2; }
        .flag-btn.active { opacity: 1; transform: scale(1.2); }
        .vip-card { background: #0a0a0a; border-radius: 15px; border: 1px solid #1a1a1a; margin-bottom: 15px; overflow: hidden; }
        .btn-download { background: var(--gold); color: black; font-weight: 800; padding: 12px; width: 100%; display: block; text-align: center; text-transform: uppercase; font-size: 9px; text-decoration: none; }
    </style>
</head>
<body>

    <div id="ia-screen">
        <div class="loader-ring"></div>
        <h2 class="font-luxury text-xl gold-text mb-2 uppercase">Validando Pago</h2>
        <div class="bg-[#0a0a0a] p-6 rounded-[30px] border border-white/5 w-full max-w-sm">
            <p id="ia-status" class="text-[9px] uppercase tracking-widest leading-relaxed h-10 flex items-center justify-center italic opacity-60">Iniciando análisis...</p>
            <div class="w-full bg-[#111] h-[3px] rounded-full mt-4"><div id="ia-fill"></div></div>
        </div>
    </div>

    <div id="banned-screen" class="hidden text-center px-8 pt-24">
        <i class="fa-solid fa-user-slash text-6xl text-red-600 mb-6"></i>
        <h1 class="font-luxury text-2xl gold-text mb-4 uppercase">Acceso Restringido</h1>
        <p id="my-id-display" class="text-xl font-bold tracking-widest text-red-500 mb-8 font-mono">----</p>
        <a id="support-link" href="#" class="inline-block border border-gold px-10 py-4 rounded-full text-[10px] uppercase font-bold gold-text">Contactar Soporte</a>
    </div>

    <div id="app-content">
        <header class="mt-8 mb-6 text-center" onclick="handleAdminClicks()">
            <h1 class="font-luxury text-4xl gold-text tracking-[0.1em] uppercase">Fran Cruz</h1>
            <p class="text-[8px] tracking-[0.4em] uppercase opacity-40 mt-1 font-bold">Mente Maestra</p>
        </header>

        <div id="main-ui" class="px-4">
            <div class="flex gap-2 mb-6 justify-center flex-wrap">
                <span onclick="setCountry('CR')" id="f-CR" class="flag-btn active">🇨🇷</span>
                <span onclick="setCountry('NI')" id="f-NI" class="flag-btn">🇳🇮</span>
                <span onclick="setCountry('PA')" id="f-PA" class="flag-btn">🇵🇦</span>
                <span onclick="setCountry('HN')" id="f-HN" class="flag-btn">🇭🇳</span>
                <span onclick="setCountry('SV')" id="f-SV" class="flag-btn">🇸🇻</span>
                <span onclick="setCountry('GT')" id="f-GT" class="flag-btn">🇬🇹</span>
                <span onclick="setCountry('US')" id="f-US" class="flag-btn">🇺🇸</span>
            </div>

            <div class="max-w-sm mx-auto space-y-2 mb-6">
                <div onclick="setPlan(1)" id="p-1" class="plan-card p-4 rounded-xl">
                    <p class="text-[7px] opacity-40 font-bold uppercase">Acceso 24h</p>
                    <h3 class="text-md font-bold gold-text">$1 USD</h3>
                </div>
                <div onclick="setPlan(5)" id="p-5" class="plan-card p-4 rounded-xl active">
                    <p class="text-[7px] opacity-40 font-bold uppercase">Semanal</p>
                    <h3 class="text-md font-bold gold-text">$5 USD</h3>
                </div>
                <div onclick="setPlan(15)" id="p-15" class="plan-card p-4 rounded-xl">
                    <p class="text-[7px] opacity-40 font-bold uppercase">Mensual VIP</p>
                    <h3 class="text-md font-bold gold-text">$15 USD</h3>
                </div>
            </div>

            <div class="max-w-sm mx-auto bg-[#050505] rounded-[30px] p-6 border border-white/5 text-center">
                <div class="flex mb-6 border-b border-white/5">
                    <div onclick="setMethod('sinpe')" id="m-sinpe" class="method-tab active flex-1">Sinpe</div>
                    <div onclick="setMethod('trans')" id="m-trans" class="method-tab flex-1">IBAN</div>
                    <div onclick="setMethod('paypal')" id="m-paypal" class="method-tab flex-1">PayPal</div>
                </div>
                <p id="pay-data" class="text-lg font-bold gold-text mb-1 tracking-tighter">---</p>
                <p id="pay-titular" class="text-[8px] opacity-30 uppercase font-bold mb-6 italic">---</p>
                <p id="final-price" class="text-5xl font-bold text-yellow-500 mb-8 tracking-tighter">---</p>
                <input type="file" id="receipt-input" class="hidden" accept="image/*" onchange="runIAValidation(this)">
                <button onclick="document.getElementById('receipt-input').click()" class="w-full bg-white text-black font-bold py-4 rounded-xl uppercase text-[10px] tracking-widest active:scale-95 transition-all">Subir Comprobante</button>
            </div>
        </div>

        <div id="vip-ui" class="hidden max-w-md mx-auto pt-4 px-4 text-center">
            <h2 class="font-luxury text-xl gold-text mb-6 border-b border-white/10 pb-4 uppercase">Bodega VIP</h2>
            <div id="vip-gallery" class="space-y-4"></div>
            <button onclick="logoutVIP()" class="mt-8 text-[8px] opacity-30 uppercase font-bold tracking-widest">Cerrar Sesión</button>
        </div>
    </div>    <div id="admin-modal" class="admin-panel text-left">
        <h2 class="gold-text font-luxury text-center mb-4 text-lg">MAESTRO V5.5</h2>
        
        <div class="space-y-2 mb-4">
            <label class="text-[8px] gold-text font-bold uppercase">Datos de Cobro</label>
            <input type="text" id="adm-titular" class="w-full bg-[#111] p-3 rounded-lg text-xs border border-white/10" placeholder="Nombre Titular">
            <input type="text" id="adm-sinpe" class="w-full bg-[#111] p-3 rounded-lg text-xs border border-white/10" placeholder="Número Sinpe">
            <input type="text" id="adm-wa" class="w-full bg-[#111] p-3 rounded-lg text-xs border border-white/10" placeholder="WhatsApp (506...)">
            <input type="text" id="adm-iban" class="w-full bg-[#111] p-3 rounded-lg text-xs border border-white/10" placeholder="Cuenta IBAN">
            <input type="text" id="adm-paypal" class="w-full bg-[#111] p-3 rounded-lg text-xs border border-white/10" placeholder="Correo PayPal">
        </div>

        <div class="grid grid-cols-2 gap-2 mb-4 bg-white/5 p-3 rounded-xl">
            <label class="col-span-2 text-[8px] gold-text font-bold uppercase">Tipos de Cambio ($1 =)</label>
            <input type="number" id="rate-CR" class="bg-black p-2 rounded text-xs border border-white/10" placeholder="CRC">
            <input type="number" id="rate-NI" class="bg-black p-2 rounded text-xs border border-white/10" placeholder="NIO">
            <input type="number" id="rate-GT" class="bg-black p-2 rounded text-xs border border-white/10" placeholder="GTQ">
            <input type="number" id="rate-HN" class="bg-black p-2 rounded text-xs border border-white/10" placeholder="HNL">
        </div>

        <div class="mb-4">
            <label class="text-[8px] gold-text font-bold uppercase">Láminas en Bodega</label>
            <input type="file" id="upload-vault" multiple class="hidden" accept="image/*" onchange="saveToVault(this)">
            <button onclick="document.getElementById('upload-vault').click()" class="w-full bg-white/5 border border-white/10 py-2 rounded-lg text-[9px] uppercase font-bold mt-1">Añadir Fotos</button>
            <div id="admin-vault-preview" class="flex flex-wrap gap-2 mt-2"></div>
        </div>

        <div class="bg-red-950/20 p-3 rounded-xl mb-4">
            <label class="text-[8px] text-red-500 font-bold uppercase">Comprobantes Recibidos</label>
            <div id="admin-receipt-preview" class="flex flex-wrap gap-2 mt-2"></div>
        </div>

        <div class="mb-4">
            <label class="text-[8px] gold-text font-bold uppercase">Lista Negra</label>
            <table class="w-full text-[9px] mt-1"><tbody id="blacklist-body"></tbody></table>
        </div>

        <button onclick="saveAdminChanges()" class="w-full bg-yellow-600 py-4 rounded-xl font-bold uppercase text-[10px] mb-2">Actualizar Todo</button>
        <button onclick="document.getElementById('admin-modal').style.display='none'" class="w-full py-2 text-[8px] opacity-30 text-center uppercase">Cerrar Panel</button>
    </div>

    <script>
        let db; let myID; let adminClicks = 0;
        let config = { 
            titular: "Randall Sánchez", sinpe: "6453-5475", whatsapp: "50664535475", 
            iban: "CR80080315001000035641", paypal: "pagos@francruz.com",
            rates: { CR: 525, NI: 36.5, GT: 7.8, HN: 24.5, USD: 1 }, blacklist: [] 
        };
        let currentCountry = 'CR'; let currentPlan = 5; let currentMethod = 'sinpe';
        const iaMessages = ["Cruzando datos bancarios...", "Analizando píxeles...", "Verificando Sinpe...", "Validando nodo...", "Acceso concedido."];

        const req = indexedDB.open("FranCruz_v55", 1);
        req.onupgradeneeded = (e) => { 
            db = e.target.result; 
            db.createObjectStore("config"); 
            db.createObjectStore("gallery", { keyPath: "id", autoIncrement: true }); 
            db.createObjectStore("receipts", { keyPath: "id", autoIncrement: true });
        };
        req.onsuccess = (e) => { db = e.target.result; init(); };

        async function init() {
            myID = localStorage.getItem('fc_id') || 'FC-' + Math.random().toString(36).substr(2, 4).toUpperCase();
            localStorage.setItem('fc_id', myID);
            const saved = await getDB("config", "main");
            if(saved) config = saved;
            if(config.blacklist.includes(myID)) { showBanned(); return; }
            if(localStorage.getItem('fc_vip_session') === 'true') { showVIP(); } else { renderUI(); }
        }

        function setCountry(c) { currentCountry = c; renderUI(); }
        function setPlan(p) { currentPlan = p; renderUI(); }
        function setMethod(m) { currentMethod = m; renderUI(); }

        function renderUI() {
            document.querySelectorAll('.flag-btn, .plan-card, .method-tab').forEach(el => el.classList.remove('active'));
            document.getElementById('f-'+currentCountry).classList.add('active');
            document.getElementById('p-'+currentPlan).classList.add('active');
            document.getElementById('m-'+currentMethod).classList.add('active');
            const rate = config.rates[currentCountry] || 1;
            const price = Math.round(currentPlan * rate);
            const symbols = { CR: '₡', NI: 'C$', GT: 'Q', HN: 'L', USD: '$', PA: '$', SV: '$', US: '$' };
            document.getElementById('final-price').innerText = `${symbols[currentCountry] || '$'}${price.toLocaleString()}`;
            document.getElementById('pay-titular').innerText = config.titular;
            if(currentMethod === 'sinpe') document.getElementById('pay-data').innerText = config.sinpe;
            else if(currentMethod === 'trans') document.getElementById('pay-data').innerText = config.iban;
            else document.getElementById('pay-data').innerText = config.paypal;
        }

        function runIAValidation(input) {
            if(!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                await addDB("receipts", { data: e.target.result, userID: myID });
                document.getElementById('app-content').style.display = 'none';
                document.getElementById('ia-screen').style.display = 'flex';
                setTimeout(() => { document.getElementById('ia-fill').style.width = '100%'; }, 100);
                let msgIdx = 0;
                const interval = setInterval(() => {
                    document.getElementById('ia-status').innerText = iaMessages[msgIdx];
                    msgIdx++;
                    if(msgIdx >= iaMessages.length) {
                        clearInterval(interval);
                        setTimeout(() => { localStorage.setItem('fc_vip_session', 'true'); location.reload(); }, 1500);
                    }
                }, 9000);
            };
            reader.readAsDataURL(input.files[0]);
        }

        async function showVIP() {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('vip-ui').style.display = 'block';
            const gallery = await getAllDB("gallery");
            document.getElementById('vip-gallery').innerHTML = gallery.length > 0 ? 
                gallery.map(i => `<div class="vip-card"><img src="${i.data}" class="w-full"><a href="${i.data}" download class="btn-download">Descargar</a></div>`).join('') :
                `<p class="opacity-20 text-[10px] py-10">Actualizando bodega...</p>`;
        }

        function logoutVIP() { localStorage.removeItem('fc_vip_session'); location.reload(); }
        function handleAdminClicks() {
            adminClicks++;
            if(adminClicks >= 5) { if(prompt("Acceso:") === "1234") openAdmin(); adminClicks = 0; }
            setTimeout(() => adminClicks = 0, 3000);
        }

        async function openAdmin() {
            document.getElementById('admin-modal').style.display = 'block';
            document.getElementById('adm-titular').value = config.titular;
            document.getElementById('adm-sinpe').value = config.sinpe;
            document.getElementById('adm-wa').value = config.whatsapp;
            document.getElementById('adm-iban').value = config.iban;
            document.getElementById('adm-paypal').value = config.paypal;
            document.getElementById('rate-CR').value = config.rates.CR;
            document.getElementById('rate-NI').value = config.rates.NI;
            document.getElementById('rate-GT').value = config.rates.GT;
            document.getElementById('rate-HN').value = config.rates.HN;
            refreshAdminLists();
        }

        async function refreshAdminLists() {
            const vault = await getAllDB("gallery");
            document.getElementById('admin-vault-preview').innerHTML = vault.map(i => `<div class="relative w-10 h-10 border border-white/10"><img src="${i.data}" class="w-full h-full object-cover"><button onclick="delItem('gallery',${i.id})" class="absolute top-0 right-0 bg-red-600 text-[6px] px-1">×</button></div>`).join('');
            const receipts = await getAllDB("receipts");
            document.getElementById('admin-receipt-preview').innerHTML = receipts.map(r => `<div class="relative w-10 h-10 border border-white/10"><img src="${r.data}" class="w-full h-full object-cover" onclick="alert('ID: ${r.userID}')"><button onclick="banUser('${r.userID}', ${r.id})" class="absolute bottom-0 w-full bg-red-600 text-[5px] py-0.5">BAN</button></div>`).join('');
            document.getElementById('blacklist-body').innerHTML = config.blacklist.map(id => `<tr><td class="py-1 opacity-40">${id}</td><td class="text-right"><button onclick="unbanUser('${id}')" class="text-green-500">INDULTAR</button></td></tr>`).join('');
        }

        async function banUser(uid, rid) { if(confirm("¿Banear "+uid+"?")) { config.blacklist.push(uid); await saveDB("config", "main", config); await delItem('receipts', rid); refreshAdminLists(); } }
        async function unbanUser(uid) { config.blacklist = config.blacklist.filter(id => id !== uid); await saveDB("config", "main", config); refreshAdminLists(); }
        async function saveAdminChanges() {
            config.titular = document.getElementById('adm-titular').value; config.sinpe = document.getElementById('adm-sinpe').value;
            config.whatsapp = document.getElementById('adm-wa').value; config.iban = document.getElementById('adm-iban').value;
            config.paypal = document.getElementById('adm-paypal').value; config.rates.CR = document.getElementById('rate-CR').value;
            config.rates.NI = document.getElementById('rate-NI').value; config.rates.GT = document.getElementById('rate-GT').value;
            config.rates.HN = document.getElementById('rate-HN').value;
            await saveDB("config", "main", config); location.reload();
        }

        function saveToVault(input) {
            Array.from(input.files).forEach(file => {
                const r = new FileReader();
                r.onload = async (e) => { await addDB("gallery", { data: e.target.result }); refreshAdminLists(); };
                r.readAsDataURL(file);
            });
        }

        function showBanned() {
            document.getElementById('app-content').style.display = 'none';
            document.getElementById('banned-screen').style.display = 'block';
            document.getElementById('my-id-display').innerText = myID;
            document.getElementById('support-link').href = `https://wa.me/${config.whatsapp}?text=ID:%20${myID}`;
        }

        function getDB(s,k){ return new Promise(r=>{ const t=db.transaction(s).objectStore(s).get(k); t.onsuccess=()=>r(t.result); }); }
        function saveDB(s,k,v){ return new Promise(r=>{ const t=db.transaction(s,"readwrite").objectStore(s).put(v,k); t.oncomplete=()=>r(); }); }
        function addDB(s,v){ return new Promise(r=>{ const t=db.transaction(s,"readwrite").objectStore(s).add(v); t.oncomplete=()=>r(); }); }
        function getAllDB(s){ return new Promise(r=>{ const t=db.transaction(s).objectStore(s).getAll(); t.onsuccess=()=>r(t.result); }); }
        async function delItem(s,id){ const t=db.transaction(s,"readwrite").objectStore(s).delete(id); t.oncomplete=()=>refreshAdminLists(); }
    </script>
</body>
</html>
