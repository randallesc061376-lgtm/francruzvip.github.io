    <style>
        :root{--o:#d4af37;--n:#050505;--g:linear-gradient(135deg,#d4af37,#f9e498)}
        body{background:var(--n);color:#fff;font-family:'Segoe UI',sans-serif;margin:0;text-align:center;user-select:none;overflow-x:hidden}
        header{padding:25px 10px;cursor:pointer}
        .l{color:var(--o);font-size:1.9rem;font-weight:900;letter-spacing:5px;text-transform:uppercase}
        .b{display:flex;justify-content:center;gap:10px;margin:15px 0}
        .b img{width:24px;border-radius:2px;cursor:pointer}
        .p{display:none;min-height:90vh;flex-direction:column;align-items:center;padding:10px 20px;box-sizing:border-box}
        .a{display:flex}
        .box{width:100%;max-width:380px;background:rgba(255,255,255,0.03);border:1px solid #222;border-radius:12px;padding:18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;cursor:pointer}
        .s{border-color:var(--o);background:rgba(212,175,55,0.05)}
        .bg{width:100%;max-width:380px;background:var(--g);color:#000;border:none;padding:18px;border-radius:12px;font-weight:900;text-transform:uppercase;cursor:pointer;margin-top:10px}
        
        /* Contenedor de Pagos Centrado y con Copiado */
        .info-pago{width:100%;max-width:380px;background:rgba(255,255,255,0.02);border:1px solid rgba(212,175,55,0.25);border-radius:15px;padding:20px;margin:15px 0;box-sizing:border-box}
        .info-pago h4{color:var(--o);margin:0 0 15px 0;letter-spacing:2px;font-size:0.85rem}
        .item-pago{margin-bottom:12px;cursor:pointer;transition:0.2s}
        .item-pago:active{transform:scale(0.98);opacity:0.7}
        .item-pago b{color:var(--o);font-size:0.75rem;display:block;text-transform:uppercase;margin-bottom:2px}
        .item-pago span{font-size:0.95rem;word-break:break-all}
        
        .m{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:var(--n);z-index:99;flex-direction:column;justify-content:center;align-items:center}
        .toast{position:fixed;bottom:20px;background:var(--o);color:#000;padding:10px 20px;border-radius:20px;font-size:0.8rem;font-weight:bold;display:none;z-index:100}
    </style>
</head>
<body>

    <div class="info-pago">
        <h4>MÉTODOS DE PAGO (TOCA PARA COPIAR)</h4>

        <div class="item-pago" onclick="copy('70835833')"><b>🇨🇷 SINPE MÓVIL</b><span>70835833</span></div>

        <div class="item-pago" onclick="copy('randallesc061376@gmail.com')"><b>🌐 PAYPAL / CORREO</b><span>randallesc061376@gmail.com</span></div>

    <button class="bg" onclick="prot()">ADQUIRIR Y VALIDAR</button>

<div id="pantalla-ad" class="p">

<div id="mo" class="m"><div class="l">VERIFICANDO</div><p id="ts" style="color:var(--o);font-size:3rem;margin-top:20px">15s</p></div>

<script>
const cfg={apiKey:"AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE",authDomain:"fran-cruz-sala-vip.firebaseapp.com",projectId:"fran-cruz-sala-vip",storageBucket:"fran-cruz-sala-vip.firebasestorage.app",messagingSenderId:"1022733043010",appId:"1:1022733043010:web:379db18e37bbfde2cf34db"};
firebase.initializeApp(cfg);const db=firebase.firestore(),st=firebase.storage();
let pS=15,ps="CR",cl=0;
const T={"CR":{m:"₡",f:550,c:"cr"},"NI":{m:"C$",f:36.8,c:"ni"},"PA":{m:"$",f:1,c:"pa"},"HN":{m:"L",f:24.7,c:"hn"},"SV":{m:"$",f:1,c:"sv"},"GT":{m:"Q",f:7.8,c:"gt"},"BZ":{m:"BZ$",f:2,c:"bz"}};

function init(){
    const h=document.getElementById('bc');
    Object.keys(T).forEach(k=>{
        const i=document.createElement('img');i.src=`https://flagcdn.com/${T[k].c}.svg`;
        i.onclick=()=>{ps=k;updP();};h.appendChild(i);
    });updP();
}
function updP(){
    const t=T[ps];document.getElementById('v1').innerText=t.m+(1*t.f).toLocaleString();
    document.getElementById('v7').innerText=t.m+(5*t.f).toLocaleString();
    document.getElementById('v15').innerText=t.m+(15*t.f).toLocaleString();
}
function sel(v,e){pS=v;document.querySelectorAll('.box').forEach(x=>x.classList.remove('s'));e.classList.add('s')}
function tAdmin(){cl++;if(cl>=5){vP('pantalla-u','pantalla-l');cl=0}setTimeout(()=>cl=0,3000)}
function vP(o,n){document.getElementById(o).classList.remove('a');document.getElementById(n).classList.add('a')}
function vPk(){if(document.getElementById('pk').value==="ADMIN123")vP('pantalla-l','pantalla-ad');else location.reload()}

function prot(){
    document.getElementById('mo').style.display='flex';let t=15;
    const i=setInterval(()=>{t--;document.getElementById('ts').innerText=t+"s";if(t<=0){clearInterval(i);wa()}},1000);
}

// Función Copiar al Portapapeles
function copy(txt) {
    navigator.clipboard.writeText(txt).then(() => {
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    });
}

function wa(){
    const t=T[ps],m=(pS*t.f).toLocaleString(),h=new Date().getDate().toString().padStart(2,'0');
    const msg = `Plan:${pS}dias-Monto:${t.m}${m}-ID:93${h}`;
    window.location.href = `https://api.whatsapp.com/send?phone=50670835833&text=${encodeURIComponent(msg)}`;
}

async function sub(){
    const f=document.getElementById('fi').files[0];if(!f)return;
    const r=st.ref('galeria/'+Date.now()+'_'+f.name);await r.put(f);
    const u=await r.getDownloadURL();await db.collection("galeria").add({url:u,fecha:firebase.firestore.FieldValue.serverTimestamp()});
    alert("¡LISTO!");location.reload();
}
init();
</script>
</body>
</html>
