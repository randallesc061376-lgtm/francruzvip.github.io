<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fran Cruz | Elite VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap');
        :root { --gold: #d4af37; --dark-bg: #000; --card-bg: #0a0a0a; }
        body { font-family: 'Poppins', sans-serif; background: #000; color: white; margin: 0; padding: 15px; text-align: center; }
        .font-luxury { font-family: 'Cinzel', serif; }
        .gold-text { background: linear-gradient(to bottom, #f9e2af 0%, #d4af37 50%, #a67c00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* REPARACIÓN TOTAL CONSOLA */
        .admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #080808; border: 1px solid var(--gold); padding: 20px; border-radius: 30px; z-index: 10000; width: 92%; max-width: 400px; max-height: 85vh; overflow-y: auto; box-shadow: 0 0 40px rgba(0,0,0,1); }
        .admin-section { border-bottom: 1px solid #1a1a1a; padding-bottom: 15px; margin-bottom: 15px; }
        .admin-label { display: block; text-align: left; font-size: 8px; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); opacity: 0.8; margin: 0 0 6px 4px; font-weight: bold; }
        .admin-input { background: #111; border: 1px solid #222; color: white; padding: 10px 14px; border-radius: 12px; width: 100%; font-size: 13px; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        .admin-input:focus { border-color: var(--gold); background: #151515; }

        /* Visores de Imágenes Corregidos */
        .img-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; min-height: 40px; background: #030303; padding: 10px; border-radius: 12px; border: 1px dashed #222; }
        .img-item { width: 45px; height: 45px; position: relative; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        .img-item img { width: 100%; height: 100%; object-fit: cover; }
        .img-del { position: absolute; top: 0; right: 0; background: #ff4444; color: white; font-size: 10px; padding: 0 4px; cursor: pointer; font-weight: bold; }

        /* Pantallas */
        .hidden { display: none !important; }
        .plan-card { background: var(--card-bg); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid #1a1a1a; transition: 0.3s; cursor: pointer; }
        .plan-card.active { border-color: var(--gold); background: #120f05; }
        
        .loader-ring { width: 50px; height: 50px; border: 3px solid #111; border-top: 3px solid var(--gold); border-radius: 50%; animation: spin 1s infinite linear; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #ia-fill { width: 0%; height: 100%; background: var(--gold); transition: width 45s linear; }
    </style>
</head>
<body>

    <header class="mt-6 mb-8" onclick="handleAdminClicks()">
        <h1 class="font-luxury text-4xl gold-text tracking-[0.2em] uppercase">Fran Cruz</h1>
        <p class="text-[9px] tracking-[0.5em] uppercase opacity-40 mt-2 font-bold">El Personaje del Azar</p>
    </header>

    <div id="main-interface">
        <div class="flex gap-4 mb-8 justify-center flex-wrap opacity-50 px-2" id="flag-box">
            <span onclick="setCountry('CR')" id="f-CR" class="text-3xl cursor-pointer">🇨🇷</span>
            <span onclick="setCountry('NI')" id="f-NI" class="text-3xl cursor-pointer">🇳🇮</span>
            <span onclick="setCountry('PA')" id="f-PA" class="text-3xl cursor-pointer">🇵🇦</span>
            <span onclick="setCountry('HN')" id="f-HN" class="text-3xl cursor-pointer">🇭🇳</span>
            <span onclick="setCountry('SV')" id="f-SV" class="text-3xl cursor-pointer">🇸🇻</span>
            <span onclick="setCountry('GT')" id="f-GT" class="text-3xl cursor-pointer">🇬🇹</span>
            <span onclick="setCountry('US')" id="f-US" class="text-3xl cursor-pointer">🇺🇸</span>
        </div>

        <div class="max-w-sm mx-auto px-4 mb-8">
            <div onclick="setPlan(1)" id="p-1" class="plan-card"><p class="text-[8px] uppercase opacity-40 mb-1">Diario</p><h3 class="text-lg font-bold">Membresía Hoy <span class="gold-text">$1</span></h3></div>
            <div onclick="setPlan(5)" id="p-5" class="plan-card active"><p class="text-[8px] uppercase opacity-40 mb-1">7 Días</p><h3 class="text-lg font-bold">Senda Ganadora <span class="gold-text">$5</span></h3></div>
            <div onclick="setPlan(15)" id="p-15" class="plan-card"><p class="text-[8px] uppercase opacity-40 mb-1">Mensual</p><h3 class="text-lg font-bold">VIP Mensual <span class="gold-text">$15</span></h3></div>
        </div>

        <div class="max-w-sm mx-auto bg-[#050505] rounded-[35px] p-6 border border-white/5">
            <p id="pay-data" class="text-xl font-bold gold-text uppercase mb-1">---</p>
            <p id="pay-titular" class="text-[8px] opacity-40 uppercase font-bold mb-6">---</p>
            <p id="final-price" class="text-5xl font-bold text-yellow-500 tracking-tighter mb-8">---</p>
            <input type="file" id="receipt-upload" accept="image/*" class="hidden" onchange="startValidation(this)">
            <button onclick="document.getElementById('receipt-upload').click()" class="w-full bg-white text-black font-bold py-5 rounded-2xl uppercase text-[10px] tracking-widest active:scale-95 transition-all">Validar Comprobante</button>
        </div>
    </div>

    <div id="ia-screen" class="hidden max-w-sm mx-auto pt-10 px-6">
        <h2 class="font-luxury text-2xl gold-text mb-2 uppercase italic">Verificando</h2>
        <div class="loader-ring"></div>
        <div class="bg-[#0a0a0a] p-8 rounded-[35px] border border-white/5">
            <p id="ia-status" class="text-[9px] italic gold-text mb-4">Iniciando protocolo de seguridad...</p>
            <div class="w-full h-1 bg-black rounded-full overflow-hidden"><div id="ia-fill"></div></div>
        </div>
        <div id="success-box" class="mt-8 hidden">
            <button onclick="enterVIP()" class="w-full bg-yellow-600 text-white py-6 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-2xl">Obtener mis Láminas</button>
        </div>
    </div>

    <div id="vip-interface" class="hidden max-w-md mx-auto pt-4 px-4">
        <div class="flex justify-between items-center mb-8 border-b border-white/5 pb-4">
            <h2 class="font-luxury text-2xl gold-text">Galería VIP</h2>
            <button onclick="location.reload()" class="text-[10px] uppercase opacity-50 font-bold">Menú</button>
        </div>
        <div id="vip-gallery" class="grid grid-cols-2 gap-4"></div>
    </div>

    <div id="admin-modal" class="admin-panel">
        <h3 class="gold-text font-bold text-sm mb-6 uppercase tracking-[0.2em] font-luxury text-center">Consola Administrativa</h3>
        
        <div class="admin-section">
            <label class="admin-label">Datos de la Cuenta</label>
            <input type="text" id="adm-titular" class="admin-input" placeholder="Nombre Titular">
            <input type="text" id="adm-sinpe" class="admin-input" placeholder="Número SINPE / ID">
            <input type="text" id="adm-iban" class="admin-input" placeholder="Cuenta IBAN">
        </div>

        <div class="admin-section">
            <label class="admin-label">Tasas de Cambio (Dólar)</label>
            <div class="grid grid-cols-4 gap-2">
                <div><span class="text-[7px] opacity-40 block ml-1 mb-1">CR</span><input type="number" id="rate-CR" class="admin-input text-center"></div>
                <div><span class="text-[7px] opacity-40 block ml-1 mb-1">NI</span><input type="number" id="rate-NI" class="admin-input text-center"></div>
                <div><span class="text-[7px] opacity-40 block ml-1 mb-1">GT</span><input type="number" id="rate-GT" class="admin-input text-center"></div>
                <div><span class="text-[7px] opacity-40 block ml-1 mb-1">HN</span><input type="number" id="rate-HN" class="admin-input text-center"></div>
            </div>
        </div>

        <div class="admin-section">
            <label class="admin-label">Subir Láminas del Día</label>
            <input type="file" id="vault-input" multiple accept="image/*" class="hidden" onchange="handleVaultUpload(this)">
            <button onclick="document.getElementById('vault-input').click()" class="w-full bg-[#111] border border-white/5 text-[9px] py-3 rounded-lg uppercase font-bold text-white mb-2">Seleccionar Archivos</button>
            <div id="vault-preview" class="img-grid"></div>
        </div>

        <div class="admin-section">
            <label class="admin-label">Comprobantes Recibidos (IA)</label>
            <div id="receipt-vault" class="img-grid"></div>
        </div>

        <button onclick="saveAdminData()" class="w-full bg-yellow-600 text-white py-4 rounded-xl font-bold uppercase text-[10px] tracking-widest shadow-lg mt-4">Guardar y Sincronizar</button>
        <button onclick="document.getElementById('admin-modal').style.display='none'" class="w-full text-gray-600 text-[8px] mt-6 uppercase font-bold">Cerrar Sesión</button>
    </div>

    <script>
        let adminTimer = 0;
        let currentPlan = 5;
        let currentCountry = 'CR';

        const storage = JSON.parse(localStorage.getItem('fc_final_v9')) || {
            titular: "Randall Esteban Sánchez",
            sinpe: "64535475",
            iban: "CR80080315001000035641",
            rates: { CR: 525, NI: 36.5, GT: 7.8, HN: 24.5, USD: 1 },
            vault: [],
            receipt_vault: []
        };

        function setCountry(c) {
            currentCountry = c;
            document.querySelectorAll('#flag-box span').forEach(s => s.style.opacity = '0.3');
            document.getElementById('f-'+c).style.opacity = '1';
            refreshPricing();
        }

        function setPlan(p) {
            currentPlan = p;
            document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('active'));
            document.getElementById('p-'+p).classList.add('active');
            refreshPricing();
        }

        function refreshPricing() {
            const sym = { CR: '₡', NI: 'C$', GT: 'Q', HN: 'L', PA: '$', SV: '$', US: '$' };
            const rk = (['PA','SV','US'].includes(currentCountry)) ? 'USD' : currentCountry;
            const price = Math.round(currentPlan * storage.rates[rk]);
            document.getElementById('final-price').innerText = `${sym[currentCountry]}${price.toLocaleString()}`;
            document.getElementById('pay-data').innerText = storage.sinpe;
            document.getElementById('pay-titular').innerText = storage.titular;
        }

        function startValidation(input) {
            if(!input.files[0]) return;
            const r = new FileReader();
            r.onload = (e) => { 
                storage.receipt_vault.unshift(e.target.result); 
                localStorage.setItem('fc_final_v9', JSON.stringify(storage));
            };
            r.readAsDataURL(input.files[0]);

            document.getElementById('main-interface').classList.add('hidden');
            document.getElementById('ia-screen').classList.remove('hidden');
            setTimeout(() => { document.getElementById('ia-fill').style.width = '100%'; }, 100);

            const status = document.getElementById('ia-status');
            const msgs = ["Analizando metadatos...","Validando sellos digitales...","Cruzando transacciones...","Confirmando depósito...","Validación completada."];
            let i = 0;
            const interval = setInterval(() => {
                if(i < msgs.length) status.innerText = msgs[i++];
                else {
                    clearInterval(interval);
                    document.getElementById('success-box').classList.remove('hidden');
                    status.classList.add('hidden');
                    document.querySelector('.loader-ring').classList.add('hidden');
                }
            }, 8000);
        }

        function enterVIP() {
            document.getElementById('ia-screen').classList.add('hidden');
            document.getElementById('vip-interface').classList.remove('hidden');
            document.getElementById('vip-gallery').innerHTML = storage.vault.map(img => `
                <div class="rounded-xl overflow-hidden border border-white/10 shadow-lg">
                    <img src="${img}" class="w-full">
                </div>
            `).join('');
            window.scrollTo(0,0);
        }

        function handleAdminClicks() {
            adminTimer++;
            if(adminTimer >= 5) { document.getElementById('admin-modal').style.display = 'block'; loadAdminData(); adminTimer = 0; }
            setTimeout(() => adminTimer = 0, 3000);
        }

        function loadAdminData() {
            document.getElementById('adm-titular').value = storage.titular;
            document.getElementById('adm-sinpe').value = storage.sinpe;
            document.getElementById('adm-iban').value = storage.iban;
            document.getElementById('rate-CR').value = storage.rates.CR;
            document.getElementById('rate-NI').value = storage.rates.NI;
            document.getElementById('rate-GT').value = storage.rates.GT;
            document.getElementById('rate-HN').value = storage.rates.HN;
            renderVault();
            renderReceipts();
        }

        function handleVaultUpload(input) {
            Array.from(input.files).forEach(f => {
                const r = new FileReader();
                r.onload = (e) => { storage.vault.push(e.target.result); renderVault(); };
                r.readAsDataURL(f);
            });
        }

        function renderVault() {
            document.getElementById('vault-preview').innerHTML = storage.vault.map((s,i) => `
                <div class="img-item">
                    <img src="${s}">
                    <span onclick="storage.vault.splice(${i},1); renderVault();" class="img-del">×</span>
                </div>
            `).join('');
        }

        function renderReceipts() {
            document.getElementById('receipt-vault').innerHTML = storage.receipt_vault.map(s => `
                <div class="img-item"><img src="${s}" onclick="window.open(this.src)"></div>
            `).join('');
        }

        function saveAdminData() {
            storage.titular = document.getElementById('adm-titular').value;
            storage.sinpe = document.getElementById('adm-sinpe').value;
            storage.iban = document.getElementById('adm-iban').value;
            storage.rates.CR = parseFloat(document.getElementById('rate-CR').value);
            storage.rates.NI = parseFloat(document.getElementById('rate-NI').value);
            storage.rates.GT = parseFloat(document.getElementById('rate-GT').value);
            storage.rates.HN = parseFloat(document.getElementById('rate-HN').value);
            localStorage.setItem('fc_final_v9', JSON.stringify(storage));
            location.reload();
        }

        setCountry('CR');
    </script>
</body>
</html>
