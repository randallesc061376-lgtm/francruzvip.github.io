<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRAN CRUZ VIP • OFICIAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <style>
        :root { --o: #d4af37; --n: #050505; --neon: #39FF14; --g: linear-gradient(180deg, #f9e498, #d4af37); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--n); color: #fff; margin: 0; min-height: 100vh; user-select: none; }
        
        header { padding: 30px 20px; text-align: center; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .logo { color: var(--o); font-size: 2.2rem; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; }

        .view { display: none; width: 100%; max-width: 420px; margin: auto; padding-bottom: 50px; }
        .view.active { display: block; }

        .geo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 15px; border: 1px solid #111; }
        .flag { width: 100%; height: 28px; opacity: 0.3; border-radius: 4px; cursor: pointer; object-fit: cover; transition: 0.3s; }
        .flag.active { opacity: 1; border: 1px solid var(--o); transform: scale(1.05); }

        .card { background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 12px; padding: 22px 18px; margin: 0 20px 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .card.sel { border: 1px solid var(--o); background: rgba(212,175,55,0.1); }
        .card b { color: var(--o); font-size: 1.3rem; }

        .section-title { margin: 25px 20px 10px; font-size: 0.75rem; color: var(--o); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        .copy-box { background: #0a0a0a; padding: 18px; border-radius: 14px; margin: 0 20px 12px; border: 1px solid #1a1a1a; transition: 0.4s; cursor: pointer; }
        .copy-box.active { border: 2px solid var(--neon); box-shadow: 0 0 15px rgba(57, 255, 20, 0.4); background: #0f0f0f; }
        .copy-box b { color: #fff; font-size: 1rem; }

        .btn-gold { width: calc(100% - 40px); background: var(--g); color: #000; border: none; padding: 22px; border-radius: 15px; font-weight: 900; margin: 10px 20px; cursor: pointer; text-transform: uppercase; }
        .btn-dark { width: calc(100% - 40px); background: #111; color: #fff; border: 1px solid #333; padding: 15px; border-radius: 12px; margin: 5px 20px; cursor: pointer; font-weight: 700; }
        
        .admin-box { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 12px; margin: 15px 20px; padding: 20px; }
        .admin-thumb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .thumb-wrap { position: relative; height: 90px; border: 1px solid #222; border-radius: 8px; overflow: hidden; }
        .thumb-img { width: 100%; height: 100%; object-fit: cover; }
        .btn-del { position: absolute; top: 2px; right: 2px; background: #ff4444; border: none; border-radius: 4px; color: #fff; padding: 2px 5px; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

<header onclick="adminAccess()">
    <div class="logo">FRAN CRUZ VIP</div>
</header>

<div id="v-main" class="view active">
    <div class="geo-grid">
        <img src="https://flagcdn.com/cr.svg" id="f-cr" class="flag" onclick="setLoc('cr')">
        <img src="https://flagcdn.com/ni.svg" id="f-ni" class="flag" onclick="setLoc('ni')">
        <img src="https://flagcdn.com/pa.svg" id="f-pa" class="flag" onclick="setLoc('pa')">
        <img src="https://flagcdn.com/hn.svg" id="f-hn" class="flag" onclick="setLoc('hn')">
        <img src="https://flagcdn.com/sv.svg" id="f-sv" class="flag" onclick="setLoc('sv')">
        <img src="https://flagcdn.com/gt.svg" id="f-gt" class="flag" onclick="setLoc('gt')">
        <img src="https://flagcdn.com/bz.svg" id="f-bz" class="flag" onclick="setLoc('bz')">
        <img src="https://flagcdn.com/un.svg" id="f-un" class="flag" onclick="setLoc('un')">
    </div>

    <div id="planes-list"></div>

    <div class="section-title">MÉTODOS DE PAGO DISPONIBLES</div>
    <div id="payment-group">
        <div class="copy-box" onclick="copy('randallesc061376@gmail.com', this)"><b>randallesc061376@gmail.com</b></div>
        <div class="copy-box" onclick="copy('70835833', this)"><b>70835833</b></div>
    </div>

    <button class="btn-gold" onclick="sendWhatsApp()">ENVIAR COMPROBANTE</button>
    <button class="btn-dark" onclick="checkStatus()">INGRESE SU CLAVE AQUÍ</button>
</div>

<div id="v-vip" class="view">
    <div id="gallery-vip" style="padding: 20px;"></div>
    <button class="btn-dark" onclick="location.reload()">CERRAR SESIÓN</button>
</div>

<div id="v-admin" class="view">
    <div class="admin-box">
        <input type="file" id="up-file" multiple accept="image/*" style="display:none" onchange="uploadLaminas(this)">
        <button class="btn-gold" id="up-btn" onclick="document.getElementById('up-file').click()">+ CARGAR LÁMINA</button>
        <div id="admin-gallery" class="admin-thumb-grid"></div>
    </div>
    <button class="btn-dark" onclick="location.reload()">SALIR DEL PANEL</button>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE", 
        projectId: "fran-cruz-sala-vip", 
        databaseURL: "https://fran-cruz-sala-vip-default-rtdb.firebaseio.com", 
        storageBucket: "fran-cruz-sala-vip.appspot.com" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database(), st = firebase.storage();

    let rates = { cr: 515, ni: 36.8, pa: 1, hn: 24.5, sv: 1, gt: 7.7, bz: 2, un: 1 };
    let iso = 'cr', currentPlan = '30 DÍAS GOLD', adminClicks = 0;
    const uid = localStorage.getItem('fc_id') || 'ID-' + Math.random().toString(36).substr(2, 6).toUpperCase();
    localStorage.setItem('fc_id', uid);

    function init() {
        db.ref('rates').on('value', ss => { if(ss.val()){ rates = ss.val(); render(); } });
        syncGallery();
        setLoc('cr');
    }

    // CARGA SIMPLIFICADA PARA EVITAR BLOQUEOS
    async function uploadLaminas(input) {
        const files = Array.from(input.files);
        const btn = document.getElementById('up-btn');
        if (files.length === 0) return;

        for (let file of files) {
            btn.innerText = "SUBIENDO...";
            const ref = st.ref('laminas/' + Date.now() + "_" + file.name);
            try {
                const snap = await ref.put(file);
                const url = await snap.ref.getDownloadURL();
                await db.ref('laminas').push({ url, name: file.name, time: firebase.database.ServerValue.TIMESTAMP });
            } catch (e) { console.log(e); }
        }
        btn.innerText = "+ CARGAR LÁMINA";
        input.value = "";
    }

    function syncGallery() {
        db.ref('laminas').orderByChild('time').on('value', ss => {
            const v = document.getElementById('gallery-vip'), a = document.getElementById('admin-gallery');
            v.innerHTML = ''; a.innerHTML = '';
            ss.forEach(s => {
                const item = s.val();
                v.innerHTML = `<img src="${item.url}" style="width:100%; border-radius:15px; margin-bottom:15px; border:1px solid #1a1a1a;">` + v.innerHTML;
                a.innerHTML += `<div class="thumb-wrap"><button class="btn-del" onclick="deleteImg('${s.key}', '${item.name}')">X</button><img src="${item.url}" class="thumb-img"></div>`;
            });
        });
    }

    function deleteImg(key, name) { if(confirm("¿Eliminar?")){ st.ref('laminas/'+name).delete(); db.ref('laminas/'+key).remove(); } }
    function setLoc(c) { iso = c; document.querySelectorAll('.flag').forEach(f => f.classList.remove('active')); document.getElementById('f-'+c).classList.add('active'); render(); }

    function render() {
        const p = document.getElementById('planes-list'), sym = (iso==='cr'?'₡':(iso==='ni'?'C$':'$'));
        p.innerHTML = '';
        const planes = [{n: "ACCESO HOY", v: 1}, {n: "7 DÍAS SILVER", v: 5}, {n: "30 DÍAS GOLD", v: 20}];
        planes.forEach(pl => {
            const val = Math.round(pl.v * rates[iso]);
            p.innerHTML += `<div class="card ${currentPlan===pl.n?'sel':''}" onclick="currentPlan='${pl.n}';render()"><span>${pl.n}</span><b>${sym}${val.toLocaleString()}</b></div>`;
        });
    }

    function copy(t, el) { navigator.clipboard.writeText(t); el.classList.add('active'); setTimeout(() => el.classList.remove('active'), 1000); }

    function sendWhatsApp() {
        const key = `I-${new Date().getDate().toString().padStart(2, '0')}`;
        const msg = `Plan: ${currentPlan}\nID: ${uid}\n\nEsta es su clave: \`${key}\` \n\n⚠️ Adjunte su comprobante de pago`;
        window.location.href = `https://wa.me/50664535475?text=${encodeURIComponent(msg)}`;
    }

    function checkStatus() {
        db.ref('users/'+uid).once('value', ss => {
            if(ss.val()?.status==='active') {
                document.getElementById('v-main').classList.remove('active');
                document.getElementById('v-vip').classList.add('active');
            } else alert("Validación pendiente.");
        });
    }

    function adminAccess() {
        adminClicks++;
        if(adminClicks >= 5) {
            if(prompt("CLAVE:") === "1376") {
                document.getElementById('v-main').classList.remove('active');
                document.getElementById('v-admin').classList.add('active');
            }
            adminClicks = 0;
        }
    }
    init();
</script>
</body>
</html>
