<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SALA VIP FRAN CRUZ • INTERNACIONAL V3</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <style>
        :root { --o: #d4af37; --n: #050505; --g: linear-gradient(180deg, #f9e498, #d4af37); --r: #8b0000; --v: #006400; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--n); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; user-select: none; min-height: 100vh; overflow-x: hidden; }
        
        /* Sistema de Notificaciones y Carga */
        #progress-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: #111; z-index: 10000; }
        #progress-bar { width: 0%; height: 100%; background: var(--g); transition: width 0.3s; box-shadow: 0 0 10px var(--o); }
        #toast { display: none; position: fixed; bottom: 30px; background: var(--g); color: #000; padding: 15px 30px; border-radius: 50px; font-weight: 900; z-index: 10000; text-align: center; }

        header { padding: 50px 20px 20px; text-align: center; width: 100%; cursor: pointer; }
        .logo { color: var(--o); font-size: 2.3rem; font-weight: 900; letter-spacing: 6px; text-transform: uppercase; }
        .geo-bar { display: flex; justify-content: center; gap: 12px; margin: 20px 0; background: #0a0a0a; padding: 12px; border-radius: 50px; border: 1px solid #111; width: 95%; max-width: 480px; overflow-x: auto; }
        .flag { width: 32px; height: 22px; opacity: 0.3; transition: 0.4s; cursor: pointer; border-radius: 2px; }
        .flag.active { opacity: 1; transform: scale(1.3); filter: drop-shadow(0 0 8px var(--o)); }
        
        .view { display: none; width: 100%; max-width: 400px; flex-direction: column; padding: 0 25px 50px; align-items: center; }
        .view.active { display: flex; }

        /* Estilos de Control */
        .admin-sec { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 12px; padding: 15px; margin-top: 12px; width: 100%; }
        .inp-admin { width: 100%; background: #000; border: 1px solid #222; padding: 12px; color: #fff; border-radius: 8px; margin-top: 8px; text-align: center; font-size: 0.9rem; }
        .btn-gold { width: 100%; background: var(--g); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 15px; }
        
        /* Galería Admin */
        .thumb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 10px; }
        .thumb { position: relative; aspect-ratio: 1; border: 1px solid #222; border-radius: 4px; overflow: hidden; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .del-btn { position: absolute; top: 0; right: 0; background: var(--r); color: #fff; border: none; width: 20px; height: 20px; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="progress-container"><div id="progress-bar"></div></div>
<div id="toast"></div>

<header id="adminTrigger">
    <div class="logo">FRAN CRUZ VIP</div>
    <div id="region-tag" style="color:#555; font-size:0.65rem; letter-spacing:3px; margin-top:5px;">SALA PRIVADA • COSTA RICA</div>
</header>

<div class="geo-bar" id="geo-bar">
    <img src="https://flagcdn.com/cr.svg" class="flag active" onclick="setLoc('COSTA RICA', '₡', 'cr', true)">
    <img src="https://flagcdn.com/ni.svg" class="flag" onclick="setLoc('NICARAGUA', 'C$', 'ni', false)">
    <img src="https://flagcdn.com/hn.svg" class="flag" onclick="setLoc('HONDURAS', 'L', 'hn', false)">
    <img src="https://flagcdn.com/gt.svg" class="flag" onclick="setLoc('GUATEMALA', 'Q', 'gt', false)">
    <img src="https://flagcdn.com/un.svg" class="flag" onclick="setLoc('RESTO DEL MUNDO', '$', 'wd', false)">
</div>

<div id="v-client" class="view active">
    <div id="cont-planes" style="width:100%"></div>
    <button class="btn-gold" onclick="sendWA()">SOLICITAR ACCESO VIP</button>
</div>

<div id="v-admin" class="view">
    <div class="admin-sec"><span style="color:var(--o); font-size:0.7rem; font-weight:bold;">TIPO DE CAMBIO (1 USD = X)</span>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
            <input type="number" id="i-cr" class="inp-admin" placeholder="CR ₡">
            <input type="number" id="i-ni" class="inp-admin" placeholder="NI C$">
            <input type="number" id="i-hn" class="inp-admin" placeholder="HN L">
            <input type="number" id="i-gt" class="inp-admin" placeholder="GT Q">
        </div>
    </div>

    <div class="admin-sec"><span style="color:var(--o); font-size:0.7rem; font-weight:bold;">CONTACTO Y PAGOS</span>
        <input type="text" id="i-sinpe" class="inp-admin" placeholder="Número SINPE">
        <input type="text" id="i-tit" class="inp-admin" placeholder="Nombre del Titular">
        <input type="text" id="i-iban" class="inp-admin" placeholder="Cuenta IBAN">
        <input type="text" id="i-pp" class="inp-admin" placeholder="Correo PayPal">
        <input type="text" id="i-wa" class="inp-admin" placeholder="WhatsApp (506...)">
    </div>

    <div class="admin-sec"><span style="color:var(--o); font-size:0.7rem; font-weight:bold;">CONTROL DE USUARIOS (ALTA/BAN)</span>
        <div id="admin-users" style="margin-top:10px; font-size:0.8rem;"></div>
    </div>

    <div class="admin-sec"><span style="color:var(--o); font-size:0.7rem; font-weight:bold;">GALERÍA VIP (CARGAR FOTOS)</span>
        <input type="file" id="fileInput" accept="image/*" onchange="preView(this)" style="display:none;">
        <button class="btn-gold" style="background:none; border:1px dashed var(--o); color:var(--o); padding:10px;" onclick="document.getElementById('fileInput').click()">SELECCIONAR IMAGEN</button>
        <div id="pre-box" style="display:none; margin-top:10px; text-align:center;">
            <img id="img-pre" style="width:80px; height:80px; object-fit:cover; border-radius:5px; border:1px solid var(--o);">
            <div style="display:flex; gap:5px; margin-top:5px;">
                <button onclick="upImg()" style="flex:1; background:var(--v); color:#fff; border:none; padding:5px; border-radius:4px;">SUBIR</button>
                <button onclick="cancelPre()" style="flex:1; background:var(--r); color:#fff; border:none; padding:5px; border-radius:4px;">X</button>
            </div>
        </div>
        <div id="admin-gal" class="thumb-grid"></div>
    </div>

    <button class="btn-gold" onclick="saveAdmin()">GUARDAR TODO (APLICAR CAMBIOS)</button>
    <button style="width:100%; background:none; color:#555; border:none; margin-top:15px; cursor:pointer;" onclick="location.reload()">CERRAR PANEL</button>
</div>

<script>
    // ... Configuración de Firebase y Variables iniciales ...
    const db = firebase.database();
    const st = firebase.storage();
    const hoy = new Date().toISOString().split('T')[0];
    let fileToUpload = null;

    function showProg(v) { 
        document.getElementById('progress-container').style.display = 'block'; 
        document.getElementById('progress-bar').style.width = v + '%';
        if(v >= 100) setTimeout(() => document.getElementById('progress-container').style.display='none', 1000);
    }

    // --- FUNCIÓN DE GUARDADO REPARADA ---
    function saveAdmin() {
        showProg(20);
        const data = {
            rates: {
                cr: document.getElementById('i-cr').value || 540,
                ni: document.getElementById('i-ni').value || 37,
                hn: document.getElementById('i-hn').value || 24.5,
                gt: document.getElementById('i-gt').value || 7.8,
                wd: 1
            },
            settings: {
                sinpe: document.getElementById('i-sinpe').value,
                titular: document.getElementById('i-tit').value,
                iban: document.getElementById('i-iban').value,
                pp: document.getElementById('i-pp').value,
                wa: document.getElementById('i-wa').value
            }
        };
        
        showProg(60);
        db.ref('config').set(data).then(() => {
            showProg(100);
            notify("✅ CAMBIOS APLICADOS CON ÉXITO");
        }).catch(err => {
            notify("❌ ERROR AL GUARDAR");
            console.error(err);
        });
    }

    // --- GESTIÓN DE GALERÍA ---
    function preView(input) {
        if(input.files && input.files[0]) {
            fileToUpload = input.files[0];
            const reader = new FileReader();
            reader.onload = e => { document.getElementById('img-pre').src = e.target.result; document.getElementById('pre-box').style.display = 'block'; };
            reader.readAsDataURL(fileToUpload);
        }
    }

    function upImg() {
        if(!fileToUpload) return;
        showProg(10);
        const ref = st.ref('laminas/' + Date.now());
        const task = ref.put(fileToUpload);
        task.on('state_changed', s => showProg((s.bytesTransferred/s.totalBytes)*100), null, () => {
            task.snapshot.ref.getDownloadURL().then(url => {
                db.ref('gallery').push({ url: url, fecha: hoy });
                notify("📸 IMAGEN SUBIDA");
                document.getElementById('pre-box').style.display = 'none';
                fileToUpload = null;
            });
        });
    }

    // Escucha de Galería para borrar
    db.ref('gallery').on('value', snap => {
        const gal = document.getElementById('admin-gal'); gal.innerHTML = '';
        snap.forEach(img => {
            if(img.val().fecha === hoy) {
                gal.innerHTML += `<div class="thumb"><img src="${img.val().url}"><button onclick="db.ref('gallery/${img.key}').remove()" class="del-btn">✕</button></div>`;
            }
        });
    });

    // --- CONTROL DE USUARIOS ---
    db.ref('users').on('value', snap => {
        const cont = document.getElementById('admin-users'); cont.innerHTML = '';
        snap.forEach(u => {
            const d = u.val();
            if(d.status === 'espera' || d.status === 'baneado') {
                cont.innerHTML += `
                <div style="background:#111; padding:10px; border-radius:8px; margin-bottom:5px; display:flex; justify-content:space-between; align-items:center;">
                    <span><b>${u.key}</b> <small>(${d.status})</small></span>
                    <div>
                        <button onclick="darAlta('${u.key}')" style="background:var(--v); border:none; color:#fff; padding:5px 8px; border-radius:4px; cursor:pointer; margin-right:5px;">ALTA</button>
                        <button onclick="banUsuario('${u.key}')" style="background:var(--r); border:none; color:#fff; padding:5px 8px; border-radius:4px; cursor:pointer;">BAN</button>
                    </div>
                </div>`;
            }
        });
    });

    function darAlta(id) {
        const expira = new Date().setHours(23,59,59);
        db.ref('users/'+id).update({ status: 'activo', expira: expira }).then(() => notify("✅ USUARIO ACTIVADO"));
    }
    
    function banUsuario(id) {
        db.ref('users/'+id).update({ status: 'baneado' }).then(() => notify("🚫 USUARIO BANEADO"));
    }

    // ... Resto de funciones auxiliares (notify, hideAll, adminTrigger, etc) ...
</script>
</body>
</html>
