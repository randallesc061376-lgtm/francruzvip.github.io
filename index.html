<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRAN CRUZ VIP • TORRE DE CONTROL</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <style>
        :root { --o: #d4af37; --n: #050505; --g: linear-gradient(180deg, #f9e498, #d4af37); --r: #e74c3c; --v: #2ecc71; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--n); color: #fff; margin: 0; min-height: 100vh; }
        
        header { padding: 30px 20px; text-align: center; border-bottom: 1px solid #111; }
        .logo { color: var(--o); font-size: 2rem; font-weight: 900; letter-spacing: 4px; }
        
        .view { display: none; width: 100%; max-width: 500px; margin: auto; flex-direction: column; padding-bottom: 50px; animation: fadeIn 0.3s; }
        .view.active { display: flex; }

        /* --- ESTILOS ADMIN AMPLIADOS --- */
        .adm-card { background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 15px; padding: 20px; margin: 15px 20px; }
        .adm-label { color: var(--o); font-size: 0.8rem; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; display: block; letter-spacing: 1px; border-left: 3px solid var(--o); padding-left: 10px; }
        
        .user-row { background: #000; border: 1px solid #222; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .u-info b { font-family: monospace; font-size: 1.1rem; color: #fff; }
        .u-info span { display: block; font-size: 0.65rem; color: #666; margin-top: 3px; }
        
        .btn-action { border: none; padding: 8px 15px; border-radius: 8px; font-weight: 900; font-size: 0.75rem; cursor: pointer; text-transform: uppercase; margin-left: 5px; }
        .btn-v { background: var(--v); color: #000; }
        .btn-r { background: var(--r); color: #fff; }

        /* GESTIÓN DE GALERÍA EN ADMIN */
        .grid-gal-adm { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 15px; }
        .img-adm { position: relative; aspect-ratio: 9/16; border-radius: 10px; overflow: hidden; border: 1px solid #333; background: #000; }
        .img-adm img { width: 100%; height: 100%; object-fit: cover; }
        .btn-del { position: absolute; bottom: 10px; right: 10px; background: var(--r); color: #fff; border: none; width: 35px; height: 35px; border-radius: 50%; font-weight: 900; cursor: pointer; box-shadow: 0 0 10px rgba(0,0,0,0.5); }

        /* INPUTS Y BOTONES */
        .adm-input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 12px; font-size: 1rem; }
        .btn-gold { width: calc(100% - 40px); background: var(--g); color: #000; border: none; padding: 20px; border-radius: 15px; font-weight: 900; margin: 10px 20px; cursor: pointer; text-transform: uppercase; font-size: 0.9rem; }

        /* --- FRONT END CLIENTE (8 BANDERAS) --- */
        .geo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px; padding: 10px; background: #0f0f0f; border-radius: 15px; }
        .flag { width: 100%; height: 25px; opacity: 0.4; border-radius: 4px; cursor: pointer; object-fit: cover; }
        .flag.active { opacity: 1; border: 1px solid var(--o); }
        .card { background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 12px; padding: 18px; margin: 0 20px 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .card.sel { border: 1px solid var(--o); background: rgba(212,175,55,0.08); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header onclick="adminAccess()">
    <div class="logo">FRAN CRUZ VIP</div>
    <div id="tagline" style="font-size: 0.7rem; color: #555; letter-spacing: 2px;">SALA PRIVADA • COSTA RICA</div>
</header>

<div id="v-admin" class="view">
    <div class="adm-card">
        <span class="adm-label">Lista de Espera y Usuarios</span>
        <div id="admin-user-list"></div>
    </div>

    <div class="adm-card">
        <span class="adm-label">Cargar Nueva Lámina</span>
        <p style="font-size: 0.7rem; color: #666; margin-bottom: 10px;">Selecciona "Archivos" o "Galería" para buscar tus fotos recientes.</p>
        <input type="file" id="f-upload" class="adm-input" accept="image/*">
        <button class="btn-gold" style="margin:0; width:100%; padding:15px" onclick="uploadImg()">PUBLICAR AHORA</button>
    </div>

    <div class="adm-card">
        <span class="adm-label">Visualizar Galería (Revisar/Borrar)</span>
        <div id="admin-gallery-view" class="grid-gal-adm"></div>
    </div>

    <div class="adm-card">
        <span class="adm-label">Tipos de Cambio ($1 USD)</span>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
            <div><small style="color:#555">Costa Rica</small><input type="number" id="rate-cr" class="adm-input" placeholder="₡"></div>
            <div><small style="color:#555">Nicaragua</small><input type="number" id="rate-ni" class="adm-input" placeholder="C$"></div>
        </div>
        <button class="btn-gold" style="margin:0; width:100%; padding:12px" onclick="saveRates()">ACTUALIZAR TASAS</button>
    </div>

    <button class="btn-gold" style="background:#222; color:#fff" onclick="location.reload()">CERRAR PANEL</button>
</div>

<div id="v-client" class="view active">
    <div class="geo-grid">
        <img src="https://flagcdn.com/cr.svg" class="flag active" onclick="setLoc('COSTA RICA', '₡', 540)">
        <img src="https://flagcdn.com/ni.svg" class="flag" onclick="setLoc('NICARAGUA', 'C$', 37)">
        <img src="https://flagcdn.com/pa.svg" class="flag" onclick="setLoc('PANAMÁ', '$', 1)">
        <img src="https://flagcdn.com/hn.svg" class="flag" onclick="setLoc('HONDURAS', 'L', 24.6)">
        <img src="https://flagcdn.com/sv.svg" class="flag" onclick="setLoc('EL SALVADOR', '$', 1)">
        <img src="https://flagcdn.com/gt.svg" class="flag" onclick="setLoc('GUATEMALA', 'Q', 7.7)">
        <img src="https://flagcdn.com/bz.svg" class="flag" onclick="setLoc('BELICE', 'BZ$', 2)">
        <img src="https://flagcdn.com/un.svg" class="flag" onclick="setLoc('WORLDWIDE', '$', 1)">
    </div>
    <div class="card" onclick="selP(this, 'HOY')"><span>ACCESO HOY</span><b class="p-val">₡540</b></div>
    <div class="card sel" onclick="selP(this, '30 DÍAS')"><span>30 DÍAS GOLD</span><b class="p-val">₡10,800</b></div>
    <button class="btn-gold" onclick="requestAccess()">ENVIAR COMPROBANTE</button>
</div>

<script>
    // CONFIGURACIÓN FIREBASE
    const firebaseConfig = { 
        apiKey: "AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE", 
        projectId: "fran-cruz-sala-vip",
        databaseURL: "https://fran-cruz-sala-vip-default-rtdb.firebaseio.com",
        storageBucket: "fran-cruz-sala-vip.firebasestorage.app" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const st = firebase.storage();

    let myID = localStorage.getItem('fc_id') || 'VIP' + Math.floor(Math.random()*9000+1000);
    localStorage.setItem('fc_id', myID);
    let curTasa = 540, curSim = "₡", clicks = 0;

    // --- LÓGICA DE LA TORRE DE CONTROL ---
    function adminAccess() {
        clicks++;
        if(clicks >= 5) {
            if(prompt("PASSWORD:") === "1376") { 
                showView('v-admin'); 
                loadAdminUsers();
                loadAdminGallery();
                loadCurrentRates();
            }
            clicks = 0;
        }
        setTimeout(() => clicks = 0, 2000);
    }

    function loadAdminUsers() {
        db.ref('users').on('value', ss => {
            const list = document.getElementById('admin-user-list');
            list.innerHTML = "";
            ss.forEach(u => {
                const user = u.val();
                list.innerHTML += `
                <div class="user-row">
                    <div class="u-info">
                        <b>${user.id}</b>
                        <span>Plan: ${user.plan || 'N/A'} | ${user.status}</span>
                    </div>
                    <div>
                        <button class="btn-action btn-v" onclick="db.ref('users/${user.id}').update({status:'active'})">✓ Activar</button>
                        <button class="btn-action btn-r" onclick="db.ref('users/${user.id}').update({status:'ban'})">X Ban</button>
                    </div>
                </div>`;
            });
        });
    }

    function uploadImg() {
        const file = document.getElementById('f-upload').files[0];
        if(!file) { alert("Elige una imagen primero"); return; }
        const ref = st.ref('laminas/' + Date.now());
        ref.put(file).then(s => s.ref.getDownloadURL().then(url => {
            db.ref('gallery').push({url, time: Date.now()});
            alert("¡LÁMINA PUBLICADA!");
            document.getElementById('f-upload').value = ""; // Limpiar input
        }));
    }

    function loadAdminGallery() {
        db.ref('gallery').on('value', ss => {
            const view = document.getElementById('admin-gallery-view');
            view.innerHTML = "";
            ss.forEach(img => {
                view.innerHTML += `
                <div class="img-adm">
                    <img src="${img.val().url}">
                    <button class="btn-del" onclick="if(confirm('¿Borrar lámina?')) db.ref('gallery/${img.key}').remove()">X</button>
                </div>`;
            });
        });
    }

    function loadCurrentRates() {
        db.ref('rates').once('value', ss => {
            if(ss.exists()) {
                document.getElementById('rate-cr').value = ss.val().cr;
                document.getElementById('rate-ni').value = ss.val().ni;
            }
        });
    }

    function saveRates() {
        const cr = document.getElementById('rate-cr').value;
        const ni = document.getElementById('rate-ni').value;
        db.ref('rates').set({cr, ni}).then(() => alert("TIPOS DE CAMBIO ACTUALIZADOS"));
    }

    // --- FUNCIONES CLIENTE ---
    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function setLoc(n, s, t) {
        curTasa = t; curSim = s;
        document.getElementById('tagline').innerText = `SALA PRIVADA • ${n}`;
        document.querySelectorAll('.flag').forEach(f => f.classList.remove('active'));
        event.target.classList.add('active');
        updatePrices();
    }

    function updatePrices() {
        const base = {'HOY':1, '30 DÍAS':20};
        document.querySelectorAll('.card').forEach(c => {
            const plan = c.querySelector('span').innerText;
            if(base[plan]) c.querySelector('b').innerText = curSim + Math.round(base[plan] * curTasa).toLocaleString();
        });
    }

    function selP(el, p) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('sel'));
        el.classList.add('sel');
    }

    function copy(t) { navigator.clipboard.writeText(t); alert("Copiado"); }
</script>
</body>
    </html>
