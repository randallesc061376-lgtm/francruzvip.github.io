<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Fran Cruz | VIP</title><script src="https://cdn.tailwindcss.com"></script><style>body{background:#000;color:#fff;font-family:sans-serif}.gold{color:#d4af37}.btn-gold{background:#d4af37;color:#000;padding:15px;width:100%;border-radius:15px;font-weight:bold;text-transform:uppercase}</style></head><body><header class="text-center pt-10"><h1 class="text-3xl gold font-bold">FRAN CRUZ</h1><p id="disp-id" class="text-[10px] opacity-30 font-mono"></p></header><div id="app" class="p-5 mt-10"><div id="main-ui"><div class="bg-[#111] p-6 rounded-3xl text-center"><p class="text-xs opacity-50 mb-2">Tu ID de Acceso:</p><p id="my-id" class="text-2xl font-bold gold mb-6"></p><input type="file" id="f-in" class="hidden" onchange="startProt(this)"><button onclick="document.getElementById('f-in').click()" class="btn-gold mb-4">Enviar Comprobante</button><input type="text" id="k-in" placeholder="Clave Activación" class="w-full bg-black p-3 rounded-xl border border-white/10 text-center uppercase"><button onclick="checkKey()" class="w-full mt-2 text-[10px] opacity-50 uppercase underline">Validar Clave</button></div></div><div id="vip-ui" class="hidden text-center"><h2 class="text-2xl gold mb-5">BODEGA VIP</h2><div id="gallery" class="grid grid-cols-2 gap-4"></div><button onclick="logout()" class="mt-10 text-red-500 text-xs uppercase font-bold">Cerrar Sesión</button></div></div><script>
const uid = "UID-" + Math.random().toString(36).substr(2, 6).toUpperCase();
document.getElementById('disp-id').innerText = uid;
document.getElementById('my-id').innerText = uid;

function startProt(input) {
    if(input.files && input.files[0]) {
        alert("Comprobante recibido. Envíame este ID por WhatsApp para recibir tu clave: " + uid);
    }
}

function checkKey() {
    const inputKey = document.getElementById('k-in').value.toUpperCase();
    const day = new Date().getDate().toString().padStart(2, '0');
    const suffix = uid.slice(-2);
    const validKey = suffix + day;

    if(inputKey === validKey) {
        localStorage.setItem('vip', 'true');
        showVIP();
    } else {
        alert("Clave incorrecta o expirada.");
    }
}

function showVIP() {
    document.getElementById('main-ui').classList.add('hidden');
    document.getElementById('vip-ui').classList.remove('hidden');
}

function logout() {
    localStorage.removeItem('vip');
    location.reload();
}

if(localStorage.getItem('vip') === 'true') showVIP();
</script></body></html>
