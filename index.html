<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fran Cruz | VIP Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #000; color: white; margin: 0; padding: 20px; text-align: center; overflow-x: hidden; }
        .font-luxury { font-family: 'Cinzel', serif; }
        .gold-text { background: linear-gradient(to bottom, #f9e2af 0%, #d4af37 50%, #a67c00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .plan-card { background: #0a0a0a; border-radius: 20px; padding: 15px; cursor: pointer; transition: 0.3s; border: 1px solid #1a1a1a; }
        .plan-card.active { border-color: #d4af37; background: #1a1505; transform: translateY(-5px); }
        .payment-section { background: #070707; border-radius: 30px; padding: 25px; margin-top: 25px; border: 1px solid #1a1a1a; }
        
        /* Galería VIP */
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .lamina-vip-item { text-align: center; }
        .lamina-vip { border-radius: 15px; border: 1px solid #d4af3722; overflow: hidden; background: #0a0a0a; transition: 0.3s; }
        .lamina-vip img { width: 100%; height: auto; display: block; }
        .download-btn { display: inline-flex; align-items: center; justify-content: center; background: #050505; border: 1px solid #d4af3766; color: #d4af37; font-size: 10px; font-weight: bold; text-transform: uppercase; padding: 10px 15px; border-radius: 10px; margin-top: 10px; transition: 0.3s; width: 100%; }
        .download-btn:hover { background: #d4af37; color: black; }

        /* Panel Admin */
        .admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #050505; border: 1px solid #d4af37; padding: 25px; border-radius: 30px; z-index: 1000; width: 95%; max-width: 550px; max-height: 90vh; overflow-y: auto; box-shadow: 0 0 50px rgba(0,0,0,0.9); }
        input { background: #131313; border: 1px solid #222; color: white; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 10px; font-size: 13px; }
        
        /* Gestión de Imágenes en Admin */
        .admin-img-wrapper { position: relative; display: inline-block; width: 60px; height: 80px; }
        .admin-img-preview { width: 100%; height: 100%; object-cover; border-radius: 8px; border: 1px solid #333; }
        .delete-img-btn { position: absolute; top: -5px; right: -5px; background: #ff4444; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #000; }

        .loader-ring { width: 60px; height: 60px; border: 4px solid #1a1a1a; border-top: 4px solid #d4af37; border-radius: 50%; animation: spin 1.5s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="main-interface">
        <header class="mt-4 mb-4 cursor-pointer" onclick="handleAdminClicks()">
            <h1 class="font-luxury text-4xl gold-text tracking-widest uppercase">Fran Cruz</h1>
            <p class="text-[10px] tracking-[0.4em] uppercase opacity-60">El Personaje del Azar</p>
        </header>

        <div class="grid grid-cols-1 gap-3 max-w-sm mx-auto mb-8">
            <div onclick="setPlan(1)" id="p-1" class="plan-card active">Membresía por Hoy <span class="gold-text">$1</span></div>
        </div>

        <div class="payment-section max-w-sm mx-auto">
            <input type="file" id="receipt-upload" accept="image/*" class="hidden" onchange="initIAValidation(this)">
            <button onclick="document.getElementById('receipt-upload').click()" class="w-full bg-white text-black font-bold py-5 rounded-2xl uppercase text-[10px] tracking-widest mt-4">Validar Comprobante con IA</button>
        </div>
    </div>

    <div id="waiting-screen" style="display:none;">
        <div class="loader-ring"></div>
        <p id="ia-status">Validando Pago...</p>
        <div id="success-btn" style="display:none;" class="mt-4">
            <button onclick="grantAccess()" class="bg-yellow-600 px-8 py-4 rounded-xl font-bold">ACCESO AUTORIZADO</button>
        </div>
    </div>

    <div id="vip-content" class="max-w-md mx-auto" style="display:none;">
        <h2 class="font-luxury text-3xl gold-text mt-6 uppercase">Círculo VIP</h2>
        <div id="lamina-container" class="gallery-grid"></div>
        <button onclick="location.reload()" class="mt-8 opacity-30 text-[10px]">SALIR</button>
    </div>

    <div id="adminModal" class="admin-panel">
        <h3 class="gold-text font-bold mb-4 uppercase text-sm">Consola de Control</h3>
        
        <label class="text-[10px] gold-text uppercase block text-left mb-2">Bodega de Láminas Actual</label>
        <div id="admin-laminas-preview" class="flex flex-wrap gap-3 p-4 bg-black rounded-xl border border-white/5 mb-4">
            </div>

        <label class="text-[10px] gold-text uppercase block text-left mb-2">Añadir más Láminas</label>
        <input type="file" id="upload-laminas" multiple accept="image/*" onchange="addLaminas(this)">
        
        <button onclick="saveAdminData()" class="w-full bg-yellow-600 text-white py-4 rounded-xl font-bold text-xs mt-6 uppercase">Sincronizar Sistema</button>
        <button onclick="closeAdmin()" class="w-full text-gray-500 text-[10px] mt-4">CERRAR</button>
    </div>

    <script>
        let adminClicks = 0;
        let vipActive = false;

        const defaults = {
            laminasHoy: [],
            lastUpdate: new Date().toDateString()
        };

        let data = JSON.parse(localStorage.getItem('franCruzVIP')) || defaults;

        // Limpieza automática a medianoche
        function checkAutoPurge() {
            if (data.lastUpdate !== new Date().toDateString()) {
                data.laminasHoy = [];
                data.lastUpdate = new Date().toDateString();
                localStorage.setItem('franCruzVIP', JSON.stringify(data));
            }
        }
        checkAutoPurge();

        // Advertencia al salir
        window.onbeforeunload = function() {
            if (vipActive) return "Si sale perderá el acceso a las láminas.";
        };

        // GESTIÓN DE LÁMINAS (ADMIN)
        function addLaminas(input) {
            if (input.files) {
                Array.from(input.files).forEach(file => {
                    let reader = new FileReader();
                    reader.onload = (e) => {
                        data.laminasHoy.push(e.target.result); // AGREGA sin borrar
                        renderAdminLaminas();
                    };
                    reader.readAsDataURL(file);
                });
            }
        }

        function removeLamina(index) {
            data.laminasHoy.splice(index, 1); // ELIMINA solo la seleccionada
            renderAdminLaminas();
        }

        function renderAdminLaminas() {
            const preview = document.getElementById('admin-laminas-preview');
            preview.innerHTML = data.laminasHoy.map((img, i) => `
                <div class="admin-img-wrapper">
                    <img src="${img}" class="admin-img-preview">
                    <div class="delete-img-btn" onclick="removeLamina(${i})">×</div>
                </div>
            `).join('');
        }

        function grantAccess() {
            vipActive = true;
            document.getElementById('waiting-screen').style.display = 'none';
            document.getElementById('vip-content').style.display = 'block';
            const container = document.getElementById('lamina-container');
            const dateStr = new Date().toLocaleDateString().replace(/\//g, '-');
            
            container.innerHTML = data.laminasHoy.map((img, i) => `
                <div class="lamina-vip-item">
                    <div class="lamina-vip shadow-2xl"><img src="${img}"></div>
                    <a href="${img}" download="FranCruz_${dateStr}_${i+1}.jpg" class="download-btn">
                        <i class="fas fa-download mr-2"></i> DESCARGAR ${i+1}
                    </a>
                </div>
            `).join('');
        }

        // Simulación IA
        function initIAValidation() {
            document.getElementById('main-interface').style.display = 'none';
            document.getElementById('waiting-screen').style.display = 'block';
            setTimeout(() => {
                document.getElementById('ia-status').innerText = "✓ PAGO VALIDADO";
                document.getElementById('success-btn').style.display = 'block';
            }, 3000); // 90s sugeridos para producción
        }

        function handleAdminClicks() {
            adminClicks++;
            if(adminClicks === 5) {
                document.getElementById('adminModal').style.display = 'block';
                renderAdminLaminas();
            }
            setTimeout(() => adminClicks = 0, 3000);
        }

        function saveAdminData() {
            data.lastUpdate = new Date().toDateString();
            localStorage.setItem('franCruzVIP', JSON.stringify(data));
            alert("Sistema Sincronizado");
            location.reload();
        }

        function closeAdmin() { document.getElementById('adminModal').style.display = 'none'; }
    </script>
</body>
                                                                                                                                                          </html>
