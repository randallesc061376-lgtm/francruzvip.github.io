<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fran Cruz VIP | Panel Maestro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #000; color: white; margin: 0; padding: 20px; text-align: center; }
        .font-luxury { font-family: 'Cinzel', serif; }
        .gold-text { background: linear-gradient(to bottom, #f9e2af 0%, #d4af37 50%, #a67c00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: #0a0a0a; border: 1px solid rgba(255,255,255,0.05); border-radius: 25px; }
        .admin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; padding: 20px; overflow-y: auto; }
        input, select { background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="user-view">
        <header class="mt-6 mb-8 cursor-pointer" onclick="handleAdminClicks()">
            <h1 class="font-luxury text-4xl gold-text tracking-widest uppercase">Fran Cruz</h1>
            <p class="text-[9px] tracking-[0.5em] uppercase opacity-40">El Personaje del Azar</p>
        </header>

        <div id="membership-ui">
            <p class="text-[10px] gold-text mb-6 uppercase tracking-widest">Elige tu plan al éxito</p>
            <div class="max-w-sm mx-auto space-y-4">
                <button onclick="showPayment('SINPE CR')" class="glass-card w-full p-6 font-bold uppercase text-xs tracking-widest border-l-4 border-yellow-500">SINPE Costa Rica</button>
                <button onclick="showPayment('Depósito')" class="glass-card w-full p-6 font-bold uppercase text-xs tracking-widest">Depósito Bancario</button>
                <button onclick="showPayment('PayPal')" class="glass-card w-full p-6 font-bold uppercase text-xs tracking-widest">PayPal Global</button>
            </div>
        </div>

        <div id="vip-content" class="hidden fade-in py-10">
            <h2 class="font-luxury text-2xl gold-text mb-6">Lámina VIP</h2>
            <img id="today-image" src="" class="max-w-full mx-auto rounded-2xl shadow-2xl border-2 border-yellow-500/50">
            <p class="text-[10px] mt-4 opacity-40 uppercase">Válido hasta las 11:59 PM</p>
        </div>
    </div>

    <div id="adminPanel" class="admin-modal">
        <div class="max-w-md mx-auto">
            <h2 class="gold-text font-luxury text-2xl mb-8 uppercase tracking-tighter">Panel de Control</h2>
            
            <div class="text-left space-y-6">
                <section>
                    <label class="text-[10px] uppercase text-yellow-500 font-bold">1. Subir Lámina del Día</label>
                    <input type="file" id="file-input" accept="image/*" onchange="previewImage()">
                </section>

                <section>
                    <label class="text-[10px] uppercase text-yellow-500 font-bold">2. Datos de Pago</label>
                    <input type="text" id="adm-titular" placeholder="Nombre Titular">
                    <input type="text" id="adm-sinpe" placeholder="Número SINPE">
                    <input type="text" id="adm-iban" placeholder="Cuenta IBAN">
                    <input type="text" id="adm-paypal" placeholder="Correo PayPal">
                </section>

                <section>
                    <label class="text-[10px] uppercase text-yellow-500 font-bold">3. Tipos de Cambio ($1 = ?)</label>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="rate-cr" placeholder="CRC ₡">
                        <input type="number" id="rate-ni" placeholder="NIO C$">
                    </div>
                </section>

                <button onclick="saveAllAndClose()" class="w-full bg-yellow-600 text-black font-bold py-4 rounded-xl uppercase tracking-widest">Guardar y Publicar</button>
                <button onclick="closeAdmin()" class="w-full text-gray-500 text-xs mt-4 uppercase">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let adminClicks = 0;
        let config = JSON.parse(localStorage.getItem('franCruzMaster')) || {
            titular: "Randall Esteban Sánchez",
            sinpe: "8888-8888",
            iban: "CR00-0000-0000",
            paypal: "pagos@francruzvip.com",
            rates: { CR: 525, NI: 36.5 },
            lamina: ""
        };

        function handleAdminClicks() {
            adminClicks++;
            if(adminClicks === 5) {
                document.getElementById('adminPanel').style.display = 'block';
                // Cargar valores actuales en el panel
                document.getElementById('adm-titular').value = config.titular;
                document.getElementById('adm-sinpe').value = config.sinpe;
                document.getElementById('adm-iban').value = config.iban;
                document.getElementById('adm-paypal').value = config.paypal;
                document.getElementById('rate-cr').value = config.rates.CR;
                document.getElementById('rate-ni').value = config.rates.NI;
            }
            setTimeout(() => adminClicks = 0, 3000);
        }

        function previewImage() {
            const file = document.getElementById('file-input').files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                config.lamina = reader.result;
            }
            if (file) reader.readAsDataURL(file);
        }

        function saveAllAndClose() {
            config.titular = document.getElementById('adm-titular').value;
            config.sinpe = document.getElementById('adm-sinpe').value;
            config.iban = document.getElementById('adm-iban').value;
            config.paypal = document.getElementById('adm-paypal').value;
            config.rates.CR = document.getElementById('rate-cr').value;
            config.rates.NI = document.getElementById('rate-ni').value;
            
            localStorage.setItem('franCruzMaster', JSON.stringify(config));
            alert("¡Plataforma Actualizada!");
            location.reload();
        }

        function showPayment(method) {
            // Aquí se activa la lógica de pago que ya hicimos
            // Al detectar éxito por la IA:
            if(config.lamina) {
                document.getElementById('membership-ui').classList.add('hidden');
                document.getElementById('vip-content').classList.remove('hidden');
                document.getElementById('today-image').src = config.lamina;
            } else {
                alert("La lámina del día aún no ha sido cargada por el administrador.");
            }
        }

        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }
    </script>
</body>
</html>
