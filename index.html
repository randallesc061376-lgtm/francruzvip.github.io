<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRAN CRUZ VIP • OFICIAL V8</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <style>
        :root { --o: #d4af37; --n: #050505; --g: linear-gradient(180deg, #f9e498, #d4af37); --r: #ff4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: var(--n); color: #fff; margin: 0; min-height: 100vh; overflow-x: hidden; }
        header { padding: 12px 10px; text-align: center; cursor: pointer; border-bottom: 1px solid #111; }
        .logo { color: var(--o); font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; }
        .view { display: none; width: 100%; max-width: 420px; margin: auto; flex-direction: column; padding: 5px; animation: fadeIn 0.3s; }
        .view.active { display: flex; }

        .geo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin: 5px 8px; padding: 6px; background: #0f0f0f; border-radius: 8px; min-height: 50px; }
        .flag { width: 100%; height: 18px; opacity: 0.35; border-radius: 2px; cursor: pointer; object-fit: cover; }
        .flag.active { opacity: 1; border: 1px solid var(--o); box-shadow: 0 0 5px var(--o); }
        
        .card { background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 6px; padding: 8px 12px; margin: 0 8px 4px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; height: 38px; }
        .card.sel { border: 1px solid var(--o); background: rgba(212,175,55,0.1); }
        .card span { font-size: 0.75rem; font-weight: 600; }
        .card b { color: var(--o); font-size: 0.85rem; }

        .acc-item { border: 1px solid #1a1a1a; border-radius: 6px; margin: 0 8px 3px; overflow: hidden; }
        .acc-head { background: #111; padding: 6px 10px; font-size: 0.65rem; font-weight: bold; color: #555; cursor: pointer; display: flex; justify-content: space-between; }
        .acc-body { display: none; background: #080808; padding: 8px; border-top: 1px solid #1a1a1a; text-align: center; }
        .acc-body.active { display: block; }
        
        .titular { font-size: 0.7rem; color: var(--o); font-weight: 800; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; border-bottom: 1px solid #1a1a1a; padding-bottom: 5px; }
        .info-label { font-size: 0.6rem; color: #d4af37; text-transform: uppercase; margin-top: 6px; font-weight: 900; display: block; letter-spacing: 1px; }
        .copy-box { background: #111; padding: 8px; border-radius: 4px; margin: 2px 0; font-family: monospace; color: #fff; cursor: pointer; border: 1px dashed var(--o); font-size: 0.75rem; font-weight: bold; }
        
        .btn-gold { width: calc(100% - 16px); background: var(--g); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 900; margin: 6px 8px; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        .btn-outline { width: calc(100% - 16px); background: transparent; color: var(--o); border: 1px solid #222; padding: 8px; border-radius: 6px; font-weight: 700; margin: 0 8px 8px; cursor: pointer; font-size: 0.6rem; letter-spacing: 1px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body oncontextmenu="return false;">

<header onclick="adminAccess()">
    <div class="logo">FRAN CRUZ VIP</div>
    <div id="tagline" style="font-size: 0.55rem; color: #333;">SALA PRIVADA • COSTA RICA</div>
</header>

<div id="v-client" class="view active">
    <div class="geo-grid">
        <img src="https://flagcdn.com/cr.svg" class="flag active" onclick="setLoc('COSTA RICA', '₡', 540)">
        <img src="https://flagcdn.com/ni.svg" class="flag" onclick="setLoc('NICARAGUA', 'C$', 37)">
        <img src="https://flagcdn.com/pa.svg" class="flag" onclick="setLoc('PANAMÁ', '$', 1)">
        <img src="https://flagcdn.com/hn.svg" class="flag" onclick="setLoc('HONDURAS', 'L', 24.6)">
        <img src="https://flagcdn.com/sv.svg" class="flag" onclick="setLoc('EL SALVADOR', '$', 1)">
        <img src="https://flagcdn.com/gt.svg" class="flag" onclick="setLoc('GUATEMALA', 'Q', 7.7)">
        <img src="https://flagcdn.com/bz.svg" class="flag" onclick="setLoc('BELICE', 'BZ$', 2)">
        <img src="https://flagcdn.com/un.svg" class="flag" onclick="setLoc('WORLDWIDE', '$', 1)">
    </div>
    
    <div class="card" onclick="selP(this, 'HOY', 1)"><span>ACCESO HOY</span><b class="p-val">₡540</b></div>
    <div class="card" onclick="selP(this, '7 DÍAS SILVER', 5)"><span>7 DÍAS SILVER</span><b class="p-val">₡2,700</b></div>
    <div class="card sel" onclick="selP(this, '30 DÍAS GOLD', 20)"><span>30 DÍAS GOLD</span><b class="p-val">₡10,800</b></div>
    
    <div class="acc-item">
        <div class="acc-head" onclick="toggleAcc(this)">1. MÉTODO RECOMENDADO: SINPE <span>▼</span></div>
        <div class="acc-body active">
            <div class="titular">Randall Sánchez C.</div>
            <span class="info-label">SINPE MÓVIL CR</span>
            <div class="copy-box" onclick="copy('70835833')">70835833</div>
            <span class="info-label">IBAN MUTUAL ALAJUELA</span>
            <div class="copy-box" onclick="copy('CR80080315001000035641')">CR80...641</div>
        </div>
    </div>
    
    <div class="acc-item">
        <div class="acc-head" onclick="toggleAcc(this)">2. OTROS MÉTODOS / PAYPAL <span>▼</span></div>
        <div class="acc-body">
            <div class="titular">Randall Sánchez C.</div>
            <span class="info-label">CORREO PAYPAL</span>
            <div class="copy-box" onclick="copy('randallesc061376@gmail.com')">randallesc061376@gmail.com</div>
        </div>
    </div>

    <button class="btn-gold" onclick="requestAccess()">ENVIAR COMPROBANTE WHATSAPP</button>
    <button class="btn-outline">YA TENGO MI CLAVE</button>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE", 
        projectId: "fran-cruz-sala-vip",
        databaseURL: "https://fran-cruz-sala-vip-default-rtdb.firebaseio.com",
        storageBucket: "fran-cruz-sala-vip.firebasestorage.app" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let curTasa = 540, curSim = "₡", curP = "30 DÍAS GOLD", clicks = 0;
    let myID = localStorage.getItem('fc_id') || 'UID-' + Math.random().toString(36).substr(2, 6).toUpperCase();
    localStorage.setItem('fc_id', myID);

    function setLoc(n, s, t) {
        curTasa = t; curSim = s;
        document.getElementById('tagline').innerText = `SALA PRIVADA • ${n}`;
        document.querySelectorAll('.flag').forEach(f => f.classList.remove('active'));
        event.target.classList.add('active');
        updatePrices();
    }

    function updatePrices() {
        const base = [1, 5, 20];
        document.querySelectorAll('.p-val').forEach((el, i) => {
            el.innerText = curSim + Math.round(base[i] * curTasa).toLocaleString();
        });
    }

    function selP(el, p) {
        curP = p;
        document.querySelectorAll('.card').forEach(c => c.classList.remove('sel'));
        el.classList.add('sel');
    }

    function copy(t) { navigator.clipboard.writeText(t); alert("¡Copiado!"); }
    function toggleAcc(el) { el.nextElementSibling.classList.toggle('active'); }

    function requestAccess() {
        const msg = `Solicito ${curP}. ID: ${myID}`;
        window.open(`https://wa.me/50664535475?text=${encodeURIComponent(msg)}`);
        db.ref('users/' + myID).set({ id: myID, status: 'wait', plan: curP });
    }

    function adminAccess() {
        clicks++;
        if(clicks >= 5) {
            if(prompt("PASS:") === "1376") {
                alert("Acceso Administrador");
            }
            clicks = 0;
        }
        setTimeout(() => clicks = 0, 2000);
    }
</script>
</body>
</html>
