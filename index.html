<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRAN CRUZ VIP</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <style>
        :root { --o: #d4af37; --n: #050505; --g: linear-gradient(180deg, #f9e498, #d4af37); --r: #8b0000; --v: #006400; }
        body { background: var(--n); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; user-select: none; }
        header { padding: 40px 20px 10px; text-align: center; width: 100%; box-sizing: border-box; cursor: pointer; }
        .logo { color: var(--o); font-size: 2rem; font-weight: 900; letter-spacing: 6px; text-transform: uppercase; }
        .tagline { color: #555; font-size: .6rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 5px; font-weight: bold; }
        .geo-bar { display: flex; justify-content: center; gap: 10px; margin: 20px 0; background: #0a0a0a; padding: 10px 15px; border-radius: 50px; border: 1px solid #111; }
        .flag { width: 25px; height: 17px; border-radius: 2px; cursor: pointer; opacity: 0.3; transition: 0.3s; border: 1px solid transparent; }
        .flag.active { opacity: 1; border-color: var(--o); transform: scale(1.1); }
        .p { display: none; width: 100%; max-width: 400px; flex-direction: column; padding: 0 20px 40px; box-sizing: border-box; }
        .a { display: flex; }
        .plan-box { width: 100%; background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 12px; padding: 20px 22px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; cursor: pointer; }
        .plan-box.sel { border-color: var(--o); background: rgba(212,175,55,0.03); }
        .plan-box b { color: var(--o); font-size: 1.15rem; }
        .method { width: 100%; background: #080808; border: 1px solid #151515; border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
        .method-h { padding: 16px; text-align: center; font-size: 0.8rem; font-weight: 900; color: #444; cursor: pointer; }
        .method-c { display: none; padding: 20px; text-align: center; border-top: 1px solid #151515; background: #050505; }
        .method.open .method-c { display: block; }
        .method.open .method-h { color: var(--o); background: #0c0c0c; }
        .btn-gold { width: 100%; background: var(--g); color: #000; border: none; padding: 20px; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 15px; }
        .admin-sec { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 15px; padding: 20px; margin-top: 20px; }
        .inp-admin { width: 100%; background: #000; border: 1px solid #222; padding: 15px; color: #fff; border-radius: 8px; margin-bottom: 10px; text-align: center; box-sizing: border-box; }
    </style>
</head>
<body>

<header id="adminTrigger">
    <div class="logo">FRAN CRUZ VIP</div>
    <div id="region-tag" class="tagline">SALA PRIVADA • COSTA RICA</div>
</header>

<div class="geo-bar">
    <img src="https://flagcdn.com/cr.svg" class="flag active" onclick="setRegion('COSTA RICA', '₡', 'cr', this)">
    <img src="https://flagcdn.com/ni.svg" class="flag" onclick="setRegion('NICARAGUA', 'C$', 'ni', this)">
    <img src="https://flagcdn.com/pa.svg" class="flag" onclick="setRegion('PANAMÁ', '$', 'usd', this)">
    <img src="https://flagcdn.com/hn.svg" class="flag" onclick="setRegion('HONDURAS', 'L', 'hn', this)">
    <img src="https://flagcdn.com/sv.svg" class="flag" onclick="setRegion('EL SALVADOR', '$', 'usd', this)">
    <img src="https://flagcdn.com/gt.svg" class="flag" onclick="setRegion('GUATEMALA', 'Q', 'gt', this)">
    <img src="https://flagcdn.com/bz.svg" class="flag" onclick="setRegion('BELICE', '$', 'usd', this)">
</div>

<div id="view-client" class="p a">
    <div id="planes-container"></div>
    <div class="method" onclick="tglM(this)">
        <div class="method-h">1. SINPE MÓVIL</div>
        <div class="method-c" onclick="copy('64535475')">6453 5475<br><small>Randall Sánchez C.</small></div>
    </div>
    <button class="btn-gold" onclick="sendWA()">ENVIAR COMPROBANTE DE PAGO</button>
</div>

<div id="view-admin" class="p">
    <div class="admin-sec">
        <span style="color:var(--o); font-size:0.7rem; font-weight:bold;">CARGAR LÁMINA</span>
        <input type="file" id="file" onchange="subirLamina(this)" style="margin-top:10px;">
    </div>
    <div class="admin-sec">
        <span style="color:var(--o); font-size:0.7rem; font-weight:bold;">GESTIÓN USUARIO</span>
        <input type="text" id="target-uid" class="inp-admin" placeholder="UID DEL CLIENTE">
        <button class="btn-gold" style="background:var(--v); color:#fff;" onclick="gestionar('active')">DAR ALTA</button>
        <button class="btn-gold" style="background:var(--r); color:#fff;" onclick="gestionar('banned')">BANEAR</button>
    </div>
    <div class="admin-sec">
        <span style="color:var(--o); font-size:0.7rem; font-weight:bold;">TIPOS DE CAMBIO</span>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
            <input type="number" id="inp-cr" class="inp-admin" placeholder="CR ₡">
            <input type="number" id="inp-ni" class="inp-admin" placeholder="NI C$">
            <input type="number" id="inp-hn" class="inp-admin" placeholder="HN L">
            <input type="number" id="inp-gt" class="inp-admin" placeholder="GT Q">
        </div>
        <button class="btn-gold" onclick="guardarTasas()">APLICAR CAMBIOS PERMANENTES</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE",
      authDomain: "fran-cruz-sala-vip.firebaseapp.com",
      projectId: "fran-cruz-sala-vip",
      storageBucket: "fran-cruz-sala-vip.firebasestorage.app",
      messagingSenderId: "1022733043010",
      appId: "1:1022733043010:web:379db18e37bbfde2cf34db"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let symbol = "₡", rate = 540, pSel = "30 DÍAS GOLD", uSel = 15, currentRates = {};

    // Cargar tasas desde Firebase al iniciar
    db.ref('config/rates').on('value', (snap) => {
        currentRates = snap.val() || { cr: 540, ni: 36.5, hn: 24.7, gt: 7.8, usd: 1 };
        renderPlanes();
    });

    function setRegion(name, sym, key, el) {
        symbol = sym; rate = currentRates[key];
        document.getElementById('region-tag').innerText = `SALA PRIVADA • ${name}`;
        document.querySelectorAll('.flag').forEach(f => f.classList.remove('active'));
        el.classList.add('active');
        renderPlanes();
    }

    function renderPlanes() {
        const cont = document.getElementById('planes-container'); cont.innerHTML = '';
        [{n:"Acceso Hoy",u:1},{n:"7 Días Silver",u:5},{n:"30 Días Gold",u:15}].forEach(p => {
            const val = (p.u * rate).toLocaleString();
            cont.innerHTML += `<div class="plan-box ${p.n===pSel?'sel':''}" onclick="pSel='${p.n}';uSel=${p.u};renderPlanes()"><span>${p.n}</span><b>${symbol}${val}</b></div>`;
        });
    }

    function guardarTasas() {
        const rates = {
            cr: document.getElementById('inp-cr').value || currentRates.cr,
            ni: document.getElementById('inp-ni').value || currentRates.ni,
            hn: document.getElementById('inp-hn').value || currentRates.hn,
            gt: document.getElementById('inp-gt').value || currentRates.gt,
            usd: 1
        };
        db.ref('config/rates').set(rates).then(() => alert("Tasas guardadas en la nube"));
    }

    function gestionar(status) {
        const uid = document.getElementById('target-uid').value;
        if(!uid) return;
        db.ref('users/' + uid).update({status: status}).then(() => alert("Usuario actualizado"));
    }

    function subirLamina(e) {
        const file = e.files[0];
        const ref = firebase.storage().ref('laminas/' + file.name);
        ref.put(file).then(snap => snap.ref.getDownloadURL().then(url => {
            db.ref('gallery').push({url: url, date: Date.now()});
            alert("Lámina subida con éxito");
        }));
    }

    function sendWA() {
        const val = (uSel * rate).toLocaleString();
        const msg = `Hola! He seleccionado el Plan de *${pSel}* por un valor de *${symbol}${val}*.\n\nAdjunto envío mi comprobante para la activación.`;
        window.location.href = `https://wa.me/50664535475?text=${encodeURIComponent(msg)}`;
    }

    function tglM(e) { e.classList.toggle('open'); }
    function copy(t) { navigator.clipboard.writeText(t); alert("Copiado"); }

    // Admin Access (5 taps logo)
    let taps = 0;
    document.getElementById('adminTrigger').onclick = () => {
        taps++;
        if(taps >= 5) {
            const p = prompt("PASSKEY:");
            if(p === "2026") {
                document.getElementById('view-client').classList.remove('a');
                document.getElementById('view-admin').classList.add('a');
            }
            taps = 0;
        }
        setTimeout(() => taps = 0, 3000);
    };
</script>
</body>
</html>
