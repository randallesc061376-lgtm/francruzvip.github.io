<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fran Cruz | VIP Mastermind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap');
        :root { --gold: #d4af37; }
        body { font-family: 'Poppins', sans-serif; background: #000; color: white; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .font-luxury { font-family: 'Cinzel', serif; }
        .gold-text { background: linear-gradient(to bottom, #f9e2af 0%, #d4af37 50%, #a67c00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* PANTALLA IA PROTOCOLO */
        #ia-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .loader-ring { width: 100px; height: 100px; border: 2px solid #111; border-top: 2px solid var(--gold); border-radius: 50%; animation: spin 1.2s infinite cubic-bezier(0.68, -0.55, 0.27, 1.55); shadow: 0 0 20px var(--gold); }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* BOTÓN ACCESO AUTORIZADO */
        #auth-btn-container { display: none; margin-top: 30px; animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* PANEL ADMIN MODAL */
        #admin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 10000; overflow-y: auto; padding: 20px; }
        .admin-content { background: #080808; border: 1px solid var(--gold); border-radius: 30px; max-width: 450px; margin: 20px auto; padding: 25px; box-shadow: 0 0 60px rgba(0,0,0,1); }

        .plan-card { transition: 0.3s; border: 1px solid #1a1a1a; background: #0a0a0a; cursor: pointer; }
        .plan-card.active { border-color: var(--gold); background: #120f05; transform: scale(1.02); }
        .method-tab { font-size: 10px; text-transform: uppercase; padding: 12px; opacity: 0.3; cursor: pointer; border-bottom: 2px solid transparent; }
        .method-tab.active { opacity: 1; color: var(--gold); border-bottom: 2px solid var(--gold); }
        .flag-btn { font-size: 28px; cursor: pointer; opacity: 0.2; }
        .flag-btn.active { opacity: 1; transform: scale(1.1); }
        .btn-gold-action { background: var(--gold); color: black; font-weight: 800; padding: 18px; border-radius: 15px; width: 100%; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 10px 20px rgba(212,175,55,0.2); }
    </style>
</head>
<body>

    <div id="ia-screen">
        <div id="protocol-spinner">
            <div class="loader-ring mx-auto"></div>
        </div>
        
        <div class="mt-8 max-w-xs w-full">
            <h2 id="ia-main-title" class="font-luxury text-2xl gold-text mb-2 uppercase tracking-tighter">Analizando Datos</h2>
            <div class="bg-[#0a0a0a] p-6 rounded-[30px] border border-white/5">
                <p id="ia-status" class="text-[10px] uppercase tracking-[0.2em] opacity-60 h-12 flex items-center justify-center text-center italic">Iniciando protocolo de seguridad...</p>
                <div id="progress-bar-container" class="w-full bg-[#111] h-1 rounded-full mt-4 overflow-hidden">
                    <div id="ia-fill" class="h-full bg-yellow-500 w-0 transition-all duration-[40000ms] ease-linear"></div>
                </div>
            </div>
            
            <div id="auth-btn-container">
                <button onclick="enterVIP()" class="btn-gold-action text-[12px]">Acceso Autorizado <i class="fa-solid fa-chevron-right ml-2"></i></button>
            </div>
        </div>
    </div>

    <div id="banned-screen" class="hidden text-center px-8 pt-24">
        <i class="fa-solid fa-user-lock text-6xl text-red-600 mb-6"></i>
        <h1 class="font-luxury text-2xl gold-text mb-4 uppercase">Dispositivo Bloqueado</h1>
        <p id="my-id-display" class="text-xl font-bold tracking-widest text-red-500 mb-8 font-mono">----</p>
        <a id="support-link" href="#" class="inline-block border border-gold px-10 py-4 rounded-full text-[10px] uppercase font-bold gold-text tracking-widest">Soporte Maestro</a>
    </div>

    <div id="app-content">
        <header class="mt-8 mb-10 text-center" onclick="handleAdminClicks()">
            <h1 class="font-luxury text-4xl gold-text tracking-[0.2em] uppercase">Fran Cruz</h1>
            <p class="text-[9px] tracking-[0.5em] uppercase opacity-40 mt-2 font-bold italic">Mente Maestra del Azar</p>
        </header>

        <div id="main-ui" class="p-4">
            <div class="flex gap-2 mb-8 justify-center flex-wrap">
                <span onclick="setCountry('CR')" id="f-CR" class="flag-btn active">🇨🇷</span>
                <span onclick="setCountry('NI')" id="f-NI" class="flag-btn">🇳🇮</span>
                <span onclick="setCountry('PA')" id="f-PA" class="flag-btn">🇵🇦</span>
                <span onclick="setCountry('HN')" id="f-HN" class="flag-btn">🇭🇳</span>
                <span onclick="setCountry('SV')" id="f-SV" class="flag-btn">🇸🇻</span>
                <span onclick="setCountry('GT')" id="f-GT" class="flag-btn">🇬🇹</span>
                <span onclick="setCountry('US')" id="f-US" class="flag-btn">🇺🇸</span>
            </div>

            <div class="max-w-sm mx-auto space-y-3 mb-8">
                <div onclick="setPlan(1)" id="p-1" class="plan-card p-5 rounded-2xl">
                    <p class="text-[8px] opacity-40 font-bold uppercase">Membresía Hoy</p>
                    <h3 class="text-lg font-bold gold-text">$1 USD</h3>
                </div>
                <div onclick="setPlan(5)" id="p-5" class="plan-card p-5 rounded-2xl active">
                    <p class="text-[8px] opacity-40 font-bold uppercase">Semanal</p>
                    <h3 class="text-lg font-bold gold-text">$5 USD</h3>
                </div>
                <div onclick="setPlan(15)" id="p-15" class="plan-card p-5 rounded-2xl">
                    <p class="text-[8px] opacity-40 font-bold uppercase">Mensual VIP</p>
                    <h3 class="text-lg font-bold gold-text">$15 USD</h3>
                </div>
            </div>

            <div class="max-w-sm mx-auto bg-[#050505] rounded-[35px] p-6 border border-white/5 text-center">
                <div class="flex mb-8 border-b border-white/5">
                    <div onclick="setMethod('sinpe')" id="m-sinpe" class="method-tab active flex-1">Sinpe</div>
                    <div onclick="setMethod('trans')" id="m-trans" class="method-tab flex-1">IBAN</div>
                    <div onclick="setMethod('paypal')" id="m-paypal" class="method-tab flex-1">PayPal</div>
                </div>
                <p id="pay-data" class="text-xl font-bold gold-text mb-1">---</p>
                <p id="pay-titular" class="text-[9px] opacity-30 uppercase font-bold mb-8 italic">---</p>
                <p id="final-price" class="text-6xl font-bold text-yellow-500 mb-10 tracking-tighter">---</p>
                
                <input type="file" id="receipt-input" class="hidden" accept="image/*" onchange="runIAValidation(this)">
                <button onclick="document.getElementById('receipt-input').click()" class="w-full bg-white text-black font-bold py-5 rounded-2xl uppercase text-[11px] tracking-widest active:scale-95 transition-all">Enviar Comprobante</button>
            </div>
        </div>

        <div id="vip-ui" class="hidden p-4 text-center">
            <h2 class="font-luxury text-2xl gold-text mb-6 border-b border-white/10 pb-4 uppercase">Bodega VIP</h2>
            <div id="vip-gallery" class="max-w-md mx-auto space-y-6 mb-10"></div>
            
            <div class="max-w-xs mx-auto space-y-4">
                <button onclick="goToMenu()" class="w-full py-4 border border-white/10 rounded-xl text-[10px] uppercase font-bold tracking-widest opacity-60">Regresar al Menú Principal</button>
                <button onclick="logoutVIP()" class="w-full py-4 text-[9px] text-red-800 uppercase font-bold tracking-widest">Finalizar Sesión VIP</button>
            </div>
        </div>
    </div>    <div id="admin-modal">
        <div class="admin-content">
            <h2 class="gold-text font-luxury text-center mb-6 text-xl">CONTROL MAESTRO</h2>
            <div class="space-y-3 mb-6">
                <input type="text" id="adm-titular" class="w-full bg-[#111] p-3 rounded-xl text-xs border border-white/10" placeholder="Titular">
                <input type="text" id="adm-sinpe" class="w-full bg-[#111] p-3 rounded-xl text-xs border border-white/10" placeholder="Sinpe">
                <input type="text" id="adm-wa" class="w-full bg-[#111] p-3 rounded-xl text-xs border border-white/10" placeholder="WhatsApp">
                <input type="text" id="adm-iban" class="w-full bg-[#111] p-3 rounded-xl text-xs border border-white/10" placeholder="IBAN">
                <input type="text" id="adm-paypal" class="w-full bg-[#111] p-3 rounded-xl text-xs border border-white/10" placeholder="PayPal">
            </div>
            <div class="grid grid-cols-2 gap-2 mb-6 bg-white/5 p-4 rounded-xl">
                <input type="number" id="rate-CR" class="bg-black p-2 rounded text-xs border border-white/10" placeholder="CRC">
                <input type="number" id="rate-NI" class="bg-black p-2 rounded text-xs border border-white/10" placeholder="NIO">
                <input type="number" id="rate-GT" class="bg-black p-2 rounded text-xs border border-white/10" placeholder="GTQ">
                <input type="number" id="rate-HN" class="bg-black p-2 rounded text-xs border border-white/10" placeholder="HNL">
            </div>
            <div class="mb-6">
                <label class="text-[9px] gold-text font-bold uppercase">Cargar Láminas</label>
                <input type="file" id="upload-vault" multiple class="hidden" onchange="saveToVault(this)">
                <button onclick="document.getElementById('upload-vault').click()" class="w-full bg-white/5 border border-white/10 py-3 rounded-xl text-[10px] uppercase font-bold mt-2">Añadir Fotos</button>
                <div id="admin-vault-preview" class="flex flex-wrap gap-2 mt-3"></div>
            </div>
            <div class="bg-red-950/20 p-4 rounded-2xl mb-6">
                <label class="text-[9px] text-red-500 font-bold uppercase">Auditoría de Pagos</label>
                <div id="admin-receipt-preview" class="flex flex-wrap gap-2 mt-3"></div>
            </div>
            <div class="mb-6"><table class="w-full text-[10px]"><tbody id="blacklist-body"></tbody></table></div>
            <button onclick="saveAdminChanges()" class="w-full bg-yellow-600 py-5 rounded-2xl font-bold uppercase text-[10px]">Guardar Cambios</button>
            <button onclick="document.getElementById('admin-modal').style.display='none'" class="w-full py-4 text-[8px] opacity-30 text-center uppercase">Cerrar</button>
        </div>
    </div>

    <script>
        let db; let myID; let adminClicks = 0;
        let config = { 
            titular: "Randall Sánchez", sinpe: "6453-5475", whatsapp: "50664535475", 
            iban: "CR80080315001000035641", paypal: "pagos@francruz.com",
            rates: { CR: 525, NI: 36.5, GT: 7.8, HN: 24.5, USD: 1 }, blacklist: [] 
        };
        let currentCountry = 'CR'; let currentPlan = 5; let currentMethod = 'sinpe';
        
        const messages = [
            "Cruzando metadatos de imagen...",
            "Validando firma digital del banco...",
            "Iniciando control de trazabilidad...",
            "Sincronizando con nodo Fran Cruz...",
            "Extrayendo coordenadas de pago...",
            "Protocolo de seguridad completado."
        ];

        const req = indexedDB.open("FranCruz_v57", 1);
        req.onupgradeneeded = (e) => { 
            db = e.target.result; 
            db.createObjectStore("config"); 
            db.createObjectStore("gallery", { keyPath: "id", autoIncrement: true }); 
            db.createObjectStore("receipts", { keyPath: "id", autoIncrement: true });
        };
        req.onsuccess = (e) => { db = e.target.result; init(); };

        async function init() {
            myID = localStorage.getItem('fc_id') || 'FC-' + Math.random().toString(36).substr(2, 4).toUpperCase();
            localStorage.setItem('fc_id', myID);
            const saved = await getDB("config", "main");
            if(saved) config = saved;
            if(config.blacklist.includes(myID)) { showBanned(); return; }
            
            // Si tiene sesión activa, puede ver la bodega, pero por defecto mostramos menú si el usuario quiere navegar
            if(localStorage.getItem('fc_vip_session') === 'true') {
                renderUI(); // Renderizamos menú por si quiere volver a pagar o ver info
                showVIP();  // Mostramos bodega
            } else {
                renderUI();
            }
        }

        function setCountry(c) { currentCountry = c; renderUI(); }
        function setPlan(p) { currentPlan = p; renderUI(); }
        function setMethod(m) { currentMethod = m; renderUI(); }

        function renderUI() {
            document.querySelectorAll('.flag-btn, .plan-card, .method-tab').forEach(el => el.classList.remove('active'));
            document.getElementById('f-'+currentCountry).classList.add('active');
            document.getElementById('p-'+currentPlan).classList.add('active');
            document.getElementById('m-'+currentMethod).classList.add('active');
            const rate = config.rates[currentCountry] || 1;
            const price = Math.round(currentPlan * rate);
            const symbols = { CR: '₡', NI: 'C$', GT: 'Q', HN: 'L', USD: '$' };
            document.getElementById('final-price').innerText = `${symbols[currentCountry] || '$'}${price.toLocaleString()}`;
            document.getElementById('pay-titular').innerText = config.titular;
            if(currentMethod === 'sinpe') document.getElementById('pay-data').innerText = config.sinpe;
            else if(currentMethod === 'trans') document.getElementById('pay-data').innerText = config.iban;
            else document.getElementById('pay-data').innerText = config.paypal;
        }

        // PROTOCOLO DE TENSIÓN
        function runIAValidation(input) {
            if(!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                await addDB("receipts", { data: e.target.result, userID: myID });
                document.getElementById('app-content').style.display = 'none';
                document.getElementById('ia-screen').style.display = 'flex';
                
                // Reiniciar visuales
                document.getElementById('auth-btn-container').style.display = 'none';
                document.getElementById('ia-main-title').innerText = "Analizando Datos";
                document.getElementById('protocol-spinner').style.display = 'block';
                document.getElementById('progress-bar-container').style.display = 'block';
                document.getElementById('ia-fill').style.width = '0%';
                
                setTimeout(() => { document.getElementById('ia-fill').style.width = '100%'; }, 100);

                let i = 0;
                const timer = setInterval(() => {
                    document.getElementById('ia-status').innerText = messages[i];
                    i++;
                    if(i >= messages.length) {
                        clearInterval(timer);
                        completeProtocol();
                    }
                }, 7000);
            };
            reader.readAsDataURL(input.files[0]);
        }

        function completeProtocol() {
            document.getElementById('ia-main-title').innerText = "Análisis Exitoso";
            document.getElementById('protocol-spinner').style.display = 'none';
            document.getElementById('progress-bar-container').style.display = 'none';
            document.getElementById('ia-status').innerText = "Firma digital verificada. Acceso concedido por Fran Cruz.";
            document.getElementById('auth-btn-container').style.display = 'block';
        }

        function enterVIP() {
            localStorage.setItem('fc_vip_session', 'true');
            location.reload();
        }

        async function showVIP() {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('vip-ui').style.display = 'block';
            const gallery = await getAllDB("gallery");
            document.getElementById('vip-gallery').innerHTML = gallery.length > 0 ? 
                gallery.map(i => `<div class="vip-card"><img src="${i.data}" class="w-full"><a href="${i.data}" download class="btn-download">Descargar Lámina</a></div>`).join('') :
                `<p class="opacity-20 py-20 italic">Actualizando bodega VIP...</p>`;
        }

        // NAVEGACIÓN BODEGA
        function goToMenu() {
            document.getElementById('vip-ui').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
        }

        function logoutVIP() { 
            if(confirm("¿Deseas finalizar la sesión VIP? Deberás validar un nuevo pago para entrar.")) {
                localStorage.removeItem('fc_vip_session'); 
                location.reload(); 
            }
        }

        // ADMIN CORE
        function handleAdminClicks() {
            adminClicks++;
            if(adminClicks >= 5) { if(prompt("Acceso:") === "1234") { document.getElementById('admin-modal').style.display = 'block'; openAdmin(); } adminClicks = 0; }
            setTimeout(() => adminClicks = 0, 3000);
        }

        async function openAdmin() {
            document.getElementById('adm-titular').value = config.titular;
            document.getElementById('adm-sinpe').value = config.sinpe;
            document.getElementById('adm-wa').value = config.whatsapp;
            document.getElementById('adm-iban').value = config.iban;
            document.getElementById('adm-paypal').value = config.paypal;
            document.getElementById('rate-CR').value = config.rates.CR;
            document.getElementById('rate-NI').value = config.rates.NI;
            document.getElementById('rate-GT').value = config.rates.GT;
            document.getElementById('rate-HN').value = config.rates.HN;
            refreshAdminLists();
        }

        async function refreshAdminLists() {
            const vault = await getAllDB("gallery");
            document.getElementById('admin-vault-preview').innerHTML = vault.map(i => `<div class="relative w-10 h-10 border border-white/10"><img src="${i.data}" class="w-full h-full object-cover"><button onclick="delItem('gallery',${i.id})" class="absolute top-0 right-0 bg-red-600 text-[6px] px-1">×</button></div>`).join('');
            const receipts = await getAllDB("receipts");
            document.getElementById('admin-receipt-preview').innerHTML = receipts.map(r => `<div class="relative w-10 h-10 border border-white/10"><img src="${r.data}" class="w-full h-full object-cover" onclick="alert('ID: ${r.userID}')"><button onclick="banUser('${r.userID}', ${r.id})" class="absolute bottom-0 w-full bg-red-600 text-[5px]">BAN</button></div>`).join('');
            document.getElementById('blacklist-body').innerHTML = config.blacklist.map(id => `<tr><td class="py-1 opacity-40">${id}</td><td class="text-right"><button onclick="unbanUser('${id}')" class="text-green-500">INDULTAR</button></td></tr>`).join('');
        }

        async function banUser(uid, rid) { if(confirm("¿Banear dispositivo?")) { config.blacklist.push(uid); await saveDB("config", "main", config); await delItem('receipts', rid); refreshAdminLists(); } }
        async function unbanUser(uid) { config.blacklist = config.blacklist.filter(id => id !== uid); await saveDB("config", "main", config); refreshAdminLists(); }
        async function saveAdminChanges() {
            config.titular = document.getElementById('adm-titular').value; config.sinpe = document.getElementById('adm-sinpe').value;
            config.whatsapp = document.getElementById('adm-wa').value; config.iban = document.getElementById('adm-iban').value;
            config.paypal = document.getElementById('adm-paypal').value; config.rates.CR = document.getElementById('rate-CR').value;
            config.rates.NI = document.getElementById('rate-NI').value; config.rates.GT = document.getElementById('rate-GT').value;
            config.rates.HN = document.getElementById('rate-HN').value;
            await saveDB("config", "main", config); location.reload();
        }

        function saveToVault(input) {
            Array.from(input.files).forEach(file => {
                const r = new FileReader();
                r.onload = async (e) => { await addDB("gallery", { data: e.target.result }); refreshAdminLists(); };
                r.readAsDataURL(file);
            });
        }

        function showBanned() {
            document.getElementById('app-content').style.display = 'none';
            document.getElementById('banned-screen').style.display = 'block';
            document.getElementById('my-id-display').innerText = myID;
            document.getElementById('support-link').href = `https://wa.me/${config.whatsapp}?text=ID:${myID}`;
        }

        function getDB(s,k){ return new Promise(r=>{ const t=db.transaction(s).objectStore(s).get(k); t.onsuccess=()=>r(t.result); }); }
        function saveDB(s,k,v){ return new Promise(r=>{ const t=db.transaction(s,"readwrite").objectStore(s).put(v,k); t.oncomplete=()=>r(); }); }
        function addDB(s,v){ return new Promise(r=>{ const t=db.transaction(s,"readwrite").objectStore(s).add(v); t.oncomplete=()=>r(); }); }
        function getAllDB(s){ return new Promise(r=>{ const t=db.transaction(s).objectStore(s).getAll(); t.onsuccess=()=>r(t.result); }); }
        async function delItem(s,id){ const t=db.transaction(s,"readwrite").objectStore(s).delete(id); t.oncomplete=()=>refreshAdminLists(); }
    </script>
</body>
</html>
