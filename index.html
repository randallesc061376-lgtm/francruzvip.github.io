<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRAN CRUZ VIP • PLATINUM BLINDADO</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <style>
        :root { --o: #d4af37; --n: #050505; --g: linear-gradient(180deg, #f9e498, #d4af37); --b: #000; }
        
        /* Bloqueo Global de Selección y Copiado */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Segoe UI', sans-serif;
            user-select: none; /* Bloquea selección de texto */
            -webkit-user-select: none;
            -ms-user-select: none;
        }

        body { background: var(--n); color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        header { padding: 30px 20px; text-align: center; width: 100%; cursor: pointer; position: relative; z-index: 100; }
        .logo { color: var(--o); font-size: 2.2rem; font-weight: 900; letter-spacing: 4px; text-shadow: 0 0 15px rgba(212,175,55,0.3); }
        .sub-logo { color: #666; font-size: 0.7rem; letter-spacing: 2px; margin-top: 5px; text-transform: uppercase; }

        .view { display: none; width: 100%; max-width: 420px; flex-direction: column; padding: 0 0 60px; animation: fadeIn 0.4s ease; }
        .view.active { display: flex; }

        /* GALERÍA VIP BLINDADA */
        #v-vip { align-items: center; width: 100vw; max-width: 100%; padding: 0; }
        #timer-bar { background: #000; padding: 15px; text-align: center; border-bottom: 1px solid #111; width: 100%; position: sticky; top: 0; z-index: 200; }
        
        .gallery-container { position: relative; width: 100vw; max-width: 100%; display: flex; flex-direction: column; gap: 0; }
        
        /* Capa Invisible Anti-Clic y Anti-Toque Prolongado */
        .glass-shield { 
            position: fixed; /* Ocupa toda la pantalla flotando */
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 150; /* Por encima de las imágenes, debajo del timer */
            background: rgba(0,0,0,0); /* Totalmente transparente */
            cursor: default;
        }
        
        #gallery-vip img { 
            width: 100%; 
            height: auto; 
            display: block; 
            z-index: 140; /* Por debajo de la capa glass */
            pointer-events: none; /* Desactiva interacción directa con la imagen */
            -webkit-touch-callout: none; /* Desactiva menú contextual en iOS */
        }

        /* --- Resto del Diseño (Planes, Acordeón, Admin) --- */
        .card { background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 12px; padding: 18px; margin: 0 20px 12px; }
        .plan-box { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .plan-box.sel { border: 1px solid var(--o); background: rgba(212,175,55,0.08); }
        .plan-box b { color: var(--o); font-size: 1.3rem; }

        .acc-item { border: 1px solid #1a1a1a; border-radius: 8px; margin: 0 20px 8px; overflow: hidden; }
        .acc-head { background: #111; padding: 15px; font-size: 0.8rem; font-weight: 800; color: #888; cursor: pointer; display: flex; justify-content: space-between; }
        .acc-body { display: none; background: #080808; padding: 15px; border-top: 1px solid #1a1a1a; }
        .acc-body.active { display: block; }

        .btn-gold { width: calc(100% - 40px); background: var(--g); color: #000; border: none; padding: 20px; border-radius: 14px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin: 15px 20px 0; }
        
        /* Admin UI */
        .adm-input { width: 100%; background: #000; border: 1px solid #333; padding: 12px; color: #fff; border-radius: 8px; margin-bottom: 10px; }
        .adm-label { font-size: 0.7rem; color: var(--o); font-weight: bold; margin: 15px 20px 8px; display: block; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin: 0 20px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body oncontextmenu="return false;"> <div class="glass-shield"></div>

<header onclick="accessAdmin()">
    <div class="logo">FRAN CRUZ VIP</div>
    <div id="tagline" class="sub-logo">SALA PRIVADA • COSTA RICA</div>
</header>

<div id="v-client" class="view active">
    <div class="card plan-box sel" onclick="selP(this, '30 DÍAS', 20)"><span>30 DÍAS GOLD</span><b class="p-val">₡10,800</b></div>

    <div class="pay-acc">
        <div class="adm-label" style="text-align:center">MÉTODOS DE PAGO DISPONIBLES</div>
        <div class="acc-item">
            <div class="acc-head" onclick="toggleAcc(this)">1. SINPE MÓVIL (CR) <span>▼</span></div>
            <div class="acc-body active">70835833<br><small>Randall Sánchez C.</small></div>
        </div>
        </div>
    <button class="btn-gold">SOLICITAR ACCESO VIP</button>
</div>

<div id="v-vip" class="view">
    <div id="timer-bar">
        <div style="font-size:0.7rem; color:var(--o);">SALA VIP ACTIVA</div>
        <div id="timer" style="font-size:1.3rem; font-weight:900;">00:00:00</div>
    </div>
    <div class="gallery-container">
        <div id="gallery-vip"></div>
    </div>
</div>

<div id="v-admin" class="view">
    <span class="adm-label">GALERÍA (ORDEN CRONOLÓGICO)</span>
    <input type="file" id="img-upload" class="adm-input" style="margin:0 20px" accept="image/*">
    <button class="btn-gold" style="padding:15px; font-size:0.8rem" onclick="uploadImg()">CARGAR NUEVA LÁMINA</button>
    <div id="admin-gallery" class="grid-4"></div>
</div>

<script>
    // Inicialización Firebase
    const firebaseConfig = { apiKey: "AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE", projectId: "fran-cruz-sala-vip", storageBucket: "fran-cruz-sala-vip.firebasestorage.app", databaseURL: "https://fran-cruz-sala-vip-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    // Bloqueo Adicional de Teclas de Descarga (Ctrl+S, Ctrl+U, F12)
    document.onkeydown = function(e) {
        if(e.ctrlKey && (e.keyCode === 67 || e.keyCode === 85 || e.keyCode === 83)) { return false; }
        if(e.keyCode === 123) { return false; } // Bloquea F12
    };

    function startVip() {
        document.getElementById('v-client').classList.remove('active');
        document.getElementById('v-vip').classList.add('active');
        
        // Cargar Galería en Orden Cronológico
        db.ref('gallery').orderByChild('timestamp').on('value', snap => {
            const gal = document.getElementById('gallery-vip'); gal.innerHTML = '';
            snap.forEach(img => {
                gal.innerHTML += `<img src="${img.val().url}" alt="VIP Image">`;
            });
        });
    }

    function uploadImg() {
        const file = document.getElementById('img-upload').files[0];
        if(!file) return;
        const time = Date.now(); // Marca temporal para el orden
        const ref = storage.ref('gallery/' + time + "_" + file.name);
        
        ref.put(file).then(snap => {
            snap.ref.getDownloadURL().then(url => {
                // Guardar URL y timestamp para ordenar
                db.ref('gallery').push({ url: url, timestamp: time });
                alert("LÁMINA PROTEGIDA Y CARGADA");
            });
        });
    }

    // Funciones Auxiliares (Acceso Admin, Acordeón, etc.) ...
</script>
</body>
</html>
