<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Fran Cruz VIP</title><script src="https://cdn.tailwindcss.com"></script><style>body{background:#000;color:#fff;font-family:sans-serif;user-select:none}.gold{color:#d4af37}.btn-gold{background:#d4af37;color:#000;padding:18px;width:100%;border-radius:20px;font-weight:800;text-transform:uppercase}input{outline:none}#admin-panel{display:none;position:fixed;inset:0;background:#000;z-index:999;padding:20px;overflow-y:auto}.plan-card{background:#0a0a0a;border:1px solid #1a1a1a;padding:15px;border-radius:20px;cursor:pointer}.plan-card.active{border-color:#d4af37;background:#120f05}</style></head><body>
<header class="text-center pt-8"><h1 onclick="handleAdmin()" class="text-4xl font-black gold tracking-tighter cursor-pointer">FRAN CRUZ</h1><p id="head-id" class="text-[9px] opacity-20 font-mono mt-1 uppercase"></p></header>
<div id="app" class="p-4 max-w-sm mx-auto"><div id="main-ui">
    <div class="flex justify-center flex-wrap gap-3 mb-6 opacity-60">
        <span onclick="setLoc('CR')" class="cursor-pointer text-xl">🇨🇷</span><span onclick="setLoc('PA')" class="cursor-pointer text-xl">🇵🇦</span><span onclick="setLoc('NI')" class="cursor-pointer text-xl">🇳🇮</span><span onclick="setLoc('GT')" class="cursor-pointer text-xl">🇬🇹</span><span onclick="setLoc('HN')" class="cursor-pointer text-xl">🇭🇳</span><span onclick="setLoc('SV')" class="cursor-pointer text-xl">🇸🇻</span><span onclick="setLoc('BZ')" class="cursor-pointer text-xl">🇧🇿</span>
    </div>
    <div class="space-y-3 mb-6">
        <div onclick="setPlan(1, 1)" id="p-1" class="plan-card active"><p class="text-[10px] opacity-50 uppercase">Acceso Hoy</p><p class="gold font-bold">$1.00 <span class="local-p"></span></p></div>
        <div onclick="setPlan(7, 5)" id="p-7" class="plan-card"><p class="text-[10px] opacity-50 uppercase">Acceso 7 Días</p><p class="gold font-bold">$5.00 <span class="local-p"></span></p></div>
        <div onclick="setPlan(15, 10)" id="p-15" class="plan-card"><p class="text-[10px] opacity-50 uppercase">Acceso 15 Días</p><p class="gold font-bold">$10.00 <span class="local-p"></span></p></div>
    </div>
    <div class="bg-[#0a0a0a] border border-white/5 p-6 rounded-[35px] text-center mb-6">
        <div class="flex text-[10px] font-bold uppercase mb-4 opacity-40 border-b border-white/5 pb-2"><span onclick="setMet('SINPE')" id="m-SINPE" class="flex-1 gold">SINPE</span><span onclick="setMet('IBAN')" id="m-IBAN" class="flex-1">IBAN</span><span onclick="setMet('PAYPAL')" id="m-PAYPAL" class="flex-1">PAYPAL</span></div>
        <p id="pay-info" class="text-xs font-mono mb-4 uppercase text-white/80">6453-5475</p>
        <button onclick="window.open('https://wa.me/50664535475?text=Envío comprobante ID: '+uid)" class="btn-gold mb-4">Enviar Comprobante</button>
        <input type="text" id="key-in" placeholder="CLAVE DE ACCESO" class="w-full bg-black p-4 rounded-2xl border border-white/10 text-center font-bold mb-3 uppercase gold">
        <button onclick="checkKey()" class="text-[10px] opacity-30 uppercase font-bold underline">Activar Membresía</button>
    </div>
</div>
<div id="vip-ui" class="hidden"><div class="bg-green-900/20 border border-green-500/30 p-4 rounded-2xl text-green-500 text-[10px] font-bold text-center mb-6 uppercase">Acceso VIP Activo</div><div id="gallery" class="space-y-4"></div><button onclick="logout()" class="w-full mt-8 text-[9px] opacity-20 uppercase font-bold">Cerrar Sesión</button></div></div>
<div id="admin-panel"><h2 class="gold font-bold mb-4 uppercase text-sm">Panel Maestro</h2><div class="grid grid-cols-2 gap-2 mb-4"><button onclick="document.getElementById('up-v').click()" class="bg-white/10 p-4 rounded-xl text-[10px] font-bold uppercase">Subir Fotos</button><button onclick="clearAll()" class="bg-red-900/20 text-red-500 p-4 rounded-xl text-[10px] font-bold uppercase">Borrar Todo</button></div><button onclick="changePin()" class="w-full mb-6 py-3 text-[10px] border border-white/10 rounded-xl opacity-40 uppercase">Cambiar PIN Admin</button><input type="file" id="up-v" multiple class="hidden" onchange="upV(this)"><div id="adm-gal" class="grid grid-cols-4 gap-2 mb-6"></div><button onclick="closeAdmin()" class="w-full py-4 text-xs opacity-50 border border-white/10 rounded-xl">SALIR</button></div>
<script>
let db; let curD=1; let adC=0; const rates={CR:525,PA:1,NI:36.5,GT:7.8,HN:24.7,SV:1,BZ:2}; const syms={CR:'₡',PA:'$',NI:'C$',GT:'Q',HN:'L',SV:'$',BZ:'BZ$'}; let curR=525; let curS='₡';
const uid=localStorage.getItem('fc_id')||"UID-"+Math.random().toString(36).substr(2,6).toUpperCase();
localStorage.setItem('fc_id',uid); document.getElementById('head-id').innerText=uid;
const req=indexedDB.open("FC_DB",2);
req.onupgradeneeded=(e)=>{db=e.target.result;if(!db.objectStoreNames.contains("gal"))db.createObjectStore("gal",{keyPath:"id",autoIncrement:true});};
req.onsuccess=(e)=>{db=e.target.result;checkExp();geo();};
function geo(){fetch('https://ipapi.co/json/').then(r=>r.json()).then(d=>{if(rates[d.country_code])setLoc(d.country_code);}).catch(()=>setLoc('CR'));}
function setLoc(c){curR=rates[c];curS=syms[c];updateUI();}
function setPlan(d, p){curD=d; document.querySelectorAll('.plan-card').forEach(c=>c.classList.remove('active'));document.getElementById('p-'+d).classList.add('active');}
function updateUI(){document.querySelectorAll('.local-p').forEach((el,i)=>{const p=[1,5,10][i];el.innerText=`(${curS}${Math.round(p*curR).toLocaleString()})`;});}
function setMet(m){
    const info = document.getElementById('pay-info');
    if(m==='SINPE'){info.innerText='6453-5475';}
    else if(m==='IBAN'){info.innerText='TU_CUENTA_IBAN_AQUÍ';}
    else{info.innerText='tu_correo@paypal.com';}
}
function checkKey(){
    const val=document.getElementById('key-in').value.toUpperCase();
    const correctKey = uid.slice(-2) + new Date().getDate().toString().padStart(2,'0');
    if(val === correctKey){
        let exp=new Date(); exp.setDate(exp.getDate()+(curD-1)); exp.setHours(23,59,59,999);
        localStorage.setItem('fc_exp',exp.getTime()); location.reload();
    }else alert("Clave incorrecta para hoy");
}
function checkExp(){const exp=localStorage.getItem('fc_exp');if(exp && new Date().getTime()<exp){document.getElementById('main-ui').classList.add('hidden');document.getElementById('vip-ui').classList.remove('hidden');loadGal();}}
function loadGal(){db.transaction("gal").objectStore("gal").getAll().onsuccess=(e)=>{document.getElementById('gallery').innerHTML=e.target.result.map(i=>`<img src="${i.d}" class="w-full rounded-3xl">`).join('');};}
function handleAdmin(){adC++;if(adC>=5){const p=prompt("PIN de Seguridad:");if(p===(localStorage.getItem('fc_pin')||'1234')){document.getElementById('admin-panel').style.display='block';loadAdmGal();}adC=0;}setTimeout(()=>adC=0,3000);}
function changePin(){const np=prompt("Nuevo PIN (4 dígitos):");if(np && np.length>=4){localStorage.setItem('fc_pin',np);alert("PIN actualizado");}}
function loadAdmGal(){db.transaction("gal").objectStore("gal").getAll().onsuccess=(e)=>{document.getElementById('adm-gal').innerHTML=e.target.result.map(i=>`<div class="h-12 relative"><img src="${i.d}" class="w-full h-full object-cover rounded"><button onclick="del(${i.id})" class="absolute top-0 right-0 bg-red-600 text-[8px] px-1">×</button></div>`).join('');};}
function upV(i){Array.from(i.files).forEach(f=>{const r=new FileReader();r.onload=(e)=>{db.transaction("gal","readwrite").objectStore("gal").add({d:e.target.result}).oncomplete=loadAdmGal;};r.readAsDataURL(f);});}
function del(id){db.transaction("gal","readwrite").objectStore("gal").delete(id).oncomplete=loadAdmGal;}
function clearAll(){if(confirm("¿Borrar todo?")){db.transaction("gal","readwrite").objectStore("gal").clear().oncomplete=loadAdmGal;}}
function closeAdmin(){document.getElementById('admin-panel').style.display='none';if(localStorage.getItem('fc_exp'))loadGal();}
function logout(){localStorage.removeItem('fc_exp');location.reload();}
updateUI();
</script></body></html>
