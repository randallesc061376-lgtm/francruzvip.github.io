<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRAN CRUZ VIP • PLATINUM FINAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <style>
        :root { --o: #d4af37; --n: #050505; --g: linear-gradient(180deg, #f9e498, #d4af37); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: var(--n); color: #fff; margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        header { padding: 30px 20px; text-align: center; cursor: pointer; border-bottom: 1px solid #111; }
        .logo { color: var(--o); font-size: 2rem; font-weight: 900; letter-spacing: 4px; }
        
        .view { display: none; width: 100%; max-width: 420px; margin: auto; flex-direction: column; padding-bottom: 50px; animation: fadeIn 0.3s; }
        .view.active { display: flex; }

        /* --- FRONT END ORIGINAL --- */
        .geo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px; padding: 10px; background: #0f0f0f; border-radius: 15px; }
        .flag { width: 100%; height: 25px; opacity: 0.4; border-radius: 4px; cursor: pointer; object-fit: cover; }
        .flag.active { opacity: 1; border: 1px solid var(--o); box-shadow: 0 0 10px var(--o); }
        .card { background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 12px; padding: 18px; margin: 0 20px 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .card.sel { border: 1px solid var(--o); background: rgba(212,175,55,0.08); }
        .card b { color: var(--o); font-size: 1.2rem; }
        .acc-item { border: 1px solid #1a1a1a; border-radius: 10px; margin: 0 20px 8px; overflow: hidden; }
        .acc-head { background: #111; padding: 15px; font-size: 0.8rem; font-weight: bold; color: #888; cursor: pointer; display: flex; justify-content: space-between; }
        .acc-body { display: none; background: #080808; padding: 15px; border-top: 1px solid #1a1a1a; text-align: center; }
        .acc-body.active { display: block; }
        .copy-box { background: #111; padding: 12px; border-radius: 8px; margin: 8px 0; font-family: monospace; color: var(--o); cursor: pointer; border: 1px dashed #333; }
        .btn-gold { width: calc(100% - 40px); background: var(--g); color: #000; border: none; padding: 20px; border-radius: 14px; font-weight: 900; margin: 15px 20px; cursor: pointer; text-transform: uppercase; }

        /* --- TORRE DE CONTROL (ADMIN) --- */
        .adm-card { background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 15px; padding: 15px; margin: 10px 20px; }
        .adm-label { color: var(--o); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; display: block; letter-spacing: 1px; }
        .adm-input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 0.9rem; }
        
        .user-row { background: #000; border: 1px solid #222; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .badge { font-size: 0.6rem; padding: 3px 7px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .badge.wait { background: var(--o); color: #000; }
        .badge.active { background: #2ecc71; color: #fff; }
        .badge.ban { background: #e74c3c; color: #fff; }

        .grid-gal-adm { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .img-adm { position: relative; aspect-ratio: 1; border-radius: 5px; overflow: hidden; border: 1px solid #222; }
        .img-adm img { width: 100%; height: 100%; object-fit: cover; }
        .btn-del { position: absolute; top: 0; right: 0; background: rgba(231,76,60,0.8); color: #fff; border: none; padding: 2px 6px; font-size: 10px; cursor: pointer; }

        /* Mensajes de Estado */
        .status-screen { text-align: center; padding: 40px 20px; }
        .loader-ring { width: 50px; height: 50px; border: 3px solid #111; border-top: 3px solid var(--o); border-radius: 50%; margin: 20px auto; animation: spin 1s linear infinite; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body oncontextmenu="return false;">

<header onclick="adminAccess()">
    <div class="logo">FRAN CRUZ VIP</div>
    <div id="tagline" style="font-size: 0.7rem; color: #555; letter-spacing: 2px;">SALA PRIVADA • COSTA RICA</div>
</header>

<div id="v-client" class="view active">
    <div class="geo-grid">
        <img src="https://flagcdn.com/cr.svg" class="flag active" onclick="setLoc('COSTA RICA', '₡', 540)">
        <img src="https://flagcdn.com/ni.svg" class="flag" onclick="setLoc('NICARAGUA', 'C$', 37)">
        <img src="https://flagcdn.com/pa.svg" class="flag" onclick="setLoc('PANAMÁ', '$', 1)">
        <img src="https://flagcdn.com/hn.svg" class="flag" onclick="setLoc('HONDURAS', 'L', 24.6)">
        <img src="https://flagcdn.com/sv.svg" class="flag" onclick="setLoc('EL SALVADOR', '$', 1)">
        <img src="https://flagcdn.com/gt.svg" class="flag" onclick="setLoc('GUATEMALA', 'Q', 7.7)">
        <img src="https://flagcdn.com/bz.svg" class="flag" onclick="setLoc('BELICE', 'BZ$', 2)">
        <img src="https://flagcdn.com/un.svg" class="flag" onclick="setLoc('WORLDWIDE', '$', 1)">
    </div>
    <div class="card" onclick="selP(this, 'HOY')"><span>ACCESO HOY</span><b class="p-val">₡540</b></div>
    <div class="card" onclick="selP(this, '7 DÍAS')"><span>7 DÍAS SILVER</span><b class="p-val">₡2,700</b></div>
    <div class="card sel" onclick="selP(this, '30 DÍAS')"><span>30 DÍAS GOLD</span><b class="p-val">₡10,800</b></div>
    
    <div class="acc-item">
        <div class="acc-head" onclick="toggleAcc(this)">MÉTODOS DE PAGO <span>▼</span></div>
        <div class="acc-body active">
            <div class="copy-box" onclick="copy('70835833')">70835833</div>
            <div class="copy-box" onclick="copy('randallesc061376@gmail.com')">PayPal Email</div>
        </div>
    </div>
    <button class="btn-gold" onclick="requestAccess()">ENVIAR COMPROBANTE</button>
</div>

<div id="v-status" class="view">
    <div class="status-screen" id="status-content"></div>
</div>

<div id="v-gallery" class="view">
    <div id="vip-grid" style="display:grid; grid-template-columns: repeat(2, 1fr); gap:10px; padding:15px;"></div>
    <button class="btn-gold" style="background:#111; color:#fff" onclick="location.reload()">SALIR</button>
</div>

<div id="v-admin" class="view">
    <div class="adm-card">
        <span class="adm-label">Lista de Espera y Baneos</span>
        <div id="admin-user-list"></div>
    </div>

    <div class="adm-card">
        <span class="adm-label">Cargar Nueva Lámina</span>
        <input type="file" id="f-upload" class="adm-input">
        <button class="btn-gold" style="margin:0; width:100%; padding:12px" onclick="uploadImg()">PUBLICAR EN GALERÍA</button>
        <div id="admin-gallery-view" class="grid-gal-adm"></div>
    </div>

    <div class="adm-card">
        <span class="adm-label">Tipos de Cambio ($1 USD)</span>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
            <input type="number" id="rate-cr" class="adm-input" placeholder="₡ CR">
            <input type="number" id="rate-ni" class="adm-input" placeholder="C$ NI">
        </div>
        <button class="btn-gold" style="margin:0; width:100%; padding:10px" onclick="saveRates()">ACTUALIZAR TASAS</button>
    </div>

    <button class="btn-gold" style="background:#222; color:#fff" onclick="location.reload()">CERRAR TORRE DE CONTROL</button>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE", 
        projectId: "fran-cruz-sala-vip",
        databaseURL: "https://fran-cruz-sala-vip-default-rtdb.firebaseio.com",
        storageBucket: "fran-cruz-sala-vip.firebasestorage.app" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const st = firebase.storage();

    let myID = localStorage.getItem('fc_id') || 'VIP' + Math.floor(Math.random()*9000+1000);
    localStorage.setItem('fc_id', myID);
    let curTasa = 540, curSim = "₡", curP = "30 DÍAS", clicks = 0;

    // --- MONITOR DE USUARIO ---
    db.ref('users/' + myID).on('value', ss => {
        const user = ss.val();
        if(!user) return;
        showView('v-status');
        const cont = document.getElementById('status-content');
        if(user.status === 'wait') {
            cont.innerHTML = `<div class="loader-ring"></div><div class="adm-card"><h2>VERIFICANDO PAGO</h2><p>Estamos procesando tu comprobante. <b>Recibirás acceso en segundos.</b></p></div>`;
        } else if(user.status === 'active') {
            cont.innerHTML = `<div class="adm-card" style="border-color:#2ecc71"><h2>¡ACCESO ACTIVADO!</h2><p>Bienvenido a la sala privada.</p><button class="btn-gold" onclick="enterGallery()">ENTRAR AHORA</button></div>`;
        } else if(user.status === 'ban') {
            cont.innerHTML = `<div class="adm-card" style="border-color:#e74c3c"><h2>ACCESO DENEGADO</h2><p>Tu ID ha sido bloqueado por seguridad.</p><button class="btn-gold" style="background:#e74c3c" onclick="window.location.href='https://wa.me/50664535475?text=Reactivar ID: ${myID}'">CONTACTAR SOPORTE</button></div>`;
        }
    });

    // --- FUNCIONES ADMIN ---
    function adminAccess() {
        clicks++;
        if(clicks >= 5) {
            if(prompt("PASS:") === "1376") { 
                showView('v-admin'); 
                loadAdminUsers();
                loadAdminGallery();
            }
            clicks = 0;
        }
        setTimeout(() => clicks = 0, 2000);
    }

    function loadAdminUsers() {
        db.ref('users').on('value', ss => {
            const list = document.getElementById('admin-user-list');
            list.innerHTML = "";
            ss.forEach(u => {
                const user = u.val();
                list.innerHTML += `<div class="user-row">
                    <div><b>${user.id}</b> <span class="badge ${user.status}">${user.status}</span></div>
                    <div>
                        <button onclick="db.ref('users/${user.id}').update({status:'active'})" style="color:#2ecc71; background:none; border:none; font-weight:900">✓</button>
                        <button onclick="db.ref('users/${user.id}').update({status:'ban'})" style="color:#e74c3c; background:none; border:none; font-weight:900; margin-left:10px">X</button>
                    </div>
                </div>`;
            });
        });
    }

    function uploadImg() {
        const file = document.getElementById('f-upload').files[0];
        if(!file) return;
        const ref = st.ref('laminas/' + Date.now());
        ref.put(file).then(s => s.ref.getDownloadURL().then(url => {
            db.ref('gallery').push({url, time: Date.now()});
            alert("LÁMINA PUBLICADA");
        }));
    }

    function loadAdminGallery() {
        db.ref('gallery').on('value', ss => {
            const view = document.getElementById('admin-gallery-view');
            view.innerHTML = "";
            ss.forEach(img => {
                view.innerHTML += `<div class="img-adm"><img src="${img.val().url}"><button class="btn-del" onclick="db.ref('gallery/${img.key}').remove()">X</button></div>`;
            });
        });
    }

    function saveRates() {
        const cr = document.getElementById('rate-cr').value;
        const ni = document.getElementById('rate-ni').value;
        db.ref('rates').set({cr, ni});
        alert("TASAS ACTUALIZADAS");
    }

    // --- FUNCIONES CLIENTE ---
    function requestAccess() {
        db.ref('users/' + myID).set({ id: myID, status: 'wait', plan: curP, time: Date.now() }).then(() => {
            window.location.href = `https://wa.me/50664535475?text=Hola, envío comprobante para ${curP}. ID: ${myID}`;
        });
    }

    function enterGallery() {
        showView('v-gallery');
        db.ref('gallery').on('value', ss => {
            const grid = document.getElementById('vip-grid');
            grid.innerHTML = "";
            ss.forEach(img => { grid.innerHTML += `<div style="border-radius:8px; overflow:hidden; aspect-ratio:9/16; background:#111"><img src="${img.val().url}" style="width:100%; height:100%; object-fit:cover"></div>`; });
        });
    }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function setLoc(n, s, t) {
        curTasa = t; curSim = s;
        document.getElementById('tagline').innerText = `SALA PRIVADA • ${n}`;
        document.querySelectorAll('.flag').forEach(f => f.classList.remove('active'));
        event.target.classList.add('active');
        updatePrices();
    }

    function updatePrices() {
        const base = {'HOY':1, '7 DÍAS':5, '30 DÍAS':20};
        document.querySelectorAll('.card').forEach(c => {
            const plan = c.querySelector('span').innerText.split(' ')[0] === 'HOY' ? 'HOY' : c.querySelector('span').innerText.split(' ')[0] + ' DÍAS';
            if(base[plan]) c.querySelector('b').innerText = curSim + Math.round(base[plan] * curTasa).toLocaleString();
        });
    }

    function selP(el, p) {
        curP = p;
        document.querySelectorAll('.card').forEach(c => c.classList.remove('sel'));
        el.classList.add('sel');
    }

    function copy(t) { navigator.clipboard.writeText(t); alert("Copiado"); }
    function toggleAcc(el) { el.nextElementSibling.classList.toggle('active'); }
</script>
</body>
</html>
