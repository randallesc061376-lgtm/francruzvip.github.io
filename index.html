<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRAN CRUZ VIP</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <style>
        :root { --o: #d4af37; --n: #050505; --g: linear-gradient(180deg, #f9e498, #d4af37); --r: #8b0000; --v: #006400; }
        body { background: var(--n); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; user-select: none; }
        header { padding: 40px 20px 10px; text-align: center; width: 100%; box-sizing: border-box; cursor: pointer; }
        .logo { color: var(--o); font-size: 2.2rem; font-weight: 900; letter-spacing: 6px; text-transform: uppercase; }
        
        /* Geolocalización y Flags */
        .geo-bar { display: flex; justify-content: center; gap: 10px; margin: 20px 0; background: #0a0a0a; padding: 12px; border-radius: 50px; border: 1px solid #111; }
        .flag { width: 28px; height: 19px; opacity: 0.3; transition: 0.3s; cursor: pointer; }
        .flag.active { opacity: 1; transform: scale(1.1); border: 1px solid var(--o); }

        /* Membresías */
        .planes { width: 100%; max-width: 400px; padding: 0 20px; box-sizing: border-box; }
        .plan-card { background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 12px; padding: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .plan-card.sel { border-color: var(--o); background: rgba(212,175,55,0.05); }
        .plan-card b { color: var(--o); font-size: 1.1rem; }

        /* Botones */
        .btn-gold { width: 100%; background: var(--g); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: 900; text-transform: uppercase; margin-top: 15px; cursor: pointer; }
        .btn-outline { width: 100%; background: transparent; color: var(--o); border: 1px solid var(--o); padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 10px; cursor: pointer; }

        /* Admin UI */
        .admin-panel { display: none; width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; }
        .admin-panel.active { display: block; }
        .sec-box { background: #0a0a0a; border: 1px solid #222; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .thumb { position: relative; aspect-ratio: 1; border-radius: 5px; overflow: hidden; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .del-x { position: absolute; top: 0; right: 0; background: var(--r); color: #fff; border: none; font-size: 10px; padding: 4px; cursor: pointer; }
    </style>
</head>
<body>

<header id="adminTrigger">
    <div class="logo">FRAN CRUZ VIP</div>
    <div id="region-tag" style="color:#555; font-size:0.7rem; letter-spacing:2px; margin-top:5px;">SALA PRIVADA • COSTA RICA</div>
</header>

<div class="geo-bar">
    <img src="https://flagcdn.com/cr.svg" class="flag active" onclick="setLoc('COSTA RICA', '₡', 'cr', this)">
    <img src="https://flagcdn.com/ni.svg" class="flag" onclick="setLoc('NICARAGUA', 'C$', 'ni', this)">
    <img src="https://flagcdn.com/pa.svg" class="flag" onclick="setLoc('PANAMÁ', '$', 'pa', this)">
    <img src="https://flagcdn.com/hn.svg" class="flag" onclick="setLoc('HONDURAS', 'L', 'hn', this)">
    <img src="https://flagcdn.com/sv.svg" class="flag" onclick="setLoc('EL SALVADOR', '$', 'sv', this)">
    <img src="https://flagcdn.com/gt.svg" class="flag" onclick="setLoc('GUATEMALA', 'Q', 'gt', this)">
</div>

<div id="client-view" class="planes">
    <div id="list-planes"></div>
    <button class="btn-gold" onclick="sendWA()">ENVIAR COMPROBANTE DE PAGO</button>
    <button class="btn-outline" onclick="checkKey()">YA TENGO MI CLAVE</button>
</div>

<div id="admin-view" class="admin-panel">
    <div class="sec-box">
        <h4 style="color:var(--o); margin:0 0 10px;">GESTIÓN DE LÁMINAS</h4>
        <input type="file" id="file" accept="image/*" onchange="uploadImg(this)" style="color:#555; font-size:0.8rem;">
        <div id="admin-gallery" class="grid-3"></div>
    </div>

    <div class="sec-box">
        <h4 style="color:var(--o); margin:0 0 10px;">BANEO / LISTA DE ESPERA</h4>
        <div id="waiting-list" style="font-size:0.85rem;"></div>
    </div>

    <button class="btn-outline" onclick="location.reload()">CERRAR PANEL</button>
</div>

<script>
    // Configuración desde tus capturas
    const firebaseConfig = {
      apiKey: "AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE",
      authDomain: "fran-cruz-sala-vip.firebaseapp.com",
      projectId: "fran-cruz-sala-vip",
      storageBucket: "fran-cruz-sala-vip.appspot.com",
      databaseURL: "https://fran-cruz-sala-vip-default-rtdb.firebaseio.com",
      appId: "1:1022733043010:web:379db18e37bbfde2cf34db"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const st = firebase.storage();

    let curSym = "₡", curRate = 540, selPlan = "ACCESO HOY", selUSD = 1.5;
    let liveRates = { cr: 540, ni: 37.1, pa: 1, hn: 26.6, sv: 1, gt: 7.7 };

    // 1. Sincronización en tiempo real con el Admin
    db.ref('config').on('value', snap => {
        const d = snap.val();
        if(d && d.rates) liveRates = d.rates;
        renderPlanes();
    });

    function setLoc(name, sym, key, el) {
        curSym = sym; curRate = liveRates[key] || 1;
        document.getElementById('region-tag').innerText = `SALA PRIVADA • ${name}`;
        document.querySelectorAll('.flag').forEach(f => f.classList.remove('active'));
        el.classList.add('active');
        renderPlanes();
    }

    function renderPlanes() {
        const cont = document.getElementById('list-planes');
        cont.innerHTML = '';
        const items = [
            {n:"ACCESO HOY", u:1.5},
            {n:"7 DÍAS SILVER", u:5},
            {n:"30 DÍAS GOLD", u:15}
        ];
        items.forEach(p => {
            const price = Math.round(p.u * curRate).toLocaleString();
            cont.innerHTML += `
                <div class="plan-card ${p.n===selPlan?'sel':''}" onclick="selPlan='${p.n}';selUSD=${p.u};renderPlanes()">
                    <span>${p.n}</span>
                    <b>${curSym}${price}</b>
                </div>`;
        });
    }

    // 2. Gestión de Láminas (Subir, Ver, Borrar)
    function uploadImg(input) {
        const file = input.files[0]; if(!file) return;
        const name = Date.now();
        st.ref('laminas/'+name).put(file).then(s => s.ref.getDownloadURL().then(url => {
            db.ref('gallery').push({url, timestamp: Date.now(), dateStr: new Date().toLocaleDateString()});
        }));
    }

    db.ref('gallery').on('value', snap => {
        const grid = document.getElementById('admin-gallery');
        grid.innerHTML = '';
        snap.forEach(child => {
            const item = child.val();
            // Lógica de borrado automático (Si no es de hoy, se puede ocultar o borrar)
            if(item.dateStr !== new Date().toLocaleDateString()) {
                db.ref('gallery/'+child.key).remove();
                return;
            }
            grid.innerHTML += `
                <div class="thumb">
                    <img src="${item.url}">
                    <button class="del-x" onclick="db.ref('gallery/${child.key}').remove()">✕</button>
                </div>`;
        });
    });

    // 3. Protocolo de Baneo y Espera
    db.ref('users').on('value', snap => {
        const list = document.getElementById('waiting-list');
        list.innerHTML = '';
        snap.forEach(child => {
            const u = child.val();
            const color = u.status === 'banned' ? 'var(--r)' : 'var(--v)';
            list.innerHTML += `
                <div style="display:flex; justify-content:space-between; margin-bottom:8px; padding:10px; background:#111; border-radius:8px;">
                    <span style="color:${color}">${child.key} (${u.status})</span>
                    <div>
                        <button onclick="updateUser('${child.key}', 'active')" style="color:var(--v); background:none; border:none; font-weight:bold;">ALTA</button>
                        <button onclick="updateUser('${child.key}', 'banned')" style="color:var(--r); background:none; border:none; font-weight:bold; margin-left:10px;">BAN</button>
                    </div>
                </div>`;
        });
    });

    function updateUser(id, stat) { db.ref('users/'+id).update({status: stat}); }

    function sendWA() {
        const total = Math.round(selUSD * curRate).toLocaleString();
        const msg = `He seleccionado: *${selPlan}* por *${curSym}${total}*. Adjunto comprobante.`;
        window.location.href = `https://wa.me/50664535475?text=${encodeURIComponent(msg)}`;
    }

    // Acceso oculto al Admin (5 toques al logo)
    let clicks = 0;
    document.getElementById('adminTrigger').onclick = () => {
        clicks++;
        if(clicks >= 5) {
            if(prompt("CLAVE ADMIN:") === "2026") {
                document.getElementById('client-view').style.display = 'none';
                document.getElementById('admin-view').classList.add('active');
            }
            clicks = 0;
        }
        setTimeout(() => clicks = 0, 3000);
    };

    function checkKey() { alert("Redirigiendo a validación de clave..."); }
</script>
</body>
    </html>
