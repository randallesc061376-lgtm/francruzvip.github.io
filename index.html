<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Fran Cruz VIP</title>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
<style>
:root{--oro:#d4af37;--negro:#050505;--cristal:rgba(255,255,255,0.04);--rojo:#ff4444}
body{background:var(--negro);color:#fff;font-family:sans-serif;margin:0;padding:0;text-align:center;user-select:none;overflow-x:hidden}
header{padding:35px 10px;background:#111;border-bottom:1px solid #222;cursor:pointer}
.logo{color:var(--oro);font-size:2rem;font-weight:900;letter-spacing:5px}
.sub-logo{color:#666;font-size:.6rem;letter-spacing:4px;margin-top:5px}
.pantalla{display:none;min-height:100vh;flex-direction:column;align-items:center;padding:15px;box-sizing:border-box}
.activa{display:flex}
.banderas{display:flex;justify-content:center;gap:10px;margin:20px 0}
.banderas span{font-size:1.5rem;cursor:pointer;padding:5px}
.card-precio{background:var(--cristal);border:1px solid rgba(255,255,255,.1);border-radius:15px;margin:10px;padding:20px;width:90%;max-width:380px;text-align:left}
.card-oro{border:1px solid var(--oro);box-shadow:inset 0 0 10px rgba(212,175,55,.1)}
.area-pago{background:#0a0a0a;border-radius:25px;padding:20px;width:90%;max-width:380px;border:1px solid #222;margin-top:20px}
.tabs-pago{display:flex;justify-content:space-around;margin-bottom:20px;color:#555;font-weight:700;font-size:.8rem}
.tab-activa{color:var(--oro);border-bottom:2px solid var(--oro)}
.btn-accion{background:linear-gradient(135deg,var(--oro),#f9e498);color:#000;border:none;padding:18px;border-radius:12px;width:100%;font-weight:900;margin-top:10px;text-transform:uppercase}
.btn-negro{background:transparent;color:var(--oro);border:1px solid var(--oro);margin-top:15px}
.galeria-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;width:100%;padding:10px;box-sizing:border-box}
.contenedor-foto{position:relative;border-radius:10px;overflow:hidden;background:#111;aspect-ratio:1/1}
.foto-vip{width:100%;height:100%;object-fit:cover}
.admin-input{width:100%;padding:15px;margin:10px 0;background:#1a1a1a;border:1px solid var(--oro);color:#fff;border-radius:10px;box-sizing:border-box}
#previa-carga{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;width:100%;margin:15px 0}
#progress-bar{width:0;height:4px;background:var(--oro);transition:.3s}
</style>
</head>
<body>
<header onclick="trucoAdmin()">
    <div class="logo">FRAN CRUZ</div>
    <div class="sub-logo">EXCLUSIVITY & PRIVACY</div>
</header>
<div id="pantalla-inicio" class="pantalla activa">
    <div class="banderas">
        <span onclick="cambiarDivisa('CR')">🇨🇷</span><span onclick="cambiarDivisa('PA')">🇵🇦</span>
        <span onclick="cambiarDivisa('NI')">🇳🇮</span><span onclick="cambiarDivisa('GT')">🇬🇹</span>
        <span onclick="cambiarDivisa('HN')">🇭🇳</span><span onclick="cambiarDivisa('SV')">🇸🇻</span>
    </div>
    <div class="card-precio card-oro" onclick="selectPlan('HOY')"><span>ACCESO HOY</span><br><b id="txt-p1">$1.00 (₡525)</b></div>
    <div class="card-precio" onclick="selectPlan('7 DÍAS')"><span>ACCESO 7 DÍAS</span><br><b id="txt-p7">$5.00 (₡2,625)</b></div>
    <div class="card-precio" onclick="selectPlan('30 DÍAS')"><span>ACCESO 30 DÍAS</span><br><b id="txt-p30">$15.00 (₡7,875)</b></div>
    <div class="area-pago">
        <div class="tabs-pago">
            <span id="t-sinpe" class="tab-activa" onclick="setTab('SINPE')">SINPE</span>
            <span id="t-iban" onclick="setTab('IBAN')">IBAN</span>
            <span id="t-paypal" onclick="setTab('PAYPAL')">PAYPAL</span>
        </div>
        <div id="detalle-pago" style="font-weight:700;margin-bottom:15px">70835833</div>
        <button class="btn-accion" onclick="sendWA()">ADQUIRIR ACCESO</button>
        <button class="btn-accion btn-negro" onclick="irAPaso('pantalla-pago')">YA TENGO CLAVE</button>
    </div>
</div><div id="pantalla-seguridad" class="pantalla">
    <h2 style="color:var(--oro);margin-top:20vh">VERIFICACIÓN</h2>
    <div id="timer" style="font-size:5rem;color:var(--oro);font-weight:700">15</div>
    <div id="status-ia" style="color:#666;font-size:.8rem;letter-spacing:2px">VALIDANDO...</div>
</div>
<div id="pantalla-pago" class="pantalla">
    <h3 style="margin-top:10vh">ACCESO VIP</h3>
    <div class="area-pago" style="border-color:var(--oro)">
        <input type="text" id="clave-cliente" class="admin-input" style="text-align:center;font-size:1.8rem;color:var(--oro)" placeholder="0000" maxlength="4">
        <button class="btn-accion" onclick="validarAcceso()">ENTRAR</button>
    </div>
    <button class="btn-accion btn-negro" onclick="irAPaso('pantalla-inicio')">VOLVER</button>
</div>
<div id="pantalla-sala" class="pantalla">
    <h2 style="color:var(--oro);margin-bottom:20px">SALA VIP</h2>
    <div id="lista-fotos" class="galeria-grid"></div>
    <button class="btn-accion btn-negro" onclick="location.reload()" style="margin:30px 0;width:80%">SALIR</button>
</div>
<div id="pantalla-admin" class="pantalla">
    <h2 style="color:var(--oro)">MASTER PANEL</h2>
    <input type="password" id="pass-admin" class="admin-input" placeholder="PASSKEY">
    <button class="btn-accion" onclick="loginAdmin()">ACCESO</button>
    <div id="controles-admin" style="display:none;width:100%">
        <h4 style="color:var(--oro)">CARGAR EN ORDEN</h4>
        <label style="display:block;background:#222;padding:15px;border:1px dashed var(--oro);border-radius:10px;color:var(--oro);cursor:pointer" for="foto-file">📸 TOCAR GALERÍA</label>
        <input type="file" id="foto-file" accept="image/*" multiple style="display:none" onchange="previsualizarFotos()">
        <div id="previa-carga"></div>
        <div style="width:100%;background:#111;margin-bottom:10px"><div id="progress-bar"></div></div>
        <button class="btn-accion" id="btn-subir" onclick="subirLoteFotos()">PUBLICAR TODO</button>
        <hr style="border:0.5px solid #333;margin:25px 0">
        <div id="lista-admin" class="galeria-grid"></div>
    </div>
    <button class="btn-accion btn-negro" onclick="irAPaso('pantalla-inicio')">CERRAR</button>
</div>
<script>
const firebaseConfig={apiKey:"AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE",authDomain:"fran-cruz-sala-vip.firebaseapp.com",projectId:"fran-cruz-sala-vip",storageBucket:"fran-cruz-sala-vip.appspot.com",messagingSenderId:"1022733043010",appId:"1:1022733043010:web:379db18e37bbfde2cf34db"};
firebase.initializeApp(firebaseConfig);const db=firebase.firestore(),storage=firebase.storage();
let planActivo="HOY",uidCliente="UID-"+Math.random().toString(36).substr(2,6).toUpperCase(),archivosSeleccionados=[];
const rates={'CR':{n:'₡',v:525},'PA':{n:'$',v:1},'GT':{n:'Q',v:7.62},'HN':{n:'L',v:26.5},'NI':{n:'C$',v:36.7},'SV':{n:'$',v:1}};
function cambiarDivisa(c){const r=rates[c];if(r){document.getElementById('txt-p1').innerText=`$1.00 (${r.n}${(1*r.v).toFixed(0)})`;document.getElementById('txt-p7').innerText=`$5.00 (${r.n}${(5*r.v).toFixed(0)})`;document.getElementById('txt-p30').innerText=`$15.00 (${r.n}${(15*r.v).toFixed(0)})`}}
async function geolocalizar(){try{const res=await fetch('https://ipapi.co/json/'),data=await res.json();cambiarDivisa(data.country_code)}catch(e){cambiarDivisa('CR')}}geolocalizar();
function irAPaso(p){document.querySelectorAll('.pantalla').forEach(d=>d.style.display='none');document.getElementById(p).style.display='flex'}
function selectPlan(n){planActivo=n;document.querySelectorAll('.card-precio').forEach(c=>c.classList.remove('card-oro'));event.currentTarget.classList.add('card-oro')}
function setTab(t){const d=document.getElementById('detalle-pago');document.querySelectorAll('.tabs-pago span').forEach(s=>s.classList.remove('tab-activa'));event.target.classList.add('tab-activa');if(t==='SINPE')d.innerText="70835833";else if(t==='IBAN')d.innerText="CR80080315001000035641";else d.innerText="randallesc061376@gmail.com"}
function sendWA(){const h=new Date().getDate().toString().padStart(2,'0'),a=Math.floor(10+Math.random()*89),c=a+h,t=`*ACCESO VIP*\nID: ${uidCliente}\nClave: ${c}`;window.open(`https://wa.me/50664535475?text=${encodeURIComponent(t)}`)}
async function validarAcceso(){const v=document.getElementById('clave-cliente').value,d=new Date().getDate().toString().padStart(2,'0');if(v.endsWith(d)&&v.length===4)iniciarSeguridad();else alert("ERROR")}
function iniciarSeguridad(){irAPaso('pantalla-seguridad');let s=15;const t=document.getElementById('timer'),i=setInterval(()=>{s--;t.innerText=s;if(s<=0){clearInterval(i);irAPaso('pantalla-sala');cargarFotos(false)}},1000)}
function previsualizarFotos(){const i=document.getElementById('foto-file');archivosSeleccionados=[...archivosSeleccionados,...Array.from(i.files)].slice(0,15);renderPrevia()}
function renderPrevia(){const c=document.getElementById('previa-carga');c.innerHTML='';archivosSeleccionados.forEach((f,i)=>{const r=new FileReader();r.onload=(e)=>{const d=document.createElement('div');d.style="position:relative;aspect-ratio:1/1;border:1px solid var(--oro);border-radius:5px;overflow:hidden";d.innerHTML=`<div style="position:absolute;top:2px;left:2px;background:var(--oro);color:#000;font-size:10px;padding:2px 4px">${i+1}</div><img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover"><button onclick="quitarFoto(${i})" style="position:absolute;top:2px;right:2px;background:red;border:none;color:#fff;width:18px;height:18px">X</button>`;c.appendChild(d)};r.readAsDataURL(f)})}
function quitarFoto(i){archivosSeleccionados.splice(i,1);renderPrevia()}
async function subirLoteFotos(){if(!archivosSeleccionados.length)return;const btn=document.getElementById('btn-subir'),bar=document.getElementById('progress-bar'),base=Date.now();btn.disabled=true;for(let i=0;i<archivosSeleccionados.length;i++){const f=archivosSeleccionados[i],ref=storage.ref('galeria/'+base+'_'+i),task=ref.put(f);await new Promise((res)=>{task.on('state_changed',s=>{bar.style.width=(s.bytesTransferred/s.totalBytes)*100+"%"},null,async()=>{const u=await task.snapshot.ref.getDownloadURL();await db.collection("galeria").add({url:u,orden:base-i,fecha:firebase.firestore.FieldValue.serverTimestamp()});res()})})}location.reload()}
function cargarFotos(a){const c=a?document.getElementById('lista-admin'):document.getElementById('lista-fotos');db.collection("galeria").orderBy("orden","desc").onSnapshot(s=>{c.innerHTML='';s.forEach(doc=>{const x=doc.data(),v=document.createElement('div');v.className='contenedor-foto';v.innerHTML=`<img src="${x.url}" class="foto-vip">${a?`<button style="position:absolute;top:5px;right:5px;background:red;border:none;color:#fff;padding:5px" onclick="borrarFoto('${doc.id}')">X</button>`:''}`;c.appendChild(v)})})}
let cl=0;function trucoAdmin(){cl++;if(cl>=5){irAPaso('pantalla-admin');cl=0}setTimeout(()=>cl=0,3000)}
function loginAdmin(){if(document.getElementById('pass-admin').value==="ADMIN123"){document.getElementById('controles-admin').style.display='block';cargarFotos(true)}else alert("ERROR")}
async function borrarFoto(id){if(confirm("¿Eliminar?"))await db.collection("galeria").doc(id).delete()}
</script>
</body>
</html>
