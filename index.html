<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRAN CRUZ VIP</title>
    <style>
        :root { --o: #d4af37; --n: #050505; --g: linear-gradient(180deg, #f9e498, #d4af37); --r: #c0392b; --v: #27ae60; }
        body { background: var(--n); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; user-select: none; }
        
        header { padding: 45px 20px 10px; text-align: center; width: 100%; box-sizing: border-box; cursor: pointer; }
        .logo { color: var(--o); font-size: 2.2rem; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 10px; }
        
        .geo-bar { display: flex; justify-content: center; gap: 12px; margin: 15px 0; background: #0a0a0a; padding: 12px 20px; border-radius: 50px; border: 1px solid #111; }
        .flag { width: 25px; height: 17px; border-radius: 2px; cursor: pointer; opacity: 0.3; transition: 0.3s; }
        .flag.active { opacity: 1; border: 1px solid var(--o); transform: scale(1.2); }
        .tag { color: #444; font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; font-weight: 900; }

        .v { display: none; width: 100%; max-width: 380px; flex-direction: column; padding: 0 25px 50px; box-sizing: border-box; align-items: center; }
        .active { display: flex; }

        /* PLANES */
        .plan { width: 100%; background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 12px; padding: 18px 22px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; cursor: pointer; }
        .plan.sel { border-color: var(--o); background: rgba(212,175,55,0.03); }
        .plan b { color: var(--o); font-size: 1.1rem; }
        .usd-val { font-size: 0.6rem; color: #444; display: block; text-align: right; font-weight: 900; }

        /* ACORDEONES */
        .acord { width: 100%; background: #080808; border: 1px solid #151515; border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
        .acord-h { padding: 16px; text-align: center; font-size: 0.75rem; font-weight: 900; color: #444; cursor: pointer; }
        .acord-c { display: none; padding: 20px; text-align: center; background: #050505; border-top: 1px solid #151515; }
        .acord.open .acord-c { display: block; }
        .acord.open .acord-h { color: var(--o); background: #0c0c0c; }

        .btn-g { width: 100%; background: var(--g); color: #000; border: none; padding: 20px; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 15px; font-size: 0.85rem; letter-spacing: 1px; }
        .btn-o { width: 100%; background: none; color: var(--o); border: 1px solid var(--o); padding: 18px; border-radius: 12px; font-weight: 900; text-transform: uppercase; margin-top: 10px; font-size: 0.85rem; cursor: pointer; }

        /* ADMIN */
        .admin-box { width: 100%; background: #0c0c0c; border: 1px solid #222; border-radius: 12px; padding: 20px; margin-top: 15px; box-sizing: border-box; }
        .pending-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1a1a1a; font-size: 0.8rem; }
    </style>
</head>
<body>

<header onclick="hTaps()">
    <div class="logo">FRAN CRUZ VIP</div>
    <div class="geo-bar">
        <img src="https://flagcdn.com/cr.svg" class="flag active" onclick="setR('COSTA RICA', '₡', 540, this)">
        <img src="https://flagcdn.com/ni.svg" class="flag" onclick="setR('NICARAGUA', 'C$', 36.5, this)">
        <img src="https://flagcdn.com/pa.svg" class="flag" onclick="setR('PANAMÁ', '$', 1, this)">
        <img src="https://flagcdn.com/hn.svg" class="flag" onclick="setR('HONDURAS', 'L', 24.7, this)">
    </div>
    <div id="r-name" class="tag">SALA PRIVADA • COSTA RICA</div>
</header>

<div id="v-main" class="v active">
    <div id="p-render" style="width:100%"></div>

    <div style="color:var(--o); font-size:0.7rem; font-weight:900; margin:30px 0 15px; letter-spacing:2px;">MÉTODOS DE PAGO</div>
    
    <div class="acord" onclick="tgl(this)">
        <div class="acord-h">1. SINPE MÓVIL</div>
        <div class="acord-c" onclick="cp('50664535475')">
            <div style="font-size:1.5rem; font-weight:900; color:#fff;">6453 5475</div>
            <small style="color:#444">Randall Sánchez C.</small>
        </div>
    </div>
    <div class="acord" onclick="tgl(this)">
        <div class="acord-h">2. TRANSFERENCIA IBAN</div>
        <div class="acord-c" onclick="cp('CR80080315001000035641')">
            <div style="font-size:0.8rem; color:#fff;">CR80080315001000035641</div>
        </div>
    </div>
    <div class="acord" onclick="tgl(this)">
        <div class="acord-h">3. PAYPAL / CORREO</div>
        <div class="acord-c" onclick="cp('randallesc061376@gmail.com')">
            <div style="font-size:0.9rem; color:#fff;">randallesc061376@gmail.com</div>
        </div>
    </div>

    <button class="btn-g" onclick="wa()">ENVIAR COMPROBANTE DE PAGO</button>
    <button class="btn-o" onclick="alert('Ingrese su clave dinámica...')">YA TENGO MI CLAVE</button>
</div>

<div id="v-admin" class="v">
    <div style="color:var(--o); font-weight:900; letter-spacing:3px; margin:20px 0;">SISTEMA DE GESTIÓN</div>
    
    <div class="admin-box">
        <small style="color:var(--o); font-weight:900;">USUARIOS POR APROBAR</small>
        <div id="list-pending">
            <div class="pending-item"><span>UID-WJ9K2L</span> <button style="background:var(--v); border:none; color:#fff; border-radius:5px; padding:5px 10px;" onclick="this.parentElement.remove()">DAR ALTA</button></div>
        </div>
    </div>

    <div class="admin-box">
        <small style="color:var(--o); font-weight:900;">TIPO DE CAMBIO</small>
        <input type="number" style="width:100%; background:#000; border:1px solid #333; color:#fff; padding:10px; margin-top:10px;" placeholder="Valor">
        <button class="btn-g" style="padding:10px; font-size:0.7rem;">ACTUALIZAR</button>
    </div>

    <button class="btn-g" style="background:none; color:#444; border:none;" onclick="location.reload()">CERRAR SESIÓN</button>
</div>

<script>
    let sym = "₡", rt = 540, pN = "30 DÍAS GOLD", pU = 15, taps = 0;
    const plans = [{n:"Acceso Hoy",u:1},{n:"7 Días Silver",u:5},{n:"30 Días Gold",u:15}];

    function setR(n, s, r, e) {
        sym = s; rt = r;
        document.getElementById('r-name').innerText = `SALA PRIVADA • ${n}`;
        document.querySelectorAll('.flag').forEach(f => f.classList.remove('active'));
        e.classList.add('active');
        render();
    }

    function render() {
        const c = document.getElementById('p-render'); c.innerHTML = '';
        plans.forEach(p => {
            const v = (p.u * rt).toLocaleString();
            const a = p.n === pN ? 'sel' : '';
            c.innerHTML += `<div class="plan ${a}" onclick="selP('${p.n}',${p.u},this)"><div><span>${p.n}</span></div><div style="text-align:right"><b>${sym}${v}</b><span class="usd-val">${p.u} USD</span></div></div>`;
        });
    }

    function selP(n,u,e) { pN=n; pU=u; document.querySelectorAll('.plan').forEach(x=>x.classList.remove('sel')); e.classList.add('sel'); }
    function tgl(e) { const o = e.classList.contains('open'); document.querySelectorAll('.acord').forEach(a=>a.classList.remove('open')); if(!o) e.classList.add('open'); }
    function wa() {
        const val = (pU * rt).toLocaleString();
        const msg = `Hola! He seleccionado el *${pN}* por un valor de *${sym}${val}*.\n\nAdjunto envío mi comprobante de pago oficial para la activación de mi acceso.\n\nID: ${Math.random().toString(36).substring(7).toUpperCase()}11`;
        window.location.href = `https://wa.me/50664535475?text=${encodeURIComponent(msg)}`;
    }
    function cp(t) { navigator.clipboard.writeText(t); alert("Copiado"); }
    function hTaps() { taps++; if(taps>=5){ const p = prompt("PASSKEY:"); if(p==="2026"){ document.getElementById('v-main').classList.remove('active'); document.getElementById('v-admin').classList.add('active'); } taps=0; } setTimeout(()=>taps=0,3000); }
    render();
</script>
</body>
</html>
