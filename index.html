<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fran Cruz | VIP Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #000; color: white; margin: 0; padding: 20px; text-align: center; overflow-x: hidden; }
        .font-luxury { font-family: 'Cinzel', serif; }
        .gold-text { background: linear-gradient(to bottom, #f9e2af 0%, #d4af37 50%, #a67c00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .plan-card { background: #0a0a0a; border-radius: 20px; padding: 15px; cursor: pointer; transition: 0.3s; border: 1px solid #1a1a1a; }
        .plan-card.active { border-color: #d4af37; background: #1a1505; transform: translateY(-5px); }
        .payment-section { background: #070707; border-radius: 30px; padding: 25px; margin-top: 25px; border: 1px solid #1a1a1a; }
        #info-display { display: none; background: #111; border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px dashed #333; }
        .method-tab { cursor: pointer; transition: 0.3s; opacity: 0.5; padding-bottom: 8px; border-bottom: 2px solid transparent; }
        .method-tab.active-tab { opacity: 1; color: #d4af37; border-bottom: 2px solid #d4af37; }
        .flag-btn { font-size: 24px; cursor: pointer; opacity: 0.3; transition: 0.3s; }
        .flag-btn.active { opacity: 1; transform: scale(1.2); }
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .lamina-vip { border-radius: 15px; border: 1px solid #d4af3722; overflow: hidden; background: #0a0a0a; }
        .lamina-vip img { width: 100%; height: auto; display: block; }
        .download-btn { display: inline-flex; align-items: center; justify-content: center; background: #050505; border: 1px solid #d4af3766; color: #d4af37; font-size: 10px; font-weight: bold; text-transform: uppercase; padding: 10px 15px; border-radius: 10px; margin-top: 10px; width: 100%; }
        .admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #050505; border: 1px solid #d4af37; padding: 25px; border-radius: 30px; z-index: 1000; width: 95%; max-width: 550px; max-height: 90vh; overflow-y: auto; }
        input { background: #131313; border: 1px solid #222; color: white; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 10px; }
        .admin-img-card { position: relative; display: inline-block; }
        .btn-del { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; font-weight: bold; cursor: pointer; border: 1px solid black; display: flex; align-items: center; justify-content: center; }
        .loader-ring { width: 60px; height: 60px; border: 4px solid #1a1a1a; border-top: 4px solid #d4af37; border-radius: 50%; animation: spin 1.5s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="main-interface">
        <header class="mt-4 mb-4 cursor-pointer" onclick="handleAdminClicks()">
            <h1 class="font-luxury text-4xl gold-text tracking-widest uppercase">Fran Cruz</h1>
            <p class="text-[10px] tracking-[0.4em] uppercase opacity-60">El Personaje del Azar</p>
        </header>

        <div class="flex gap-4 mb-8 justify-center flex-wrap">
            <span onclick="setCountry('CR')" id="f-CR" class="flag-btn active">🇨🇷</span>
            <span onclick="setCountry('NI')" id="f-NI" class="flag-btn">🇳🇮</span>
            <span onclick="setCountry('PA')" id="f-PA" class="flag-btn">🇵🇦</span>
            <span onclick="setCountry('HN')" id="f-HN" class="flag-btn">🇭🇳</span>
            <span onclick="setCountry('SV')" id="f-SV" class="flag-btn">🇸🇻</span>
            <span onclick="setCountry('GT')" id="f-GT" class="flag-btn">🇬🇹</span>
            <span onclick="setCountry('US')" id="f-US" class="flag-btn">🇺🇸</span>
        </div>

        <div class="grid grid-cols-1 gap-3 max-w-sm mx-auto mb-8">
            <div onclick="setPlan(1)" id="p-1" class="plan-card">
                <h3 class="text-xs font-bold uppercase">Membresía por Hoy</h3>
                <p class="gold-text font-bold">$1 USD</p>
            </div>
            <div onclick="setPlan(5)" id="p-5" class="plan-card active">
                <h3 class="text-xs font-bold uppercase">Senda Ganadora</h3>
                <p class="gold-text font-bold">$5 USD</p>
            </div>
            <div onclick="setPlan(15)" id="p-15" class="plan-card">
                <h3 class="text-xs font-bold uppercase">Membresía VIP</h3>
                <p class="gold-text font-bold">$15 USD</p>
            </div>
        </div>

        <div class="payment-section max-w-sm mx-auto">
            <div class="flex justify-between text-[10px] mb-6 uppercase font-bold border-b border-white/5 pb-2">
                <span onclick="setMethod('sinpe')" id="m-sinpe" class="method-tab">SINPE CR</span>
                <span onclick="setMethod('transfer')" id="m-transfer" class="method-tab">Depósitos</span>
                <span onclick="setMethod('paypal')" id="m-paypal" class="method-tab">PayPal</span>
            </div>

            <div id="info-display">
                <p id="pay-data" class="text-xl font-bold tracking-widest mb-1 gold-text">---</p>
                <p id="pay-titular" class="text-[10px] opacity-80 uppercase">---</p>
            </div>

            <div class="bg-yellow-500/5 p-6 rounded-3xl border border-yellow-500/20">
                <p id="final-price" class="text-4xl font-bold text-yellow-500 tracking-tighter">---</p>
            </div>

            <input type="file" id="receipt-upload" accept="image/*" class="hidden" onchange="initIAValidation(this)">
            <button onclick="document.getElementById('receipt-upload').click()" class="w-full bg-white text-black font-bold py-5 rounded-2xl uppercase text-[10px] tracking-widest mt-8">Validar Comprobante con IA</button>
        </div>
    </div>

    <div id="waiting-screen" class="max-w-sm mx-auto" style="display:none;">
        <h2 class="font-luxury text-2xl gold-text mt-10">Analizando Pago</h2>
        <div class="loader-ring"></div>
        <p id="ia-status" class="text-[11px] opacity-70">Validando transacción...</p>
        <p class="text-[9px] mt-4 gold-text font-bold" id="timer-text">Restan 45s</p>
        <div id="success-btn" style="display:none;" class="mt-4">
            <button onclick="grantAccess()" class="w-full bg-yellow-600 text-white py-5 rounded-2xl font-bold text-xs uppercase">Entrar</button>
        </div>
    </div>

    <div id="vip-content" class="max-w-md mx-auto" style="display:none;">
        <h2 class="font-luxury text-3xl gold-text mt-6 uppercase">Círculo VIP</h2>
        <div id="lamina-container" class="gallery-grid"></div>
        <button onclick="location.reload()" class="text-[10px] mt-12 opacity-20 block w-full uppercase">Cerrar Sesión</button>
    </div>

    <div id="adminModal" class="admin-panel">
        <h3 class="gold-text font-bold mb-6 uppercase text-sm">Consola Administrativa</h3>
        <input type="text" id="in-titular" placeholder="Titular">
        <input type="text" id="in-phone" placeholder="WhatsApp">
        <label class="text-[9px] gold-text uppercase font-bold block text-left mb-2">Bodega de Láminas</label>
        <input type="file" id="upload-laminas" multiple accept="image/*" onchange="handleLaminasUpload(this)">
        <div id="admin-laminas-preview" class="flex flex-wrap gap-2 mb-4 p-2 bg-black rounded-xl border border-white/5"></div>
        <button onclick="saveAdminData()" class="w-full bg-yellow-600 text-white py-4 rounded-xl font-bold text-xs uppercase">Sincronizar</button>
        <button onclick="closeAdmin()" class="w-full text-gray-500 text-[10px] mt-4 uppercase">Cerrar</button>
    </div>

    <script>
        let adminClicks = 0;
        let selectedPlanPrice = 5;
        let currentCountry = 'CR';
        let currentMethod = null;
        let vipActive = false;

        const defaults = {
            titular: "Randall Esteban Sánchez",
            phone: "50664535475",
            laminasHoy: [],
            lastUpdate: new Date().toDateString(),
            rates: { CR: 525, NI: 36.5, GT: 7.8, HN: 24.5, SV: 1, PA: 1, US: 1 }
        };

        let data = JSON.parse(localStorage.getItem('franCruzVIP')) || defaults;

        function checkAutoPurge() {
            if (data.lastUpdate !== new Date().toDateString()) {
                data.laminasHoy = [];
                data.lastUpdate = new Date().toDateString();
                localStorage.setItem('franCruzVIP', JSON.stringify(data));
            }
        }
        checkAutoPurge();

        const geo = { CR: { s: '₡', r: 'CR' }, NI: { s: 'C$', r: 'NI' }, PA: { s: '$', r: 'PA' }, HN: { s: 'L', r: 'HN' }, SV: { s: '$', r: 'SV' }, GT: { s: 'Q', r: 'GT' }, US: { s: '$', r: 'US' } };

        function setCountry(code) {
            currentCountry = code;
            document.querySelectorAll('.flag-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('f-' + code).classList.add('active');
            updateDisplay();
        }

        function setPlan(val) {
            selectedPlanPrice = val;
            document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('active'));
            document.getElementById('p-'+val).classList.add('active');
            updateDisplay();
        }

        function setMethod(m) {
            currentMethod = m;
            document.querySelectorAll('.method-tab').forEach(s => s.classList.remove('active-tab'));
            document.getElementById('m-' + m).classList.add('active-tab');
            document.getElementById('info-display').style.display = 'block';
            updateDisplay();
        }

        function updateDisplay() {
            const g = geo[currentCountry];
            const rate = data.rates[g.r] || 1;
            document.getElementById('final-price').innerText = g.s + Math.round(selectedPlanPrice * rate).toLocaleString();
            document.getElementById('pay-titular').innerText = data.titular;
            const main = document.getElementById('pay-data');
            if(currentMethod === 'sinpe') main.innerText = "64535475";
            else if(currentMethod === 'paypal') main.innerText = "pagos@francruz.com";
            else if(currentMethod === 'transfer') main.innerText = "CR80080315001000035641";
        }

        function initIAValidation() {
            document.getElementById('main-interface').style.display = 'none';
            document.getElementById('waiting-screen').style.display = 'block';
            let timeLeft = 45;
            const countdown = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-text').innerText = `Restan ${timeLeft}s`;
                if(timeLeft <= 0) {
                    clearInterval(countdown);
                    document.getElementById('ia-status').innerHTML = "✓ VALIDADO";
                    document.getElementById('success-btn').style.display = 'block';
                }
            }, 1000);
        }

        function grantAccess() {
            vipActive = true;
            document.getElementById('waiting-screen').style.display = 'none';
            document.getElementById('vip-content').style.display = 'block';
            const container = document.getElementById('lamina-container');
            container.innerHTML = data.laminasHoy.map((img, i) => `
                <div class="lamina-vip-item">
                    <div class="lamina-vip"><img src="${img}"></div>
                    <a href="${img}" download="VIP_${i+1}.jpg" class="download-btn">Descargar ${i+1}</a>
                </div>`).join('');
        }

        function handleLaminasUpload(input) {
            if (input.files) {
                Array.from(input.files).forEach(file => {
                    let reader = new FileReader();
                    reader.onload = (e) => {
                        data.laminasHoy.push(e.target.result);
                        renderAdminLaminas();
                    };
                    reader.readAsDataURL(file);
                });
            }
        }

        function removeLamina(index) {
            data.laminasHoy.splice(index, 1);
            renderAdminLaminas();
        }

        function renderAdminLaminas() {
            const preview = document.getElementById('admin-laminas-preview');
            preview.innerHTML = data.laminasHoy.map((img, i) => `
                <div class="admin-img-card">
                    <img src="${img}" class="w-10 h-14 object-cover rounded">
                    <div class="btn-del" onclick="removeLamina(${i})">×</div>
                </div>`).join('');
        }

        function handleAdminClicks() {
            adminClicks++;
            if(adminClicks === 5) {
                document.getElementById('adminModal').style.display = 'block';
                document.getElementById('in-titular').value = data.titular;
                document.getElementById('in-phone').value = data.phone;
                renderAdminLaminas();
            }
            setTimeout(() => adminClicks = 0, 3000);
        }

        function saveAdminData() {
            data.titular = document.getElementById('in-titular').value;
            data.phone = document.getElementById('in-phone').value;
            localStorage.setItem('franCruzVIP', JSON.stringify(data));
            location.reload();
        }

        function closeAdmin() { document.getElementById('adminModal').style.display = 'none'; }
        updateDisplay();
    </script>
</body>
</html>
