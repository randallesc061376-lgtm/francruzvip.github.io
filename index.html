<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRAN CRUZ VIP • SALA PRIVADA</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <style>
        :root { --o: #d4af37; --n: #050505; --g: linear-gradient(180deg, #f9e498, #d4af37); --v: #2ecc71; --neon-v: 0 0 10px rgba(46, 204, 113, 0.4); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--n); color: #fff; user-select: none; }
        header { padding: 30px; text-align: center; border-bottom: 1px solid #111; cursor: pointer; }
        .logo { color: var(--o); font-size: 2.2rem; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; }
        .view { display: none; width: 100%; max-width: 450px; margin: auto; padding-bottom: 40px; }
        .view.active { display: block; }
        
        /* Galería Clientes */
        #gallery-client { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        .lamina { width: 100%; border-radius: 10px; border: 1px solid #222; }

        /* Admin */
        .acc-item { border: 1px solid #1a1a1a; border-radius: 12px; margin: 10px 20px; overflow: hidden; background: #0a0a0a; }
        .acc-head { padding: 18px; font-size: 0.85rem; font-weight: 800; color: var(--o); cursor: pointer; text-transform: uppercase; display: flex; justify-content: space-between; }
        .acc-body { display: none; padding: 15px; border-top: 1px solid #1a1a1a; }
        .acc-body.show { display: block; }
        
        /* Grid de Imágenes Admin */
        .admin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 15px; }
        .thumb-wrap { position: relative; }
        .thumb { width: 100%; height: 80px; object-fit: cover; border-radius: 5px; }
        .del-btn { position: absolute; top: 2px; right: 2px; background: red; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 10px; cursor: pointer; }

        .btn-gold { width: calc(100% - 40px); background: var(--g); color: #000; border: none; padding: 20px; border-radius: 15px; font-weight: 900; margin: 20px; cursor: pointer; }
        .copy-box { background: #0f0f0f; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px dashed #333; cursor: pointer; }
        .copy-box.success { border-color: var(--v); box-shadow: var(--neon-v); }
        .flag-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; }
        .flag { width: 100%; height: 30px; opacity: 0.4; cursor: pointer; border-radius: 4px; object-fit: cover; }
        .flag.active { opacity: 1; border: 1px solid var(--o); }
    </style>
</head>
<body>

<header onclick="adminAccess()"><div class="logo">FRAN CRUZ VIP</div></header>

<div id="v-pay" class="view active">
    <div class="flag-grid" id="flags"></div>
    <div id="planes" style="padding: 0 20px;"></div>
    <div class="acc-item">
        <div class="acc-head" onclick="this.nextElementSibling.classList.toggle('show')">PAGOS DISPONIBLES ▼</div>
        <div class="acc-body show">
            <div class="copy-box" onclick="copy('70835833', this)"><small>SINPE</small><br><b>70835833</b></div>
            <div class="copy-box" onclick="copy('randallesc061376@gmail.com', this)"><small>PAYPAL</small><br><b>randallesc061376@gmail.com</b></div>
        </div>
    </div>
    <button class="btn-gold" onclick="requestAccess()">ENVIAR COMPROBANTE</button>
</div>

<div id="v-gallery" class="view">
    <h3 style="text-align:center; padding: 20px; color: var(--o);">SUS LÁMINAS VIP</h3>
    <div id="gallery-client"></div>
    <button class="btn-gold" onclick="location.reload()">CERRAR SESIÓN</button>
</div>

<div id="v-admin" class="view">
    <div class="acc-item">
        <div class="acc-head" onclick="this.nextElementSibling.classList.toggle('show')">GALERÍA DE LÁMINAS ▼</div>
        <div class="acc-body show">
            <input type="file" id="fileInp" style="display:none" onchange="uploadImg(this)" accept="image/*">
            <button class="btn-gold" style="margin:0; width:100%" onclick="document.getElementById('fileInp').click()">+ CARGAR DESDE TELÉFONO</button>
            <div id="adm-gal" class="admin-grid"></div>
        </div>
    </div>

    <div class="acc-item">
        <div class="acc-head" onclick="this.nextElementSibling.classList.toggle('show')">TASAS DE CAMBIO ▼</div>
        <div class="acc-body" id="adm-rates"></div>
    </div>
    <button class="btn-gold" style="background:#222; color:#fff" onclick="location.reload()">SALIR DEL PANEL</button>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE", projectId: "fran-cruz-sala-vip", databaseURL: "https://fran-cruz-sala-vip-default-rtdb.firebaseio.com", storageBucket: "fran-cruz-sala-vip.appspot.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database(), st = firebase.storage();

    let rates = { cr: 540, ni: 37, hn: 24.6, gt: 7.7, usd: 1 }, iso = 'cr', adminClicks = 0;
    const uid = localStorage.getItem('fc_id') || 'ID-' + Math.random().toString(36).substr(2, 5).toUpperCase();
    localStorage.setItem('fc_id', uid);

    function init() {
        db.ref('rates').on('value', ss => { if(ss.val()) { rates = ss.val(); renderFlags(); renderAdminRates(); } });
        checkStatus();
        loadGallery();
    }

    function checkStatus() {
        db.ref('users/'+uid).on('value', ss => {
            if(ss.val()?.status === 'active') {
                document.getElementById('v-pay').classList.remove('active');
                document.getElementById('v-gallery').classList.add('active');
            }
        });
    }

    // --- LÓGICA DE GALERÍA (EL ALMA DEL PROYECTO) ---
    async function uploadImg(inp) {
        const file = inp.files[0]; if(!file) return;
        alert("Subiendo imagen...");
        const ref = st.ref('laminas/' + Date.now());
        await ref.put(file);
        const url = await ref.getDownloadURL();
        db.ref('laminas').push(url);
        alert("¡Lámina agregada!");
    }

    function loadGallery() {
        db.ref('laminas').on('value', ss => {
            const gc = document.getElementById('gallery-client'), ga = document.getElementById('adm-gal');
            gc.innerHTML = ""; ga.innerHTML = "";
            ss.forEach(snap => {
                const url = snap.val(), key = snap.key;
                gc.innerHTML += `<img src="${url}" class="lamina" onclick="window.open('${url}')">`;
                ga.innerHTML += `<div class="thumb-wrap"><img src="${url}" class="thumb"><button class="del-btn" onclick="delImg('${key}')">X</button></div>`;
            });
        });
    }

    function delImg(key) { if(confirm("¿Borrar lámina?")) db.ref('laminas/'+key).remove(); }

    // --- LÓGICA DE TASAS ---
    function renderAdminRates() {
        const d = document.getElementById('adm-rates'); d.innerHTML = "";
        Object.entries(rates).forEach(([k, v]) => {
            if(k === 'usd') return;
            d.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px">
                <span>${k.toUpperCase()}</span>
                <input type="number" value="${v}" id="rate-${k}" style="width:70px; background:#000; color:var(--o); border:1px solid #333; text-align:center">
            </div>`;
        });
        d.innerHTML += `<button class="btn-gold" style="margin:10px 0; width:100%" onclick="saveRates()">GUARDAR CAMBIOS</button>`;
    }

    function saveRates() {
        const newRates = {...rates};
        ['cr','ni','hn','gt'].forEach(k => newRates[k] = parseFloat(document.getElementById('rate-'+k).value));
        db.ref('rates').set(newRates).then(() => alert("Tasas actualizadas a nivel mundial"));
    }

    function renderFlags() {
        const f = document.getElementById('flags'), p = document.getElementById('planes');
        f.innerHTML = `<img src="https://flagcdn.com/cr.svg" class="flag ${iso==='cr'?'active':''}" onclick="setIso('cr')">
                       <img src="https://flagcdn.com/ni.svg" class="flag ${iso==='ni'?'active':''}" onclick="setIso('ni')">`;
        const sym = iso === 'cr' ? '₡' : '$';
        const base = { "HOY": 1, "7 DÍAS": 5, "30 DÍAS": 20 };
        p.innerHTML = "";
        Object.entries(base).forEach(([n, v]) => {
            const final = Math.round(v * rates[iso]);
            p.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; padding:20px; border:1px solid #222; margin-bottom:10px; border-radius:10px">
                <span>${n}</span><b>${sym}${final.toLocaleString()}</b>
            </div>`;
        });
    }

    function setIso(i) { iso = i; renderFlags(); }
    function copy(t, el) { navigator.clipboard.writeText(t); el.classList.add('success'); setTimeout(()=>el.classList.remove('success'), 600); }
    function adminAccess() { adminClicks++; if(adminClicks >= 5) { if(prompt("PASS:") === "1376") { document.getElementById('v-pay').classList.remove('active'); document.getElementById('v-admin').classList.add('active'); } adminClicks = 0; } }

    init();
</script>
</body>
</html>
