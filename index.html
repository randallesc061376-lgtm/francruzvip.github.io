<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRAN CRUZ VIP</title>
    <style>
        :root { --o: #d4af37; --n: #050505; --g: linear-gradient(180deg, #f9e498, #d4af37); --r: #c0392b; }
        body { background: var(--n); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; user-select: none; }
        
        header { padding: 45px 20px 10px; text-align: center; width: 100%; cursor: pointer; }
        .logo { color: var(--o); font-size: 2rem; font-weight: 900; letter-spacing: 6px; text-transform: uppercase; }
        .sub { color: #555; font-size: .65rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 5px; }

        /* VISTAS */
        .v { display: none; width: 100%; max-width: 400px; flex-direction: column; padding: 0 25px 40px; box-sizing: border-box; }
        .active { display: flex; }

        /* ESTILOS DE BOTONES Y CAJAS */
        .btn-gold { width: 100%; background: var(--g); color: #000; border: none; padding: 20px; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 15px; }
        .box { width: 100%; background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 12px; padding: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .box b { color: var(--o); font-size: 1.15rem; }

        /* PANEL ADMIN */
        .admin-sec { background: #0a0a0a; border: 1px solid #151515; border-radius: 15px; padding: 20px; margin-top: 20px; width: 100%; }
        .admin-label { color: var(--o); font-size: 0.7rem; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; display: block; letter-spacing: 2px; }
        .inp { width: 100%; background: #000; border: 1px solid #222; padding: 15px; color: #fff; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<header onclick="hdlTaps()">
    <div class="logo">FRAN CRUZ VIP</div>
    <div id="reg-tag" class="sub">SALA PRIVADA • COSTA RICA</div>
</header>

<div id="view-main" class="v active">
    <div class="box"><span>Acceso Hoy</span><b>₡550</b></div>
    <div class="box"><span>7 Días Silver</span><b>₡3,850</b></div>
    <div class="box" style="border-color:var(--o)"><span>30 Días Gold</span><b>₡8,250</b></div>
    
    <div style="text-align:center; margin:30px 0 10px; color:var(--o); font-size:0.8rem; font-weight:900;">SINPE MÓVIL</div>
    <div style="background:#0c0c0c; padding:20px; border-radius:12px; text-align:center; font-size:1.5rem; font-weight:900;">50664535475</div>
    
    <button class="btn-gold" onclick="sendWA()">ENVIAR COMPROBANTE DE PAGO</button>
</div>

<div id="view-admin" class="v">
    <div style="text-align:center; color:var(--o); font-weight:900; letter-spacing:3px; margin:20px 0;">SISTEMA DE CONTROL</div>

    <div class="admin-sec">
        <span class="admin-label">Cambio de Divisa</span>
        <select class="inp" id="pais-sel">
            <option value="CR">Costa Rica (₡)</option>
            <option value="NI">Nicaragua (C$)</option>
            <option value="PA">Panamá ($)</option>
        </select>
        <input type="number" class="inp" id="new-rate" placeholder="Nuevo valor">
        <button class="btn-gold" style="padding:12px;" onclick="alert('Cambio actualizado')">APLICAR CAMBIO</button>
    </div>

    <div class="admin-sec">
        <span class="admin-label">Contenido VIP</span>
        <button class="btn-gold" onclick="alert('Abriendo galería...')">ELEGIR LÁMINA</button>
        <button class="btn-gold" style="background:none; border:1px solid var(--o); color:var(--o);" onclick="alert('Lámina publicada')">PUBLICAR LÁMINA</button>
    </div>

    <div class="admin-sec">
        <span class="admin-label">Seguridad de Usuarios</span>
        <input type="text" class="inp" id="user-id" placeholder="ID del Usuario">
        <div style="display:flex; gap:10px;">
            <button class="btn-gold" style="background:var(--r); color:#fff;" onclick="alert('Usuario Baneado')">BANEAR</button>
            <button class="btn-gold" style="background:#27ae60; color:#fff;" onclick="alert('Alta concedida')">DAR ALTA</button>
        </div>
    </div>

    <button class="btn-gold" style="background:none; color:#444;" onclick="location.reload()">CERRAR SESIÓN</button>
</div>

<div id="modal-pass" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:100;">
    <span class="admin-label">ADMIN PASSKEY</span>
    <input type="password" id="psk" class="inp" style="width:200px; text-align:center; font-size:1.5rem; letter-spacing:8px;">
    <button class="btn-gold" style="width:200px" onclick="validar()">ENTRAR AL PANEL</button>
</div>

<script>
    let taps = 0;
    function hdlTaps() {
        taps++;
        if(taps >= 5) { document.getElementById('modal-pass').style.display = 'flex'; taps = 0; }
        setTimeout(() => taps = 0, 3000);
    }

    function validar() {
        if(document.getElementById('psk').value === "2026") {
            alert("ADMINISTRADOR IDENTIFICADO");
            document.getElementById('modal-pass').style.display = 'none';
            document.getElementById('view-main').classList.remove('active');
            document.getElementById('view-admin').classList.add('active');
        } else {
            alert("ERROR");
            document.getElementById('modal-pass').style.display = 'none';
        }
    }

    function sendWA() {
        const msg = encodeURIComponent("Buen día. Envío mi comprobante para la activación de mi acceso.");
        window.location.href = `https://wa.me/50664535475?text=${msg}`;
    }
</script>
</body>
</html>
