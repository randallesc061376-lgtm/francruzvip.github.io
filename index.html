<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRAN CRUZ VIP • PLATINUM FINAL V3</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <style>
        :root { --o: #d4af37; --n: #050505; --g: linear-gradient(180deg, #f9e498, #d4af37); --r: #ff4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: var(--n); color: #fff; margin: 0; min-height: 100vh; overflow-x: hidden; }
        header { padding: 15px 10px; text-align: center; cursor: pointer; border-bottom: 1px solid #111; }
        .logo { color: var(--o); font-size: 1.6rem; font-weight: 900; letter-spacing: 2px; }
        .view { display: none; width: 100%; max-width: 420px; margin: auto; flex-direction: column; padding: 5px; animation: fadeIn 0.3s; }
        .view.active { display: flex; }

        /* Frontend Compacto V3 */
        .geo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin: 8px; padding: 8px; background: #0f0f0f; border-radius: 10px; }
        .flag { width: 100%; height: 20px; opacity: 0.4; border-radius: 2px; cursor: pointer; object-fit: cover; }
        .flag.active { opacity: 1; border: 1px solid var(--o); box-shadow: 0 0 5px var(--o); }
        
        .card { background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 8px; padding: 10px 15px; margin: 0 8px 5px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; height: 42px; }
        .card.sel { border: 1px solid var(--o); background: rgba(212,175,55,0.08); }
        .card span { font-size: 0.8rem; font-weight: 600; }
        .card b { color: var(--o); font-size: 0.95rem; }

        .acc-item { border: 1px solid #1a1a1a; border-radius: 8px; margin: 0 8px 4px; overflow: hidden; }
        .acc-head { background: #111; padding: 8px 12px; font-size: 0.7rem; font-weight: bold; color: #666; cursor: pointer; display: flex; justify-content: space-between; }
        .acc-body { display: none; background: #080808; padding: 10px; border-top: 1px solid #1a1a1a; text-align: center; }
        .acc-body.active { display: block; }
        
        .copy-box { background: #111; padding: 8px; border-radius: 5px; margin: 4px 0; font-family: monospace; color: var(--o); cursor: pointer; border: 1px dashed #333; font-size: 0.75rem; }
        
        .btn-gold { width: calc(100% - 16px); background: var(--g); color: #000; border: none; padding: 14px; border-radius: 10px; font-weight: 900; margin: 8px; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; }
        .btn-outline { width: calc(100% - 16px); background: transparent; color: var(--o); border: 1px solid #222; padding: 10px; border-radius: 8px; font-weight: 700; margin: 0 8px 10px; cursor: pointer; font-size: 0.65rem; letter-spacing: 1px; }

        /* Estilos Admin */
        .adm-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
        .adm-label { font-size: 0.65rem; color: var(--o); font-weight: 800; text-transform: uppercase; margin-bottom: 6px; display: block; }
        .adm-input { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 8px; border-radius: 5px; margin-bottom: 6px; font-size: 0.8rem; }
        .user-row { background: #000; border: 1px solid #1a1a1a; padding: 8px; border-radius: 6px; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem; }
        .btn-action { border: none; padding: 5px 8px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-approve { background: #2ecc71; color: #fff; }
        .btn-ban { background: var(--r); color: #fff; margin-left: 3px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body oncontextmenu="return false;">

<header onclick="adminAccess()">
    <div class="logo">FRAN CRUZ VIP</div>
    <div id="tagline" style="font-size: 0.6rem; color: #444; letter-spacing: 1.5px;">SALA PRIVADA • COSTA RICA</div>
</header>

<div id="v-client" class="view active">
    <div class="geo-grid">
        <img src="https://flagcdn.com/cr.svg" class="flag active" onclick="setLoc('COSTA RICA', '₡', 540)">
        <img src="https://flagcdn.com/ni.svg" class="flag" onclick="setLoc('NICARAGUA', 'C$', 37)">
        <img src="https://flagcdn.com/pa.svg" class="flag" onclick="setLoc('PANAMÁ', '$', 1)">
        <img src="https://flagcdn.com/hn.svg" class="flag" onclick="setLoc('HONDURAS', 'L', 24.6)">
        <img src="https://flagcdn.com/sv.svg" class="flag" onclick="setLoc('EL SALVADOR', '$', 1)">
        <img src="https://flagcdn.com/gt.svg" class="flag" onclick="setLoc('GUATEMALA', 'Q', 7.7)">
        <img src="https://flagcdn.com/bz.svg" class="flag" onclick="setLoc('BELICE', 'BZ$', 2)">
        <img src="https://flagcdn.com/un.svg" class="flag" onclick="setLoc('WORLDWIDE', '$', 1)">
    </div>
    
    <div class="card" onclick="selP(this, 'HOY', 1)"><span>ACCESO HOY</span><b class="p-val">₡540</b></div>
    <div class="card" onclick="selP(this, '7 DÍAS SILVER', 5)"><span>7 DÍAS SILVER</span><b class="p-val">₡2,700</b></div>
    <div class="card sel" onclick="selP(this, '30 DÍAS GOLD', 20)"><span>30 DÍAS GOLD</span><b class="p-val">₡10,800</b></div>
    
    <div class="acc-item">
        <div class="acc-head" onclick="toggleAcc(this)">1. SINPE MÓVIL / GRUPO MUTUAL <span>▼</span></div>
        <div class="acc-body active">
            <div class="copy-box" onclick="copy('70835833')">70835833</div>
            <div class="copy-box" onclick="copy('CR80080315001000035641')">CR80...641</div>
        </div>
    </div>
    
    <div class="acc-item">
        <div class="acc-head" onclick="toggleAcc(this)">2. PAYPAL <span>▼</span></div>
        <div class="acc-body">
            <div class="copy-box" onclick="copy('randallesc061376@gmail.com')">randallesc061376@gmail.com</div>
        </div>
    </div>

    <button class="btn-gold" onclick="requestAccess()">SOLICITAR ACCESO VIP</button>
    <button class="btn-outline" onclick="checkKey()">YA TENGO MI CLAVE</button>
</div>

<div id="v-admin" class="view">
    <div class="adm-container" style="padding:10px">
        <div class="adm-card">
            <span class="adm-label">Panel de Validación</span>
            <div id="admin-user-list"></div>
        </div>
        <div class="adm-card">
            <span class="adm-label">Cargar Nueva Imagen</span>
            <input type="file" id="f-upload" class="adm-input" accept="image/*">
            <button class="btn-gold" style="margin:0; width:100%" onclick="uploadImg()">SUBIR A GALERÍA</button>
        </div>
        <button class="btn-gold" style="background:#222; color:#fff" onclick="location.reload()">SALIR</button>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE", 
        projectId: "fran-cruz-sala-vip",
        databaseURL: "https://fran-cruz-sala-vip-default-rtdb.firebaseio.com",
        storageBucket: "fran-cruz-sala-vip.firebasestorage.app" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const st = firebase.storage();

    let curTasa = 540, curSim = "₡", curP = "30 DÍAS GOLD", clicks = 0;
    let myID = localStorage.getItem('fc_id') || 'UID-' + Math.random().toString(36).substr(2, 6).toUpperCase();
    localStorage.setItem('fc_id', myID);

    function adminAccess() {
        clicks++;
        if(clicks >= 5) {
            if(prompt("PASS:") === "1376") {
                document.getElementById('v-client').classList.remove('active');
                document.getElementById('v-admin').classList.add('active');
                loadUsers();
            }
            clicks = 0;
        }
        setTimeout(() => clicks = 0, 2000);
    }

    function setLoc(n, s, t) {
        curTasa = t; curSim = s;
        document.getElementById('tagline').innerText = `SALA PRIVADA • ${n}`;
        document.querySelectorAll('.flag').forEach(f => f.classList.remove('active'));
        event.target.classList.add('active');
        updatePrices();
    }

    function updatePrices() {
        const base = [1, 5, 20]; // HOY, 7 DÍAS, 30 DÍAS
        document.querySelectorAll('.p-val').forEach((el, i) => {
            el.innerText = curSim + Math.round(base[i] * curTasa).toLocaleString();
        });
    }

    function selP(el, p) {
        curP = p;
        document.querySelectorAll('.card').forEach(c => c.classList.remove('sel'));
        el.classList.add('sel');
    }

    function copy(t) { navigator.clipboard.writeText(t); alert("Copiado"); }
    function toggleAcc(el) { el.nextElementSibling.classList.toggle('active'); }

    function requestAccess() {
        const day = new Date().getDate().toString().padStart(2, '0');
        const key = myID.substring(4, 6) + day;
        const msg = `Solicito ${curP}. ID: ${myID}`;
        window.open(`https://wa.me/50670835833?text=${encodeURIComponent(msg)}`);
        db.ref('users/' + myID).set({ id: myID, status: 'wait', plan: curP });
        alert("Solicitud enviada. Validando pago...");
    }

    function loadUsers() {
        db.ref('users').on('value', ss => {
            const list = document.getElementById('admin-user-list');
            list.innerHTML = "";
            ss.forEach(u => {
                const user = u.val();
                list.innerHTML += `<div class="user-row">
                    <span>${user.id} (${user.plan})</span>
                    <div>
                        <button class="btn-action btn-approve" onclick="db.ref('users/${user.id}').update({status:'active'})">✓</button>
                        <button class="btn-action btn-ban" onclick="db.ref('users/${user.id}').update({status:'ban'})">X</button>
                    </div>
                </div>`;
            });
        });
    }

    function uploadImg() {
        const file = document.getElementById('f-upload').files[0];
        if(!file) return;
        st.ref('laminas/' + Date.now()).put(file).then(s => {
            s.ref.getDownloadURL().then(url => {
                db.ref('gallery').push({url, time: Date.now()});
                alert("IMAGEN CARGADA");
            });
        });
    }
</script>
</body>
</html>
