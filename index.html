<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fran Cruz | VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #000; color: white; margin: 0; padding: 20px; text-align: center; }
        .font-luxury { font-family: 'Cinzel', serif; }
        .gold-text { background: linear-gradient(to bottom, #f9e2af 0%, #d4af37 50%, #a67c00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .plan-card { background: #0a0a0a; border-radius: 20px; padding: 15px; cursor: pointer; transition: 0.3s; border: 1px solid #1a1a1a; margin-bottom: 10px; }
        .plan-card.active { border-color: #d4af37; background: #1a1505; }
        .payment-section { background: #070707; border-radius: 30px; padding: 25px; border: 1px solid #1a1a1a; max-width: 380px; margin: 20px auto; }
        #info-display { display: none; background: #111; border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px dashed #333; }
        .method-tab { cursor: pointer; opacity: 0.5; padding-bottom: 5px; font-size: 10px; font-weight: bold; }
        .method-tab.active-tab { opacity: 1; color: #d4af37; border-bottom: 2px solid #d4af37; }
        .admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid #d4af37; padding: 20px; border-radius: 24px; z-index: 1000; width: 90%; max-width: 350px; }
        input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px; border-radius: 10px; width: 100%; margin-bottom: 10px; }
        .flag-btn { font-size: 24px; cursor: pointer; opacity: 0.3; margin: 0 5px; }
        .flag-btn.active { opacity: 1; transform: scale(1.2); }
        .loader { width: 40px; height: 40px; border: 4px solid #1a1a1a; border-top: 4px solid #d4af37; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="main-interface">
        <header onclick="handleAdminClicks()" style="cursor:pointer">
            <h1 class="font-luxury text-4xl gold-text tracking-widest uppercase">Fran Cruz</h1>
            <p class="text-[9px] tracking-[0.4em] uppercase opacity-50">El Personaje del Azar</p>
        </header>

        <div class="flex justify-center my-6">
            <span onclick="setCountry('CR')" id="f-CR" class="flag-btn active">🇨🇷</span>
            <span onclick="setCountry('NI')" id="f-NI" class="flag-btn">🇳🇮</span>
            <span onclick="setCountry('PA')" id="f-PA" class="flag-btn">🇵🇦</span>
            <span onclick="setCountry('US')" id="f-US" class="flag-btn">🇺🇸</span>
        </div>

        <div class="max-w-sm mx-auto">
            <div onclick="setPlan(1, 'Membresía Hoy')" id="p-1" class="plan-card">
                <p class="gold-text font-bold text-lg">$1 USD</p>
                <p class="text-[10px] uppercase opacity-60">Acceso Diario</p>
            </div>
            <div onclick="setPlan(5, 'Senda Ganadora')" id="p-5" class="plan-card active">
                <p class="gold-text font-bold text-lg">$5 USD</p>
                <p class="text-[10px] uppercase opacity-60">7 Días VIP</p>
            </div>
        </div>

        <div class="payment-section">
            <div class="flex justify-around mb-4 border-b border-white/5 pb-2">
                <span onclick="setMethod('sinpe')" id="m-sinpe" class="method-tab">SINPE CR</span>
                <span onclick="setMethod('transfer')" id="m-transfer" class="method-tab">TRANSFERENCIA</span>
            </div>

            <div id="info-display">
                <p id="pay-data" class="text-lg font-bold gold-text">---</p>
                <p id="pay-titular" class="text-[9px] opacity-60 uppercase">---</p>
            </div>

            <div class="bg-white/5 p-4 rounded-2xl border border-white/10 mb-6">
                <p id="final-price" class="text-3xl font-bold text-yellow-500">---</p>
            </div>

            <input type="file" id="receipt-upload" accept="image/*" class="hidden" onchange="sendToWhatsApp(this)">
            <button onclick="document.getElementById('receipt-upload').click()" class="w-full bg-white text-black font-bold py-4 rounded-xl uppercase text-xs tracking-widest">
                Enviar Comprobante
            </button>
        </div>
    </div>

    <div id="waiting-screen" style="display:none; padding-top: 50px;">
        <h2 class="font-luxury text-2xl gold-text">VERIFICANDO</h2>
        <div class="loader"></div>
        <div class="bg-[#0a0a0a] p-8 rounded-[30px] border border-white/5 max-w-sm mx-auto">
            <p class="text-[11px] opacity-70 mb-6">Ingrese el código de 4 dígitos que le enviamos por WhatsApp para activar sus láminas.</p>
            <input type="number" id="input-code" placeholder="CÓDIGO" class="text-center text-2xl tracking-[0.5em] gold-text">
            <button onclick="checkCode()" class="w-full bg-yellow-600 text-white py-4 rounded-xl font-bold uppercase text-xs mt-2">Activar Ahora</button>
        </div>
    </div>

    <div id="vip-content" style="display:none; padding-top: 30px;">
        <h2 class="font-luxury text-3xl gold-text mb-6">LÁMINAS VIP</h2>
        <div class="bg-white/5 p-10 rounded-[30px] border border-yellow-500/30 max-w-sm mx-auto">
            <p class="gold-text font-bold uppercase tracking-widest text-sm">Acceso Autorizado</p>
        </div>
    </div>

    <div id="adminModal" class="admin-panel shadow-2xl">
        <p class="gold-text font-bold text-xs mb-4 uppercase">Configuración Randall</p>
        <input type="text" id="in-phone" placeholder="WhatsApp (506...)">
        <input type="text" id="in-sinpe" placeholder="Número SINPE">
        <input type="text" id="in-pass" placeholder="Código VIP (Ej: 1234)">
        <button onclick="saveAdminData()" class="w-full bg-yellow-600 text-white py-3 rounded-lg font-bold text-xs uppercase">Guardar Ajustes</button>
    </div>

    <script>
        let adminClicks = 0;
        let selectedPrice = 5;
        let selectedName = "Senda Ganadora";
        let country = 'CR';
        let method = null;

        const defaults = {
            phone: "50664535475",
            sinpe: "64535475",
            titular: "Randall Esteban Sánchez",
            pass: "1234",
            rate: 525
        };

        let data = JSON.parse(localStorage.getItem('franCruzConfig')) || defaults;

        function setCountry(c) {
            country = c;
            document.querySelectorAll('.flag-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('f-'+c).classList.add('active');
            update();
        }

        function setPlan(p, n) {
            selectedPrice = p;
            selectedName = n;
            document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('active'));
            event.currentTarget.classList.add('active');
            update();
        }

        function setMethod(m) {
            method = m;
            document.querySelectorAll('.method-tab').forEach(t => t.classList.remove('active-tab'));
            document.getElementById('m-'+m).classList.add('active-tab');
            document.getElementById('info-display').style.display = 'block';
            update();
        }

        function update() {
            const symbol = country === 'CR' ? '₡' : '$';
            const rate = country === 'CR' ? data.rate : 1;
            document.getElementById('final-price').innerText = symbol + (selectedPrice * rate).toLocaleString();
            document.getElementById('pay-data').innerText = method === 'sinpe' ? data.sinpe : "Solicitar IBAN";
            document.getElementById('pay-titular').innerText = data.titular;
        }

        function sendToWhatsApp(input) {
            if (input.files && input.files[0]) {
                const text = `FRAN CRUZ VIP\n\nAdjunto mi comprobante.\nPlan: ${selectedName}\nSolicito mi CÓDIGO de acceso.`;
                const url = `https://wa.me/${data.phone}?text=${encodeURIComponent(text)}`;
                
                // Salto directo a WhatsApp
                window.location.href = url;

                // Al volver, verán la pantalla de código
                setTimeout(() => {
                    document.getElementById('main-interface').style.display = 'none';
                    document.getElementById('waiting-screen').style.display = 'block';
                }, 1000);
            }
        }

        function checkCode() {
            if(document.getElementById('input-code').value === data.pass) {
                document.getElementById('waiting-screen').style.display = 'none';
                document.getElementById('vip-content').style.display = 'block';
            } else {
                alert("Código aún no validado.");
            }
        }

        function handleAdminClicks() {
            adminClicks++;
            if(adminClicks === 5) {
                document.getElementById('adminModal').style.display = 'block';
                document.getElementById('in-phone').value = data.phone;
                document.getElementById('in-sinpe').value = data.sinpe;
                document.getElementById('in-pass').value = data.pass;
            }
            setTimeout(() => adminClicks = 0, 3000);
        }

        function saveAdminData() {
            data.phone = document.getElementById('in-phone').value;
            data.sinpe = document.getElementById('in-sinpe').value;
            data.pass = document.getElementById('in-pass').value;
            localStorage.setItem('franCruzConfig', JSON.stringify(data));
            location.reload();
        }

        update();
    </script>
</body>
</html>
