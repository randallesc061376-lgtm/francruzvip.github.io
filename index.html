<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fran Cruz VIP | El Personaje del Azar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #000; color: white; margin: 0; padding: 20px; text-align: center; }
        .font-luxury { font-family: 'Cinzel', serif; }
        .gold-text { background: linear-gradient(to bottom, #f9e2af 0%, #d4af37 50%, #a67c00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .payment-card { background: #0a0a0a; border-radius: 30px; padding: 25px; border: 1px solid #1a1a1a; margin: 0 auto; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        .method-tab { padding: 10px; font-size: 10px; border-bottom: 2px solid transparent; cursor: pointer; opacity: 0.5; text-transform: uppercase; font-weight: bold; }
        .method-tab.active { opacity: 1; border-color: #d4af37; color: #d4af37; }
        .admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid #d4af37; padding: 20px; border-radius: 20px; z-index: 1000; width: 95%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
        input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 8px; border-radius: 8px; width: 100%; margin-bottom: 8px; font-size: 13px; }
        label { font-size: 10px; color: #888; display: block; text-align: left; margin-bottom: 2px; text-transform: uppercase; }
        .flag-btn { font-size: 20px; cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .flag-btn.active { opacity: 1; transform: scale(1.2); }
    </style>
</head>
<body>

    <header class="mt-4 mb-6 cursor-pointer" onclick="handleAdminClicks()">
        <h1 class="font-luxury text-3xl gold-text tracking-widest uppercase">Fran Cruz</h1>
        <p class="text-[9px] tracking-[0.3em] uppercase opacity-50">El Personaje del Azar</p>
    </header>

    <div class="flex gap-4 mb-6 justify-center flex-wrap">
        <span onclick="setCountry('CR')" id="f-CR" class="flag-btn">🇨🇷</span>
        <span onclick="setCountry('NI')" id="f-NI" class="flag-btn">🇳🇮</span>
        <span onclick="setCountry('PA')" id="f-PA" class="flag-btn">🇵🇦</span>
        <span onclick="setCountry('HN')" id="f-HN" class="flag-btn">🇭🇳</span>
        <span onclick="setCountry('SV')" id="f-SV" class="flag-btn">🇸🇻</span>
        <span onclick="setCountry('GT')" id="f-GT" class="flag-btn">🇬🇹</span>
        <span onclick="setCountry('US')" id="f-US" class="flag-btn">🇺🇸</span>
    </div>

    <div class="payment-card">
        <div class="flex justify-around mb-6 border-b border-white/5">
            <div onclick="setMethod('sinpe')" id="t-sinpe" class="method-tab active">SINPE CR</div>
            <div onclick="setMethod('transfer')" id="t-transfer" class="method-tab">Depósitos</div>
            <div onclick="setMethod('paypal')" id="t-paypal" class="method-tab">PayPal</div>
        </div>

        <div id="content-area" class="text-left">
            <div class="bg-[#111] p-4 rounded-2xl border border-white/5 mb-4">
                <p id="label-top" class="text-[8px] text-gray-500 uppercase mb-1 font-bold">Cargando...</p>
                <p id="main-data" class="text-lg font-bold tracking-widest mb-1">---</p>
                <p id="main-titular" class="text-[10px] gold-text font-bold uppercase tracking-widest">---</p>
            </div>

            <div class="bg-yellow-500/5 p-4 rounded-2xl border border-yellow-500/10">
                <p class="text-[9px] text-gray-500 uppercase mb-1 font-bold">Membresía VIP:</p>
                <p id="display-price" class="text-3xl font-bold text-yellow-500 tracking-tight">---</p>
            </div>
        </div>

        <button class="w-full bg-white text-black font-bold py-4 rounded-2xl uppercase text-[10px] tracking-widest mt-6">Validar Comprobante</button>
    </div>

    <div id="adminModal" class="admin-panel shadow-2xl">
        <h3 class="gold-text font-bold mb-4 uppercase text-center">Panel Maestro</h3>
        
        <label>Titular General</label>
        <input type="text" id="in-titular">
        
        <label>Número SINPE</label>
        <input type="text" id="in-sinpe">
        
        <label>Cuenta IBAN</label>
        <input type="text" id="in-iban">
        
        <label>Correo PayPal</label>
        <input type="text" id="in-paypal">

        <hr class="border-white/10 my-4">
        <p class="text-[10px] text-yellow-500 mb-2 uppercase font-bold">Tipos de Cambio (1 USD = ?)</p>
        
        <label>CRC (Costa Rica)</label>
        <input type="number" id="ex-cr">
        <label>NIO (Nicaragua)</label>
        <input type="number" id="ex-ni">
        <label>GTQ (Guatemala)</label>
        <input type="number" id="ex-gt">
        <label>HNL (Honduras)</label>
        <input type="number" id="ex-hn">

        <button onclick="saveAdminData()" class="w-full bg-yellow-600 text-white p-3 rounded-xl font-bold text-xs mt-2 uppercase">Guardar Cambios</button>
        <button onclick="closeAdmin()" class="w-full text-gray-500 text-[9px] mt-4 uppercase">Cerrar</button>
    </div>

    <script>
        let adminClicks = 0;
        let currentCountry = 'CR';
        let currentMethod = 'sinpe';

        const defaults = {
            titular: "Randall Esteban Sánchez",
            sinpe: "8888-8888",
            iban: "CR00-0000-0000-0000",
            paypal: "pagos@francruzvip.com",
            rates: { CR: 525, NI: 36.5, GT: 7.8, HN: 24.5, SV: 1, PA: 1, US: 1.5 }
        };

        let data = JSON.parse(localStorage.getItem('franCruzMaster')) || defaults;

        const geo = {
            CR: { n: 'Costa Rica', m: 'CRC', s: '₡' },
            NI: { n: 'Nicaragua', m: 'NIO', s: 'C$' },
            PA: { n: 'Panamá', m: 'USD', s: '$' },
            HN: { n: 'Honduras', m: 'HNL', s: 'L' },
            SV: { n: 'El Salvador', m: 'USD', s: '$' },
            GT: { n: 'Guatemala', m: 'GTQ', s: 'Q' },
            US: { n: 'USA', m: 'USD', s: '$' }
        };

        async function init() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const resData = await res.json();
                setCountry(geo[resData.country_code] ? resData.country_code : 'CR');
            } catch { setCountry('CR'); }
        }

        function setCountry(code) {
            currentCountry = code;
            document.querySelectorAll('.flag-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('f-' + code).classList.add('active');
            updateDisplay();
        }

        function setMethod(m) {
            currentMethod = m;
            document.querySelectorAll('.method-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('t-' + m).classList.add('active');
            updateDisplay();
        }

        function updateDisplay() {
            const g = geo[currentCountry];
            const rate = data.rates[currentCountry] || 1;
            
            // Lógica de Precios
            let priceVal = currentCountry === 'SV' ? 1 : (currentCountry === 'US' ? 1.50 : rate);
            document.getElementById('display-price').innerText = g.s + priceVal;

            // Lógica de Contenido
            const label = document.getElementById('label-top');
            const main = document.getElementById('main-data');
            
            if(currentMethod === 'sinpe') {
                label.innerText = "Número SINPE CR:";
                main.innerText = data.sinpe;
            } else if(currentMethod === 'paypal') {
                label.innerText = "Cuenta PayPal:";
                main.innerText = data.paypal;
            } else {
                label.innerText = "Cuenta Interbancaria (IBAN):";
                main.innerText = data.iban;
            }
            document.getElementById('main-titular').innerText = data.titular;
        }

        function handleAdminClicks() {
            adminClicks++;
            if(adminClicks === 5) {
                document.getElementById('adminModal').style.display = 'block';
                document.getElementById('in-titular').value = data.titular;
                document.getElementById('in-sinpe').value = data.sinpe;
                document.getElementById('in-iban').value = data.iban;
                document.getElementById('in-paypal').value = data.paypal;
                document.getElementById('ex-cr').value = data.rates.CR;
                document.getElementById('ex-ni').value = data.rates.NI;
                document.getElementById('ex-gt').value = data.rates.GT;
                document.getElementById('ex-hn').value = data.rates.HN;
            }
            setTimeout(() => { adminClicks = 0; }, 3000);
        }

        function saveAdminData() {
            data = {
                titular: document.getElementById('in-titular').value,
                sinpe: document.getElementById('in-sinpe').value,
                iban: document.getElementById('in-iban').value,
                paypal: document.getElementById('in-paypal').value,
                rates: {
                    CR: parseFloat(document.getElementById('ex-cr').value),
                    NI: parseFloat(document.getElementById('ex-ni').value),
                    GT: parseFloat(document.getElementById('ex-gt').value),
                    HN: parseFloat(document.getElementById('ex-hn').value),
                    SV: 1, PA: 1, US: 1.5
                }
            };
            localStorage.setItem('franCruzMaster', JSON.stringify(data));
            alert("¡Datos y Tipos de Cambio actualizados!");
            location.reload();
        }

        function closeAdmin() { document.getElementById('adminModal').style.display = 'none'; }
        init();
    </script>
</body>
</html>
