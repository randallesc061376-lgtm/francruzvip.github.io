<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRAN CRUZ VIP</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <style>
        :root{--o:#d4af37;--n:#050505;--g:linear-gradient(135deg,#d4af37,#f9e498)}
        body{background:var(--n);color:#fff;font-family:sans-serif;margin:0;text-align:center;user-select:none;overflow-x:hidden}
        header{padding:25px 10px;cursor:pointer}
        .l{color:var(--o);font-size:1.8rem;font-weight:900;letter-spacing:5px}
        .b{display:flex;justify-content:center;gap:8px;margin:15px 0}
        .b img{width:22px;border-radius:2px;cursor:pointer}
        /* Pantallas: La clase 'a' (activa) controla la visibilidad inicial */
        .p{display:none;min-height:100vh;flex-direction:column;align-items:center;padding:15px;box-sizing:border-box}
        .a{display:flex}
        .box{width:100%;max-width:370px;background:rgba(255,255,255,0.03);border:1px solid #222;border-radius:12px;padding:18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;cursor:pointer}
        .s{border-color:var(--o);background:rgba(212,175,55,0.05)}
        .bg{width:100%;max-width:370px;background:var(--g);color:#000;border:none;padding:18px;border-radius:12px;font-weight:900;text-transform:uppercase;cursor:pointer;margin-top:10px}
        .info-pago{width:100%;max-width:370px;background:rgba(255,255,255,0.02);border:1px solid rgba(212,175,55,0.2);border-radius:12px;padding:15px;margin:15px 0;text-align:left;font-size:0.8rem;line-height:1.5}
        .info-pago b{color:var(--o);display:block;margin-top:5px}
        .m{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:var(--n);z-index:9;flex-direction:column;justify-content:center;align-items:center}
    </style>
</head>
<body oncontextmenu="return false">

<header onclick="tAdmin()">
    <div class="l">FRAN CRUZ VIP</div>
    <div class="b" id="bc"></div>
    <p style="color:#555;font-size:.6rem;letter-spacing:2px">SISTEMA REGIONAL PROTEGIDO</p>
</header>

<div id="pantalla-u" class="p a">
    <div id="pc" style="width:100%;max-width:370px">
        <div class="box" onclick="sel(1,this)"><span>Acceso Hoy</span><b id="v1">--</b></div>
        <div class="box" onclick="sel(5,this)"><span>7 Días Silver</span><b id="v7">--</b></div>
        <div class="box s" onclick="sel(15,this)"><span>30 Días Gold</span><b id="v15">--</b></div>
    </div>
    <div class="info-pago">
        <div style="text-align:center;color:var(--o);font-weight:bold;border-bottom:1px solid #333;margin-bottom:10px;padding-bottom:5px">MÉTODOS DE PAGO</div>
        <b>TITULAR:</b> RANDALL SÁNCHEZ C.<br>
        <b>🇨🇷 SINPE MÓVIL:</b> 6453-5475<br>
        <b>🏦 CUENTA IBAN:</b> CR05015114720021020615<br>
        <b>🌐 PAYPAL / CORREO:</b> rsanchez@live.com
    </div>
    <button class="bg" onclick="prot()">ADQUIRIR Y VALIDAR</button>
</div>

<div id="pantalla-l" class="p">
    <h3 style="color:var(--o)">PASSKEY REQUERIDA</h3>
    <input type="password" id="pk" style="padding:15px;background:#111;color:#fff;border:1px solid var(--o);border-radius:10px;text-align:center" placeholder="****">
    <button class="bg" onclick="vPk()">ENTRAR AL PANEL</button>
</div>

<div id="pantalla-ad" class="p">
    <div style="width:100%;max-width:380px">
        <div style="border:1px solid var(--o);padding:20px;border-radius:12px;margin-bottom:15px">
            <input type="file" id="fi" accept="image/*" style="display:none" onchange="document.getElementById('fn').innerText='Imagen: '+this.files[0].name">
            <button class="bg" style="background:#222;color:var(--o);border:1px solid var(--o)" onclick="document.getElementById('fi').click()">ELEGIR LÁMINA</button>
            <p id="fn" style="font-size:.7rem;color:var(--o);margin:10px 0"></p>
            <button class="bg" onclick="sub()">PUBLICAR LÁMINA</button>
        </div>
        <div style="background:rgba(255,255,255,0.02);padding:15px;border-radius:12px">
            <input type="text" id="ub" style="padding:12px;width:80%;border-radius:8px" placeholder="ID CLIENTE (BAN)">
            <div style="display:flex;gap:5px"><button class="bg" style="background:red;color:#fff" onclick="bn(1)">BAN</button><button class="bg" style="background:green;color:#fff" onclick="bn(0)">ALTA</button></div>
        </div>
        <button class="bg" style="background:none;color:#444" onclick="location.reload()">CERRAR SESIÓN</button>
    </div>
</div>

<div id="mo" class="m"><div class="l">VALIDANDO</div><p id="ts" style="color:var(--o);font-size:2rem;margin-top:20px">15s</p></div>

<script>
const cfg={apiKey:"AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE",authDomain:"fran-cruz-sala-vip.firebaseapp.com",projectId:"fran-cruz-sala-vip",storageBucket:"fran-cruz-sala-vip.firebasestorage.app",messagingSenderId:"1022733043010",appId:"1:1022733043010:web:379db18e37bbfde2cf34db"};
firebase.initializeApp(cfg);const db=firebase.firestore(),st=firebase.storage();
let pS=15,ps="CR",cl=0;
const T={"CR":{m:"₡",f:550,c:"cr"},"NI":{m:"C$",f:36.8,c:"ni"},"PA":{m:"$",f:1,c:"pa"},"HN":{m:"L",f:24.7,c:"hn"},"SV":{m:"$",f:1,c:"sv"},"GT":{m:"Q",f:7.8,c:"gt"},"BZ":{m:"BZ$",f:2,c:"bz"}};

function init(){
    const h=document.getElementById('bc');
    Object.keys(T).forEach(k=>{
        const i=document.createElement('img');i.src=`https://flagcdn.com/${T[k].c}.svg`;
        i.onclick=()=>{ps=k;updP();};h.appendChild(i);
    });updP();
}
function updP(){
    const t=T[ps];document.getElementById('v1').innerText=t.m+(1*t.f).toLocaleString();
    document.getElementById('v7').innerText=t.m+(5*t.f).toLocaleString();
    document.getElementById('v15').innerText=t.m+(15*t.f).toLocaleString();
}
function sel(v,e){pS=v;document.querySelectorAll('.box').forEach(x=>x.classList.remove('s'));e.classList.add('s')}
function tAdmin(){cl++;if(cl>=5){vP('pantalla-u','pantalla-l');cl=0}setTimeout(()=>cl=0,3000)}
function vP(o,n){document.getElementById(o).classList.remove('a');document.getElementById(n).classList.add('a')}
function vPk(){if(document.getElementById('pk').value==="ADMIN123")vP('pantalla-l','pantalla-ad');else location.reload()}
function prot(){document.getElementById('mo').style.display='flex';let t=15;const i=setInterval(()=>{t--;document.getElementById('ts').innerText=t+"s";if(t<=0){clearInterval(i);wa()}},1000)}
function wa(){const t=T[ps],m=(pS*t.f).toLocaleString(),h=new Date().getDate().toString().padStart(2,'0');location.href=`https://wa.me/50664535475?text=Plan:${pS}d-Monto:${t.m}${m}-ID:93${h}`;}

// FUNCIÓN DE SUBIDA CORREGIDA
async function sub(){
    const f=document.getElementById('fi').files[0];if(!f)return alert("Primero elige una imagen");
    const r=st.ref('galeria/'+Date.now()+'_'+f.name);await r.put(f);
    const u=await r.getDownloadURL();await db.collection("galeria").add({url:u,fecha:firebase.firestore.FieldValue.serverTimestamp()});
    alert("LÁMINA PUBLICADA CON ÉXITO");location.reload();
}
async function bn(s){const i=document.getElementById('ub').value;if(i){await db.collection("baneos").doc(i).set({baneado:!!s});alert("OK");}}
init();
</script>
</body>
</html>
