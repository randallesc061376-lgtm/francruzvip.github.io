<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRAN CRUZ VIP</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <style>
        :root{--o:#d4af37;--n:#050505;--g:linear-gradient(135deg,#d4af37,#f9e498)}
        body{background:var(--n);color:#fff;font-family:'Segoe UI',sans-serif;margin:0;display:flex;flex-direction:column;align-items:center;user-select:none;overflow-x:hidden}
        
        header{padding:30px 10px;width:100%;max-width:400px;text-align:center;box-sizing:border-box}
        .l{color:var(--o);font-size:2.1rem;font-weight:900;letter-spacing:6px;text-transform:uppercase;display:block;width:100%}
        
        .b{display:flex;justify-content:center;gap:10px;margin:20px 0}
        .b img{width:24px;border-radius:2px;cursor:pointer}
        .p{display:none;width:100%;max-width:390px;flex-direction:column;align-items:center;padding:0 20px 30px;box-sizing:border-box}
        .a{display:flex} /* ESTA CLASE ES LA QUE ACTIVA LA VISIBILIDAD */
        
        .box{width:100%;background:rgba(255,255,255,0.03);border:1px solid #222;border-radius:12px;padding:20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;box-sizing:border-box}
        .s{border-color:var(--o);background:rgba(212,175,55,0.05)}
        .bg{width:100%;background:var(--g);color:#000;border:none;padding:20px;border-radius:12px;font-weight:900;text-transform:uppercase;letter-spacing:1px;cursor:pointer;margin-top:10px}
        
        .info-pago{width:100%;background:rgba(255,255,255,0.02);border:1px solid rgba(212,175,55,0.25);border-radius:15px;padding:25px;margin:15px 0;box-sizing:border-box;text-align:center}
        .info-pago h4{color:var(--o);margin:0;letter-spacing:2px;font-size:0.9rem;text-transform:uppercase}
        .info-pago span.sub{display:block;color:var(--o);font-size:0.7rem;letter-spacing:1px;margin-bottom:20px}
        
        .admin-section{width:100%;background:rgba(255,255,255,0.05);border:1px solid #333;border-radius:15px;padding:20px;margin-bottom:15px;box-sizing:border-box}
        .inp-admin{width:100%;padding:15px;background:#111;border:1px solid var(--o);border-radius:10px;color:#fff;text-align:center;margin-bottom:10px;box-sizing:border-box}
        .toast{position:fixed;top:20px;background:var(--o);color:#000;padding:10px 20px;border-radius:20px;font-size:0.8rem;font-weight:bold;display:none;z-index:1000}
    </style>
</head>
<body>

<div id="toast" class="toast">COPIADO</div>

<header onclick="tAdmin()">
    <div class="l">FRAN CRUZ VIP</div>
    <div class="b" id="bc"></div>
    <p style="color:#444;font-size:.6rem;letter-spacing:3px;margin:0;text-transform:uppercase">Sistema Regional Protegido</p>
</header>

<div id="p-user" class="p a">
    <div class="box" onclick="sel(1,this)"><span>Acceso Hoy</span><b id="v1">--</b></div>
    <div class="box" onclick="sel(5,this)"><span>7 Días Silver</span><b id="v7">--</b></div>
    <div class="box s" onclick="sel(15,this)"><span>30 Días Gold</span><b id="v15">--</b></div>

    <div class="info-pago">
        <h4>METODOS DE PAGO</h4>
        <span class="sub">TOCA PARA COPIAR</span>
        <div style="cursor:pointer" onclick="copy('Randall Sánchez C.')"><b style="color:var(--o);font-size:.7rem">TITULAR</b><p>Randall Sánchez C.</p></div>
        <div style="cursor:pointer" onclick="copy('70835833')"><b style="color:var(--o);font-size:.7rem">SINPE MÓVIL</b><p>70835833</p></div>
    </div>
    <button class="bg" onclick="wa()">ENVIAR COMPROBANTE DE PAGO</button>
</div>

<div id="p-login" class="p">
    <h3 style="color:var(--o);letter-spacing:4px">PANEL DE CONTROL MAESTRO</h3>
    <input type="password" id="pk" class="inp-admin" placeholder="PASSKEY">
    <button class="bg" onclick="vPk()">ACCEDER AL PANEL</button>
</div>

<div id="p-admin" class="p">
    <div class="admin-section">
        <input type="file" id="fi" accept="image/*" style="display:none" onchange="document.getElementById('fn').innerText='Imagen lista'">
        <button class="bg" style="background:#222;color:var(--o);border:1px solid var(--o)" onclick="document.getElementById('fi').click()">ELEGIR FOTO</button>
        <p id="fn" style="font-size:.7rem;color:var(--o);margin:10px 0;text-align:center"></p>
        <button class="bg" onclick="sub()">PUBLICAR LÁMINA</button>
    </div>
    <div class="admin-section">
        <input type="text" id="ub" class="inp-admin" placeholder="UID DEL CLIENTE">
        <div style="display:flex;gap:10px">
            <button class="bg" style="background:#800;color:#fff" onclick="bn(1)">BAN</button>
            <button class="bg" style="background:#060;color:#fff" onclick="bn(0)">ALTA</button>
        </div>
    </div>
    <button class="bg" style="background:none;color:#555;border:1px solid #222" onclick="location.reload()">CERRAR SESIÓN</button>
</div>

<script>
const cfg={apiKey:"AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE",authDomain:"fran-cruz-sala-vip.firebaseapp.com",projectId:"fran-cruz-sala-vip",storageBucket:"fran-cruz-sala-vip.firebasestorage.app",messagingSenderId:"1022733043010",appId:"1:1022733043010:web:379db18e37bbfde2cf34db"};
firebase.initializeApp(cfg);const db=firebase.firestore(),st=firebase.storage();

let pS=15,ps="CR",cl=0;
const T={"CR":{m:"₡",f:550,c:"cr"},"NI":{m:"C$",f:36.8,c:"ni"},"PA":{m:"$",f:1,c:"pa"},"HN":{m:"L",f:24.7,c:"hn"},"SV":{m:"$",f:1,c:"sv"},"GT":{m:"Q",f:7.8,c:"gt"},"BZ":{m:"BZ$",f:2,c:"bz"}};

function init(){
    const h=document.getElementById('bc');
    Object.keys(T).forEach(k=>{
        const i=document.createElement('img');i.src=`https://flagcdn.com/${T[k].c}.svg`;
        i.onclick=()=>{ps=k;updP();};h.appendChild(i);
    });updP();
}
function updP(){
    const t=T[ps];document.getElementById('v1').innerText=t.m+(1*t.f).toLocaleString();
    document.getElementById('v7').innerText=t.m+(5*t.f).toLocaleString();
    document.getElementById('v15').innerText=t.m+(15*t.f).toLocaleString();
}
function sel(v,e){pS=v;document.querySelectorAll('.box').forEach(x=>x.classList.remove('s'));e.classList.add('s')}

// ACTIVACIÓN DEL PANEL
function tAdmin(){cl++;if(cl>=5){vP('p-user','p-login');cl=0}setTimeout(()=>cl=0,3000)}
function vP(o,n){document.getElementById(o).classList.remove('a');document.getElementById(n).classList.add('a')}

// CORRECCIÓN CRÍTICA DE ENTRADA
function vPk(){
    if(document.getElementById('pk').value==="ADMIN123"){
        vP('p-login','p-admin'); // ESTO CAMBIA LAS PANTALLAS REALMENTE
    } else {
        alert("Clave incorrecta");
        location.reload();
    }
}

function copy(txt){
    const el=document.createElement('textarea');el.value=txt;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);
    const t=document.getElementById('toast');t.style.display='block';setTimeout(()=>t.style.display='none',1500);
}

function wa(){
    const t=T[ps],m=(pS*t.f).toLocaleString(),hoy=new Date().getDate().toString().padStart(2,'0');
    const uidTemp=Math.random().toString(36).substring(2,5).toUpperCase();
    const claveDinamica=uidTemp+hoy;
    const msg=`Buen día. He seleccionado el Plan de ${pS} días (${t.m}${m}). Adjunto envío mi comprobante de pago oficial para activación inmediata.\n\nID: ${claveDinamica}`;
    window.location.href=`https://api.whatsapp.com/send?phone=50670835833&text=${encodeURIComponent(msg)}`;
}

async function sub(){
    const f=document.getElementById('fi').files[0];if(!f)return;
    const r=st.ref('galeria/'+Date.now()+'_'+f.name);await r.put(f);
    const u=await r.getDownloadURL();await db.collection("galeria").add({url:u,fecha:firebase.firestore.FieldValue.serverTimestamp()});
    alert("PUBLICADO");location.reload();
}
async function bn(s){const i=document.getElementById('ub').value;if(i){await db.collection("baneos").doc(i).set({baneado:!!s});alert("EJECUTADO");}}
init();
</script>
</body>
</html>
