<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Fran Cruz VIP</title><script src="https://cdn.tailwindcss.com"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script><style>body{background:#000;color:#fff;font-family:sans-serif;user-select:none}.gold{color:#d4af37}.btn-gold{background:#d4af37;color:#000;padding:18px;width:100%;border-radius:20px;font-weight:800;text-transform:uppercase}input{outline:none}#admin-panel{display:none;position:fixed;inset:0;background:#000;z-index:999;padding:20px;overflow-y:auto}.plan-card{background:#0a0a0a;border:1px solid #1a1a1a;padding:15px;border-radius:20px;cursor:pointer}.plan-card.active{border-color:#d4af37;background:#120f05}#loader-v{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:10000;flex-direction:column;align-items:center;justify-content:center}.spinner{width:50px;height:50px;border:5px solid #d4af37;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}</style></head><body>
<div id="loader-v"><div class="spinner mb-6"></div><p id="load-msg" class="gold font-bold text-[10px] uppercase tracking-widest text-center px-10"></p></div>
<header class="text-center pt-8"><h1 onclick="handleAdmin()" class="text-4xl font-black gold tracking-tighter cursor-pointer">FRAN CRUZ</h1><p id="head-id" class="text-[9px] opacity-20 font-mono mt-1 uppercase"></p></header>
<div id="app" class="p-4 max-w-sm mx-auto"><div id="main-ui">
    <div class="flex justify-center flex-wrap gap-3 mb-6 opacity-60">
        <span onclick="setLoc('CR')" class="cursor-pointer text-xl">🇨🇷</span><span onclick="setLoc('PA')" class="cursor-pointer text-xl">🇵🇦</span><span onclick="setLoc('NI')" class="cursor-pointer text-xl">🇳🇮</span><span onclick="setLoc('GT')" class="cursor-pointer text-xl">🇬🇹</span><span onclick="setLoc('HN')" class="cursor-pointer text-xl">🇭🇳</span><span onclick="setLoc('SV')" class="cursor-pointer text-xl">🇸🇻</span><span onclick="setLoc('BZ')" class="cursor-pointer text-xl">🇧🇿</span>
    </div>
    <div class="space-y-3 mb-6">
        <div onclick="setPlan(1,1)" id="p-1" class="plan-card active"><p class="text-[10px] opacity-50 uppercase">Acceso Hoy</p><p class="gold font-bold">$1.00 <span class="local-p"></span></p></div>
        <div onclick="setPlan(7,5)" id="p-7" class="plan-card"><p class="text-[10px] opacity-50 uppercase">Acceso 7 Días</p><p class="gold font-bold">$5.00 <span class="local-p"></span></p></div>
        <div onclick="setPlan(30,15)" id="p-30" class="plan-card"><p class="text-[10px] opacity-50 uppercase">Acceso 30 Días</p><p class="gold font-bold">$15.00 <span class="local-p"></span></p></div>
    </div>
    <div class="bg-[#0a0a0a] border border-white/5 p-6 rounded-[35px] text-center mb-6">
        <div class="flex text-[10px] font-bold uppercase mb-4 opacity-40 border-b border-white/5 pb-2"><span onclick="setMet('SINPE')" id="m-SINPE" class="flex-1 gold">SINPE</span><span onclick="setMet('IBAN')" id="m-IBAN" class="flex-1">IBAN</span><span onclick="setMet('PAYPAL')" id="m-PAYPAL" class="flex-1">PAYPAL</span></div>
        <div class="mb-4"><p class="text-[10px] gold font-bold uppercase mb-1">Titular: Randall Sánchez C.</p><p id="pay-info" class="text-xs font-mono uppercase text-white/80">SINPE: 7083-5833</p></div>
        <button onclick="startSecurityProtocol()" class="btn-gold mb-4">Validar Comprobante</button>
        <input type="text" id="key-in" placeholder="CLAVE DE ACCESO" class="w-full bg-black p-4 rounded-2xl border border-white/10 text-center font-bold mb-3 uppercase gold">
        <button onclick="checkKey()" class="text-[10px] opacity-30 uppercase font-bold underline">Activar Membresía</button>
    </div>
</div>
<div id="vip-ui" class="hidden"><div id="status-bar" class="bg-green-900/20 border border-green-500/30 p-4 rounded-2xl text-green-500 text-[10px] font-bold text-center mb-6 uppercase">Acceso VIP Activo</div><div id="gallery" class="space-y-4"></div><button onclick="logout()" class="w-full mt-8 text-[9px] opacity-20 uppercase font-bold">Cerrar Sesión</button></div></div>
<div id="admin-panel"><h2 class="gold font-bold mb-4 uppercase text-sm">Panel Maestro</h2><div class="grid grid-cols-2 gap-2 mb-4"><button onclick="document.getElementById('up-v').click()" class="bg-white/10 p-4 rounded-xl text-[10px] font-bold uppercase">Subir Fotos</button><button onclick="clearAll()" class="bg-red-900/20 text-red-500 p-4 rounded-xl text-[10px] font-bold uppercase">Borrar Todo</button></div><input type="file" id="up-v" accept="image/*" multiple class="hidden" onchange="upV(this)"><div id="adm-gal" class="grid grid-cols-4 gap-2 mb-6"></div><button onclick="closeAdmin()" class="w-full py-4 text-xs opacity-50 border border-white/10 rounded-xl uppercase">Salir</button></div>
<script>
let storage, db_fire, curD=1, adC=0, curR=525, curS='₡'; const rates={CR:525,PA:1,NI:36.5,GT:7.8,HN:24.7,SV:1,BZ:2}, syms={CR:'₡',PA:'$',NI:'C$',GT:'Q',HN:'L',SV:'$',BZ:'BZ$'};
const uid=localStorage.getItem('fc_id')||"UID-"+Math.random().toString(36).substr(2,6).toUpperCase();
localStorage.setItem('fc_id',uid); document.getElementById('head-id').innerText=uid;

function startSecurityProtocol(){
    const l=document.getElementById('loader-v'), t=document.getElementById('load-msg');
    const msgs=["Iniciando escaneo de seguridad...","Analizando metadatos de imagen...","Verificando integridad de píxeles...","Extrayendo geolocalización de pago...","Generando clave dinámica segura...","Protocolo Finalizado con éxito."];
    l.style.display='flex'; let i=0;
    const iv=setInterval(()=>{ t.innerText=msgs[i]; i++; if(i>=msgs.length){ clearInterval(iv); sendToWA(); } }, 2500);
}

function sendToWA(){
    const date=new Date(); const key=uid.slice(-2)+date.getDate().toString().padStart(2,'0');
    const msg=`Hola Fran Cruz VIP. Comprobante ID: ${uid}. Clave Generada para hoy: ${key}. Pago por plan de ${curD} días.`;
    window.open(`https://wa.me/50664535475?text=${encodeURIComponent(msg)}`);
    setTimeout(()=>document.getElementById('loader-v').style.display='none', 1000);
}

const firebaseConfig={apiKey:"AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE",authDomain:"fran-cruz-sala-vip.firebaseapp.com",projectId:"fran-cruz-sala-vip",storageBucket:"fran-cruz-sala-vip.firebasestorage.app",messagingSenderId:"1022733043010",appId:"1:1022733043010:web:379db18e37bbfde2cf34db"};

function initFirebase(){ firebase.initializeApp(firebaseConfig); storage=firebase.storage(); db_fire=firebase.firestore(); checkExp(); checkBanStatus(); }
function setLoc(c){curR=rates[c];curS=syms[c];updateUI();}
function setPlan(d,p){curD=d;document.querySelectorAll('.plan-card').forEach(c=>c.classList.remove('active'));document.getElementById('p-'+d).classList.add('active');}
function updateUI(){document.querySelectorAll('.local-p').forEach((el,i)=>{const p=[1,5,15]; el.innerText=`(${curS}${Math.round(p[i]*curR).toLocaleString()})`;});}
function setMet(m){
    const i=document.getElementById('pay-info'); document.querySelectorAll('[id^="m-"]').forEach(el=>el.classList.remove('gold')); document.getElementById('m-'+m).classList.add('gold');
    if(m==='SINPE')i.innerText='SINPE: 7083-5833'; else if(m==='IBAN')i.innerText='IBAN: CR80080315001000035641'; else i.innerText='PayPal: randallesc061376@gmail.com';
}
function checkKey(){
    const k=uid.slice(-2)+new Date().getDate().toString().padStart(2,'0');
    if(document.getElementById('key-in').value.toUpperCase()===k){
        let ex=new Date(); ex.setDate(ex.getDate()+(curD-1)); ex.setHours(23,59,59,999);
        localStorage.setItem('fc_exp',ex.getTime()); location.reload();
    }else alert("Clave inválida");
}
function checkExp(){const ex=localStorage.getItem('fc_exp');if(ex&&new Date().getTime()<ex){document.getElementById('main-ui').classList.add('hidden');document.getElementById('vip-ui').classList.remove('hidden');loadGal();}}
function checkBanStatus(){db_fire.collection("banlist").doc(uid).get().then(doc=>{if(doc.exists&&doc.data().active)document.body.innerHTML='<div style="background:#000;color:red;height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;font-weight:bold;padding:20px;text-transform:uppercase">Acceso restringido.</div>';});}
function handleAdmin(){adC++;if(adC>=5){const p=prompt("PIN:");if(p===(localStorage.getItem('fc_pin')||'1234'))document.getElementById('admin-panel').style.display='block';adC=0;}setTimeout(()=>adC=0,3000);}
function loadGal(){ db_fire.collection("laminas").orderBy("date","desc").onSnapshot(snap=>{ document.getElementById('gallery').innerHTML=snap.docs.map(d=>`<img src="${d.data().url}" class="w-full rounded-3xl mb-4 shadow-lg shadow-white/5">`).join(''); });}
function upV(input){ Array.from(input.files).forEach(file=>{ const ref=storage.ref('fotos/'+file.name); ref.put(file).then(()=>{ ref.getDownloadURL().then(url=>{ db_fire.collection("laminas").add({url:url,name:file.name,date:Date.now()}); }); }); }); }
function closeAdmin(){document.getElementById('admin-panel').style.display='none';}
function logout(){localStorage.removeItem('fc_exp');location.reload();}
initFirebase(); updateUI();
</script></body></html>
