<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRAN CRUZ VIP | Membresías</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --oro: #d4af37; --negro: #050505; --oro-grad: linear-gradient(135deg, #d4af37, #f9e498); }
        body { background: var(--negro); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        
        header { padding: 30px 0; }
        .logo { color: var(--oro); font-size: 2.2rem; font-weight: 900; letter-spacing: 6px; margin: 0; }
        .tagline { color: #666; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; }

        .contenedor-planes { display: flex; flex-direction: column; gap: 20px; align-items: center; margin-top: 30px; }
        .card-plan { 
            width: 90%; max-width: 350px; background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(212,175,55,0.2); border-radius: 20px; padding: 25px;
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .card-plan.popular { border-color: var(--oro); box-shadow: 0 0 20px rgba(212,175,55,0.1); }
        
        .plan-nombre { color: var(--oro); font-size: 1.5rem; font-weight: 800; margin-bottom: 10px; }
        .plan-precio { font-size: 2rem; font-weight: 900; margin-bottom: 20px; }
        
        .selector-pais { 
            background: #111; border: 1px solid var(--oro); color: #fff; 
            padding: 10px; border-radius: 10px; width: 100%; margin-bottom: 20px; font-size: 1rem;
        }

        .btn-comprar { 
            width: 100%; background: var(--oro-grad); color: #000; border: none; 
            padding: 18px; border-radius: 12px; font-weight: 900; font-size: 1rem; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }

        /* Modal de Validación (Protocolo 15s) */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--negro); z-index: 1000; flex-direction: column; justify-content: center; align-items: center;
        }
        .scanner { width: 80%; height: 4px; background: var(--oro); box-shadow: 0 0 15px var(--oro); position: relative; animation: scan 2s infinite; }
        @keyframes scan { 0%, 100% { top: -20px; } 50% { top: 20px; } }
    </style>
</head>
<body>

<header>
    <h1 class="logo">FRAN CRUZ</h1>
    <p class="tagline">PANEL DE MEMBRESÍAS VIP</p>
</header>

<select id="pais-master" class="selector-pais" onchange="actualizarPrecios()">
    <option value="CR">🇨🇷 Costa Rica (CRC)</option>
    <option value="NI">🇳🇮 Nicaragua (NIO)</option>
    <option value="US">🇺🇸 Otros Países (USD)</option>
</select>

<div class="contenedor-planes">
    <div class="card-plan">
        <div class="plan-nombre">ACCESO 24H</div>
        <div class="plan-precio" id="precio-bronce">$5.00</div>
        <button class="btn-comprar" onclick="procesarPago('BRONCE', 5)">ADQUIRIR YA</button>
    </div>

    <div class="card-plan popular">
        <div class="plan-nombre">GOLD MENSUAL</div>
        <div class="plan-precio" id="precio-gold">$15.00</div>
        <button class="btn-comprar" onclick="procesarPago('GOLD', 15)">ADQUIRIR YA</button>
    </div>

    <div class="card-plan">
        <div class="plan-nombre">VIP ANUAL</div>
        <div class="plan-precio" id="precio-vip">$50.00</div>
        <button class="btn-comprar" onclick="procesarPago('VIP', 50)">ADQUIRIR YA</button>
    </div>
</div>

<div id="modal-espera" class="modal">
    <div class="logo" style="margin-bottom: 50px;">VALIDANDO SISTEMA</div>
    <div class="scanner"></div>
    <p style="margin-top: 40px; letter-spacing: 2px; color: var(--oro);" id="timer-text">INICIANDO PROTOCOLO (15s)...</p>
</div>

<script>
// Tasas de conversión corregidas para Centroamérica
const TASAS = {
    "CR": { moneda: "₡", factor: 510, nombre: "Costa Rica" },
    "NI": { moneda: "C$", factor: 36.5, nombre: "Nicaragua" },
    "US": { moneda: "$", factor: 1, nombre: "Internacional" }
};

function actualizarPrecios() {
    const pais = document.getElementById('pais-master').value;
    const t = TASAS[pais];
    
    document.getElementById('precio-bronce').innerText = `${t.moneda}${(5 * t.factor).toLocaleString()}`;
    document.getElementById('precio-gold').innerText = `${t.moneda}${(15 * t.factor).toLocaleString()}`;
    document.getElementById('precio-vip').innerText = `${t.moneda}${(50 * t.factor).toLocaleString()}`;
}

function procesarPago(plan, baseUsd) {
    const pais = document.getElementById('pais-master').value;
    const t = TASAS[pais];
    const totalFinal = (baseUsd * t.factor).toLocaleString();
    const moneda = t.moneda;

    // Mostrar Animación de Seguridad (Reducida a 15s por instrucción previa)
    document.getElementById('modal-espera').style.display = 'flex';
    let tiempo = 15;
    
    const count = setInterval(() => {
        tiempo--;
        document.getElementById('timer-text').innerText = `VERIFICANDO TRANSACCIÓN (${tiempo}s)...`;
        if(tiempo <= 0) {
            clearInterval(count);
            enviarWhatsApp(plan, totalFinal, moneda);
        }
    }, 1000);
}

function enviarWhatsApp(plan, monto, moneda) {
    // Cálculo de Clave Dinámica: Últimos 2 del ID (simulado) + 2 dígitos del día
    const hoy = new Date().getDate().toString().padStart(2, '0');
    const idSimulado = "88"; // Esto debería venir del UID del cliente
    const claveDinamica = idSimulado + hoy;

    const mensaje = `Hola Fran Cruz VIP. Deseo activar mi plan ${plan}.%0A%0A` +
                    `Monto: ${moneda}${monto}%0A` +
                    `ID Validación: ${claveDinamica}%0A%0A` +
                    `Adjunto mi comprobante de pago.`;
    
    window.location.href = `https://wa.me/50688888888?text=${mensaje}`; 
}

// Iniciar con precios actualizados
actualizarPrecios();
</script>
</body>
</html>
