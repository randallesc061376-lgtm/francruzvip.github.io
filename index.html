<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRAN CRUZ VIP • PLATINUM FINAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <style>
        :root { --o: #d4af37; --n: #050505; --g: linear-gradient(180deg, #f9e498, #d4af37); --r: #ff4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: var(--n); color: #fff; margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        header { padding: 30px 20px; text-align: center; cursor: pointer; border-bottom: 1px solid #111; }
        .logo { color: var(--o); font-size: 2rem; font-weight: 900; letter-spacing: 4px; }
        
        .view { display: none; width: 100%; max-width: 420px; margin: auto; flex-direction: column; padding-bottom: 50px; animation: fadeIn 0.3s; }
        .view.active { display: flex; }

        /* Menú Principal */
        .geo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px; padding: 10px; background: #0f0f0f; border-radius: 15px; }
        .flag { width: 100%; height: 25px; opacity: 0.4; border-radius: 4px; cursor: pointer; object-fit: cover; }
        .flag.active { opacity: 1; border: 1px solid var(--o); box-shadow: 0 0 10px var(--o); }
        
        .card { background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 12px; padding: 18px; margin: 0 20px 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .card.sel { border: 1px solid var(--o); background: rgba(212,175,55,0.08); }
        .card b { color: var(--o); font-size: 1.2rem; }

        .acc-item { border: 1px solid #1a1a1a; border-radius: 10px; margin: 0 20px 8px; overflow: hidden; }
        .acc-head { background: #111; padding: 15px; font-size: 0.8rem; font-weight: bold; color: #888; cursor: pointer; display: flex; justify-content: space-between; }
        .acc-body { display: none; background: #080808; padding: 15px; border-top: 1px solid #1a1a1a; text-align: center; }
        .acc-body.active { display: block; }
        
        .copy-box { background: #111; padding: 12px; border-radius: 8px; margin: 8px 0; font-family: monospace; color: var(--o); cursor: pointer; border: 1px dashed #333; }
        
        .btn-gold { width: calc(100% - 40px); background: var(--g); color: #000; border: none; padding: 20px; border-radius: 14px; font-weight: 900; margin: 15px 20px; cursor: pointer; text-transform: uppercase; }
        
        /* Botón "Ya tengo mi clave" elegante */
        .btn-outline { width: calc(100% - 40px); background: transparent; color: #555; border: 1px solid #222; padding: 15px; border-radius: 12px; font-weight: 700; margin: 5px 20px; cursor: pointer; font-size: 0.75rem; letter-spacing: 1px; }

        /* Panel Admin */
        .adm-container { padding: 20px; }
        .adm-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .adm-label { font-size: 0.75rem; color: var(--o); font-weight: 800; text-transform: uppercase; margin-bottom: 10px; display: block; letter-spacing: 1px; }
        .adm-input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 0.9rem; }

        .user-row { background: #000; border: 1px solid #222; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .badge { font-size: 0.6rem; padding: 3px 7px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .badge.wait { background: var(--o); color: #000; }
        .badge.active { background: #2ecc71; color: #fff; }
        .badge.ban { background: var(--r); color: #fff; }

        .btn-action { border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
        .btn-approve { background: #2ecc71; color: #fff; }
        .btn-ban { background: var(--r); color: #fff; margin-left: 5px; }

        /* Pantallas de Estado */
        .status-msg { text-align: center; padding: 40px 20px; }
        .status-msg h2 { color: var(--o); font-size: 1.8rem; margin-bottom: 10px; }
        .status-msg p { color: #888; line-height: 1.6; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body oncontextmenu="return false;">

<header onclick="adminAccess()">
    <div class="logo">FRAN CRUZ VIP</div>
    <div id="tagline" style="font-size: 0.7rem; color: #555; letter-spacing: 2px;">SALA PRIVADA • COSTA RICA</div>
</header>

<div id="v-client" class="view active">
    <div class="geo-grid">
        <img src="https://flagcdn.com/cr.svg" class="flag active" onclick="setLoc('COSTA RICA', '₡', 540)">
        <img src="https://flagcdn.com/ni.svg" class="flag" onclick="setLoc('NICARAGUA', 'C$', 37)">
        <img src="https://flagcdn.com/pa.svg" class="flag" onclick="setLoc('PANAMÁ', '$', 1)">
        <img src="https://flagcdn.com/hn.svg" class="flag" onclick="setLoc('HONDURAS', 'L', 24.6)">
        <img src="https://flagcdn.com/sv.svg" class="flag" onclick="setLoc('EL SALVADOR', '$', 1)">
        <img src="https://flagcdn.com/gt.svg" class="flag" onclick="setLoc('GUATEMALA', 'Q', 7.7)">
        <img src="https://flagcdn.com/bz.svg" class="flag" onclick="setLoc('BELICE', 'BZ$', 2)">
        <img src="https://flagcdn.com/un.svg" class="flag" onclick="setLoc('WORLDWIDE', '$', 1)">
    </div>
    
    <div class="card" onclick="selP(this, 'HOY', 1)"><span>ACCESO HOY</span><b class="p-val">₡540</b></div>
    <div class="card" onclick="selP(this, '7 DÍAS SILVER', 5)"><span>7 DÍAS SILVER</span><b class="p-val">₡2,700</b></div>
    <div class="card sel" onclick="selP(this, '30 DÍAS GOLD', 20)"><span>30 DÍAS GOLD</span><b class="p-val">₡10,800</b></div>
    
    <div class="acc-item">
        <div class="acc-head" onclick="toggleAcc(this)">1. SINPE MÓVIL / GRUPO MUTUAL <span>▼</span></div>
        <div class="acc-body active">
            <div class="copy-box" onclick="copy('70835833')">70835833</div>
            <div class="copy-box" onclick="copy('CR80080315001000035641')">CR80...641</div>
        </div>
    </div>
    
    <div class="acc-item">
        <div class="acc-head" onclick="toggleAcc(this)">2. PAYPAL <span>▼</span></div>
        <div class="acc-body">
            <div class="copy-box" onclick="copy('randallesc061376@gmail.com')">randallesc061376@gmail.com</div>
        </div>
    </div>

    <button class="btn-gold" onclick="requestAccess()">SOLICITAR ACCESO VIP</button>
    <button class="btn-outline" onclick="checkKey()">YA TENGO MI CLAVE</button>
</div>

<div id="v-status" class="view">
    <div id="status-content" class="status-msg"></div>
    <button class="btn-gold" onclick="location.reload()">VOLVER AL INICIO</button>
</div>

<div id="v-admin" class="view">
    <div class="adm-container">
        <div class="adm-card">
            <span class="adm-label">Validación de Pagos</span>
            <div id="admin-user-list"><p style="font-size:0.7rem; color:#444">Sin solicitudes...</p></div>
        </div>
        <div class="adm-card">
            <span class="adm-label">Tipos de Cambio</span>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                <div><small style="font-size:8px">₡ CR</small><input type="number" id="rate-cr" class="adm-input" value="540"></div>
                <div><small style="font-size:8px">C$ NI</small><input type="number" id="rate-ni" class="adm-input" value="37"></div>
            </div>
            <button class="btn-gold" style="margin:0; width:100%; height:45px" onclick="saveRates()">ACTUALIZAR</button>
        </div>
        <button class="btn-gold" style="background:#222; color:#fff" onclick="location.reload()">CERRAR PANEL</button>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE", 
        projectId: "fran-cruz-sala-vip",
        databaseURL: "https://fran-cruz-sala-vip-default-rtdb.firebaseio.com",
        storageBucket: "fran-cruz-sala-vip.firebasestorage.app" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let curTasa = 540, curSim = "₡", curP = "30 DÍAS GOLD", clicks = 0;
    let masterKey = "1376";
    let myID = localStorage.getItem('fc_id') || 'UID-' + Math.random().toString(36).substr(2, 6).toUpperCase();
    localStorage.setItem('fc_id', myID);

    // Monitoreo de estado del usuario actual
    db.ref('users/' + myID).on('value', ss => {
        const user = ss.val();
        if(user) {
            if(user.status === 'wait') showStatus('wait');
            else if(user.status === 'active') showStatus('active');
            else if(user.status === 'ban') showStatus('ban');
        }
    });

    function showStatus(type) {
        const cont = document.getElementById('status-content');
        const vClient = document.getElementById('v-client');
        const vStatus = document.getElementById('v-status');
        
        vClient.classList.remove('active');
        vStatus.classList.add('active');

        if(type === 'wait') {
            cont.innerHTML = `<h2>VALIDANDO PAGO</h2><p>Estamos procesando tu transacción con absoluta confianza. Nuestro equipo está trabajando para darte acceso de inmediato. Por favor, no cierres esta ventana.</p>`;
        } else if(type === 'active') {
            cont.innerHTML = `<h2 style="color:#2ecc71">¡FELICIDADES!</h2><p>Tu acceso a la **SALA VIP** ha sido validado con éxito. Bienvenido a la experiencia más exclusiva de Fran Cruz. Disfruta del contenido.</p>`;
        } else if(type === 'ban') {
            cont.innerHTML = `<h2 style="color:var(--r)">ACCESO DENEGADO</h2><p>Tu cuenta ha sido restringida por seguridad. Contacta a soporte si crees que esto es un error.</p>`;
        }
    }

    function requestAccess() {
        // Generar Clave Dinámica: 2 letras del ID + fecha
        const date = new Date().getDate().toString().padStart(2, '0');
        const dynamicKey = myID.substring(4, 6) + date;
        const total = document.querySelector('.card.sel b').innerText;

        db.ref('users/' + myID).set({
            id: myID, 
            status: 'wait', 
            plan: curP, 
            key: dynamicKey, 
            cost: total,
            time: Date.now()
        });

        const msg = `Hola Fran Cruz! Solicito acceso VIP.\n\n🏆 PLAN: ${curP}\n💰 COSTO: ${total}\n🆔 MI ID: ${myID}\n🔑 CLAVE DINÁMICA: ${dynamicKey}\n\nEspero tu validación para entrar a la sala.`;
        window.location.href = `https://wa.me/50664535475?text=${encodeURIComponent(msg)}`;
    }

    function loadAdminData() {
        db.ref('users').on('value', ss => {
            const list = document.getElementById('admin-user-list');
            list.innerHTML = "";
            ss.forEach(u => {
                const user = u.val();
                list.innerHTML += `<div class="user-row">
                    <div><b style="font-size:0.7rem">${user.id}</b><br><small style="color:var(--o)">${user.plan} - ${user.cost}</small></div>
                    <div>
                        <button class="btn-action btn-approve" onclick="updateStatus('${user.id}', 'active')">✓</button>
                        <button class="btn-action btn-ban" onclick="updateStatus('${user.id}', 'ban')">X</button>
                    </div>
                </div>`;
            });
        });
    }

    function updateStatus(id, stat) { db.ref('users/' + id).update({status: stat}); }

    function adminAccess() {
        clicks++;
        if(clicks >= 5) {
            if(prompt("KEYPASS ADMIN:") === masterKey) {
                document.getElementById('v-client').classList.remove('active');
                document.getElementById('v-admin').classList.add('active');
                loadAdminData();
            }
            clicks = 0;
        }
        setTimeout(() => clicks = 0, 2000);
    }

    function checkKey() { 
        const k = prompt("INGRESA TU CLAVE DINÁMICA:");
        if(k) alert("Validando clave con el servidor...");
    }

    // Funciones Base (Intocables)
    function setLoc(n, s, t) {
        curTasa = t; curSim = s;
        document.getElementById('tagline').innerText = `SALA PRIVADA • ${n}`;
        document.querySelectorAll('.flag').forEach(f => f.classList.remove('active'));
        event.target.classList.add('active');
        updatePrices();
    }
    function updatePrices() {
        const base = [1, 5, 20];
        document.querySelectorAll('.p-val').forEach((el, i) => {
            el.innerText = curSim + Math.round(base[i] * curTasa).toLocaleString();
        });
    }
    function selP(el, p) {
        curP = p;
        document.querySelectorAll('.card').forEach(c => c.classList.remove('sel'));
        el.classList.add('sel');
    }
    function copy(t) { navigator.clipboard.writeText(t); alert("Copiado"); }
    function toggleAcc(el) { el.nextElementSibling.classList.toggle('active'); }
    function saveRates() { alert("TASAS ACTUALIZADAS"); }
</script>
</body>
</html>
