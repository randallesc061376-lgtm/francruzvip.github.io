<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRAN CRUZ VIP • OFICIAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <style>
        :root { --o: #d4af37; --n: #050505; --g: linear-gradient(180deg, #f9e498, #d4af37); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--n); color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Encabezado y Logo Centrado */
        header { padding: 40px 20px; text-align: center; width: 100%; cursor: pointer; }
        .logo { color: var(--o); font-size: 2.2rem; font-weight: 900; letter-spacing: 4px; }
        .sub-logo { color: #555; font-size: 0.7rem; letter-spacing: 3px; margin-top: 8px; text-transform: uppercase; }

        /* Selector de Banderas */
        .geo-bar { display: flex; justify-content: center; gap: 10px; margin: 10px 0 30px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 50px; width: 90%; max-width: 400px; }
        .flag { width: 30px; height: 20px; opacity: 0.3; transition: 0.3s; cursor: pointer; border-radius: 2px; }
        .flag.active { opacity: 1; transform: scale(1.2); box-shadow: 0 0 10px var(--o); }

        /* Planes y Botones */
        .view { display: none; width: 100%; max-width: 380px; flex-direction: column; align-items: center; padding-bottom: 40px; }
        .view.active { display: flex; }
        .plan-box { width: 90%; background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 12px; padding: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .plan-box.sel { border-color: var(--o); background: rgba(212,175,55,0.05); }
        .plan-box b { color: var(--o); font-size: 1.2rem; }

        .method { width: 90%; background: #080808; border: 1px solid #151515; border-radius: 10px; margin-bottom: 8px; text-align: center; }
        .method-h { padding: 15px; font-size: 0.8rem; font-weight: bold; color: #444; }
        .btn-gold { width: 90%; background: var(--g); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: 900; text-transform: uppercase; margin-top: 20px; cursor: pointer; }
        
        /* Admin */
        .admin-sec { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 10px; padding: 15px; margin-top: 10px; width: 95%; }
        .inp-admin { width: 100%; background: #000; border: 1px solid #222; padding: 10px; color: #fff; border-radius: 5px; margin-top: 5px; text-align: center; }
        #toast { display: none; position: fixed; top: 20px; background: var(--g); color: #000; padding: 10px 20px; border-radius: 20px; font-weight: bold; z-index: 10000; }
    </style>
</head>
<body>

<div id="toast"></div>

<header id="adminTrigger">
    <div class="logo">FRAN CRUZ VIP</div>
    <div id="region-tag" class="sub-logo">SALA PRIVADA • COSTA RICA</div>
</header>

<div class="geo-bar">
    <img src="https://flagcdn.com/cr.svg" class="flag active" onclick="setLoc('COSTA RICA', '₡', 540, true)">
    <img src="https://flagcdn.com/ni.svg" class="flag" onclick="setLoc('NICARAGUA', 'C$', 37, false)">
    <img src="https://flagcdn.com/hn.svg" class="flag" onclick="setLoc('HONDURAS', 'L', 24.5, false)">
    <img src="https://flagcdn.com/gt.svg" class="flag" onclick="setLoc('GUATEMALA', 'Q', 7.8, false)">
    <img src="https://flagcdn.com/un.svg" class="flag" onclick="setLoc('MUNDO', '$', 1, false)">
</div>

<div id="v-client" class="view active">
    <div class="plan-box" id="p1"><span>ACCESO HOY</span><b id="price1">₡540</b></div>
    <div class="plan-box" id="p2"><span>7 DÍAS SILVER</span><b id="price2">₡2,700</b></div>
    <div class="plan-box sel" id="p3"><span>30 DÍAS GOLD</span><b id="price3">₡8,100</b></div>

    <div style="margin: 20px 0 10px; font-size: 0.7rem; color: var(--o); font-weight: bold;">MÉTODOS DE PAGO</div>
    <div class="method"><div class="method-h">1. SINPE MÓVIL (CR)</div></div>
    <div class="method"><div class="method-h">2. TRANSFERENCIAS / OTROS</div></div>
    <div class="method"><div class="method-h">3. PAYPAL / INTERNACIONAL</div></div>

    <button class="btn-gold" onclick="notify('SOLICITANDO...')">SOLICITAR ACCESO VIP</button>
    <button style="background:none; border:none; color:#444; margin-top:15px; font-weight:bold;">YA TENGO MI CLAVE</button>
</div>

<div id="v-admin" class="view">
    <div class="admin-sec">
        <span style="color:var(--o); font-size:0.7rem;">TIPOS DE CAMBIO</span>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:5px;">
            <input type="number" id="i-cr" class="inp-admin" placeholder="CR ₡">
            <input type="number" id="i-ni" class="inp-admin" placeholder="NI C$">
        </div>
    </div>
    <div class="admin-sec">
        <span style="color:var(--o); font-size:0.7rem;">DATOS DE PAGO</span>
        <input type="text" id="i-sinpe" class="inp-admin" placeholder="SINPE">
        <input type="text" id="i-titular" class="inp-admin" placeholder="Titular">
        <input type="text" id="i-pp" class="inp-admin" placeholder="PayPal">
    </div>
    <div class="admin-sec">
        <span style="color:var(--o); font-size:0.7rem;">LISTA DE ESPERA / BANEO</span>
        <div id="lista-espera" style="font-size:0.8rem; padding:10px; color:#555;">No hay solicitudes pendientes.</div>
    </div>
    <div class="admin-sec">
        <span style="color:var(--o); font-size:0.7rem;">GALERÍA VIP</span>
        <input type="file" id="fileInp" class="inp-admin">
    </div>
    <button class="btn-gold" onclick="saveAdmin()">APLICAR TODOS LOS CAMBIOS</button>
    <button onclick="location.reload()" style="background:none; border:none; color:#555; margin-top:10px;">CERRAR PANEL</button>
</div>

<script>
    // Configuración mínima para que no se congele
    const firebaseConfig = { apiKey: "AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE", authDomain: "fran-cruz-sala-vip.firebaseapp.com", projectId: "fran-cruz-sala-vip", storageBucket: "fran-cruz-sala-vip.firebasestorage.app", databaseURL: "https://fran-cruz-sala-vip-default-rtdb.firebaseio.com", appId: "1:1022733043010:web:379db18e37bbfde2cf34db" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function setLoc(pais, sim, tasa, esCR) {
        document.getElementById('region-tag').innerText = `SALA PRIVADA • ${pais}`;
        document.getElementById('price1').innerText = sim + Math.round(1 * tasa);
        document.getElementById('price2').innerText = sim + Math.round(5 * tasa);
        document.getElementById('price3').innerText = sim + Math.round(15 * tasa);
        document.querySelectorAll('.flag').forEach(f => f.classList.remove('active'));
        event.target.classList.add('active');
    }

    function saveAdmin() {
        const settings = {
            sinpe: document.getElementById('i-sinpe').value,
            titular: document.getElementById('i-titular').value,
            paypal: document.getElementById('i-pp').value
        };
        db.ref('config/settings').set(settings).then(() => notify("✅ CAMBIOS GUARDADOS"));
    }

    function notify(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    // Acceso Admin: 5 clics en el logo
    let clicks = 0;
    document.getElementById('adminTrigger').onclick = () => {
        clicks++;
        if(clicks >= 5) {
            document.getElementById('v-client').classList.remove('active');
            document.getElementById('v-admin').classList.add('active');
            clicks = 0;
        }
    };
</script>
</body>
</html>
