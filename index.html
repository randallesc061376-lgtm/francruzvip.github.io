<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRAN CRUZ VIP - ADMIN</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <style>
        :root{--o:#d4af37;--n:#050505;--g:linear-gradient(135deg,#d4af37,#f9e498)}
        body{background:var(--n);color:#fff;font-family:'Segoe UI',sans-serif;margin:0;display:flex;flex-direction:column;align-items:center;user-select:none}
        header{padding:30px 10px;text-align:center;width:100%}
        .l{color:var(--o);font-size:2rem;font-weight:900;letter-spacing:5px;text-transform:uppercase}
        .p{display:none;width:100%;max-width:400px;flex-direction:column;align-items:center;padding:20px;box-sizing:border-box}
        .a{display:flex}
        .bg{width:100%;background:var(--g);color:#000;border:none;padding:18px;border-radius:12px;font-weight:900;text-transform:uppercase;cursor:pointer;margin-top:10px}
        .inp-admin{width:100%;padding:15px;background:#111;border:1px solid #333;border-radius:10px;color:#fff;text-align:center;margin-bottom:10px;box-sizing:border-box}
        
        /* ESTILOS DE GESTIÓN DE LÁMINAS */
        .admin-card{width:100%;background:rgba(255,255,255,0.03);border:1px solid #222;border-radius:15px;padding:15px;margin-bottom:15px;text-align:center}
        .grid-vip{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-top:20px}
        .item-vip{position:relative;border:1px solid #333;border-radius:8px;overflow:hidden;background:#000}
        .item-vip img{width:100%;height:120px;object-fit:cover;display:block}
        .btn-del{position:absolute;top:5px;right:5px;background:red;color:#fff;border:none;border-radius:50%;width:25px;height:25px;font-weight:bold;cursor:pointer;font-size:12px}
        
        /* BOTONES BANEO */
        .ban-group{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
        .btn-ban{background:#900;color:#fff;padding:12px;border-radius:8px;border:none;font-weight:bold}
        .btn-alta{background:#060;color:#fff;padding:12px;border-radius:8px;border:none;font-weight:bold}
    </style>
</head>
<body>

<header>
    <div class="l">FRAN CRUZ VIP</div>
    <p style="color:#555;font-size:.7rem;letter-spacing:2px">SISTEMA DE GESTIÓN</p>
</header>

<div id="u" class="p a">
    <input type="password" id="pk" class="inp-admin" placeholder="PASSKEY">
    <button class="bg" onclick="vPk()">ENTRAR AL PANEL</button>
</div>

<div id="ad" class="p">
    
    <div class="admin-card">
        <h4 style="color:var(--o);margin:0 0 10px 0">CONTROL DE ACCESO</h4>
        <input type="text" id="targetUid" class="inp-admin" placeholder="UID DEL CLIENTE">
        <div class="ban-group">
            <button class="btn-ban" onclick="ban(true)">BAN</button>
            <button class="btn-alta" onclick="ban(false)">ALTA</button>
        </div>
    </div>

    <div class="admin-card">
        <h4 style="color:var(--o);margin:0 0 10px 0">NUEVO CONTENIDO</h4>
        <input type="file" id="fi" accept="image/*" style="display:none" onchange="sub()">
        <button class="bg" onclick="document.getElementById('fi').click()">ELEGIR Y PUBLICAR LÁMINA</button>
    </div>

    <h4 style="color:var(--o);width:100%;text-align:left;margin-left:10px">LÁMINAS ACTIVAS</h4>
    <div id="visorLaminas" class="grid-vip">
        </div>

    <button class="bg" style="background:none;color:#555;border:1px solid #222;margin-top:30px" onclick="location.reload()">CERRAR SESIÓN</button>
</div>

<script>
const cfg={apiKey:"AIzaSyCYxi6Fl8LpAUEdLht-RU76X4gKiBNT2LE",authDomain:"fran-cruz-sala-vip.firebaseapp.com",projectId:"fran-cruz-sala-vip",storageBucket:"fran-cruz-sala-vip.firebasestorage.app",messagingSenderId:"1022733043010",appId:"1:1022733043010:web:379db18e37bbfde2cf34db"};
firebase.initializeApp(cfg);const db=firebase.firestore(),st=firebase.storage();

function vP(o,n){document.getElementById(o).classList.remove('a');document.getElementById(n).classList.add('a')}

function vPk(){
    if(document.getElementById('pk').value==="ADMIN123"){
        vP('u','ad');
        cargarLaminas();
    }else{
        alert("ACCESO DENEGADO");
    }
}

// CARGAR LÁMINAS CON BOTÓN DE BORRADO
async function cargarLaminas(){
    const v=document.getElementById('visorLaminas');
    v.innerHTML="<p style='color:#444'>Cargando...</p>";
    const q=await db.collection("galeria").orderBy("fecha","desc").get();
    v.innerHTML="";
    q.forEach(doc=>{
        const d=doc.data();
        v.innerHTML+=`
            <div class="item-vip" id="item-${doc.id}">
                <button class="btn-del" onclick="eliminar('${doc.id}')">X</button>
                <img src="${d.url}">
            </div>
        `;
    });
}

// BORRADO RÁPIDO
async function eliminar(id){
    if(confirm("¿Seguro que desea borrar esta lámina?")){
        await db.collection("galeria").doc(id).delete();
        document.getElementById(`item-${id}`).remove();
    }
}

// PROTOCOLO BANEO
async function ban(status){
    const uid=document.getElementById('targetUid').value;
    if(!uid){alert("INGRESE UID");return}
    await db.collection("usuarios").doc(uid).set({banned:status},{merge:true});
    alert(status?"CLIENTE BANEADO":"CLIENTE REHABILITADO");
}

// PUBLICAR
async function sub(){
    const f=document.getElementById('fi').files[0]; if(!f)return;
    const r=st.ref('galeria/'+Date.now());
    await r.put(f);
    const u=await r.getDownloadURL();
    await db.collection("galeria").add({url:u,fecha:firebase.firestore.FieldValue.serverTimestamp()});
    alert("LÁMINA PUBLICADA");
    cargarLaminas();
}
</script>
</body>
</html>
